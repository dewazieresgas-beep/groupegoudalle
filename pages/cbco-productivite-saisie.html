<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBCO - Saisie Productivité Usine - Intranet</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    window.APP_LOGO = 'cbco';
  </script>
  <script>
    Auth.requirePermission('cbco_saisie');
  </script>

  <div class="app-container">
    <div id="sidebar"></div>
    <main class="main-content">
      <h1>🏭 CBCO - Productivité usine</h1>
      <p class="subtitle" style="margin-bottom: 24px; color: #666;">Import Excel complet Speedcut + Ultra - remplace l'historique précédent</p>
      <div id="message" class="alert" style="display:none;"></div>

      <div class="card">
        <div class="card-title"><h2 style="margin:0;">📥 Nouvel import Excel</h2></div>
        <div class="card-body">
          <div id="dropZone" class="ss-import-zone" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;" onchange="handleFileSelect(this)">
            <div class="ss-import-icon">📊</div>
            <p><strong>Glissez-déposez</strong> le fichier Excel ici<br>ou <span style="color:var(--accent-dark); text-decoration:underline;">cliquez pour sélectionner</span></p>
            <p style="font-size:0.82em; color:#999;">Sources utilisées: feuilles SC et ULTRA (ligne 4+).</p>
          </div>
          <div id="preview" style="display:none;"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
          <h2 style="margin:0;">📁 Historique semaines importées</h2>
          <div style="display:flex; gap:10px; align-items:center;">
            <label for="machineViewSelect" style="font-size:0.85em; font-weight:600;">Vue machine</label>
            <select id="machineViewSelect" onchange="refreshHistory()" style="min-width:140px;">
              <option value="speedcut">Speedcut</option>
              <option value="ultra">Ultra</option>
            </select>
            <span class="badge badge-secondary" id="countImports">0 semaine</span>
          </div>
        </div>
        <div class="card-body" id="historyBody"></div>
      </div>
    </main>
  </div>

  <script>
    function showMessage(message, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = message;
      msgDiv.className = `alert alert-${type}`;
      msgDiv.style.display = 'block';
      window.scrollTo(0, 0);
      if (type === 'success') setTimeout(() => { msgDiv.style.display = 'none'; }, 5000);
    }

    /**
     * Retourne true si la cellule contient une vraie donnée.
     */
    function hasCellValue(value) {
      return value !== null && value !== undefined && String(value).trim() !== '';
    }

    /**
     * Parse nombre générique (gère texte/virgule/pourcentage)
     * Retourne null si vide/non parsable.
     */
    function parseNumber(value) {
      if (!hasCellValue(value)) return null;
      if (typeof value === 'number') return Number.isFinite(value) ? value : null;
      const raw = String(value).trim();
      const isPercent = raw.includes('%');
      const cleaned = raw.replace(/\s/g, '').replace('%', '').replace(',', '.');
      const match = cleaned.match(/-?\d+(\.\d+)?/);
      const parsed = match ? parseFloat(match[0]) : NaN;
      if (!Number.isFinite(parsed)) return null;
      return isPercent ? (parsed / 100) : parsed;
    }

    /**
     * Parse une durée Excel en heures décimales.
     * Accepte:
     * - HH:MM ou HH:MM:SS (texte)
     * - fraction de jour Excel (nombre < 2 en général)
     * - nombre déjà en heures
     */
    function parseDurationHours(value) {
      if (!hasCellValue(value)) return null;
      if (typeof value === 'number') {
        if (!Number.isFinite(value)) return null;
        return (value >= 0 && value < 2) ? (value * 24) : value;
      }
      const raw = String(value).trim();
      const hms = raw.match(/^(\d{1,3}):(\d{1,2})(?::(\d{1,2}))?$/);
      if (hms) {
        const h = parseInt(hms[1], 10) || 0;
        const m = parseInt(hms[2], 10) || 0;
        const s = parseInt(hms[3] || '0', 10) || 0;
        return h + (m / 60) + (s / 3600);
      }
      return parseNumber(value);
    }

    /**
     * Parse un ratio pourcentage:
     * - "85%" => 0.85
     * - 85 => 0.85
     * - 0.85 => 0.85
     */
    function parseRatio(value) {
      const n = parseNumber(value);
      if (n === null) return null;
      return n > 1 ? (n / 100) : n;
    }

    function parseMachineSheet(workbook, config) {
      const normalizeName = (name) => String(name || '').toLowerCase().replace(/\s+/g, '');
      const sheetName = workbook.SheetNames.find(name => normalizeName(name) === config.sheetKey);
      const sheet = sheetName ? workbook.Sheets[sheetName] : null;
      if (!sheet) return [];

      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      const byWeek = {};
      let emptyUsefulStreak = 0;

      for (let r = 3; r < rows.length; r++) {
        const row = rows[r] || [];
        const usefulRange = row.slice(config.usefulStart, config.usefulEnd + 1);
        const hasUsefulData = usefulRange.some(hasCellValue);
        if (!hasUsefulData) {
          emptyUsefulStreak++;
          if (emptyUsefulStreak >= 50) break;
          continue;
        }
        emptyUsefulStreak = 0;

        const semaineAnnuelle = parseNumber(row[config.COL.B]);
        const semaineCumulee = parseNumber(row[config.COL.C]);
        const heuresOnaya = parseDurationHours(row[config.COL.D]);
        const heuresPerdues = parseDurationHours(row[config.COL.E]);
        const cubage = parseNumber(row[config.COL.F]);
        const productiviteCell = parseNumber(row[config.COL.G]);
        const remarques = hasCellValue(row[config.COL.H]) ? String(row[config.COL.H]).trim() : null;
        const cibleProductivite = parseNumber(row[config.COL.J]);
        const trs = parseRatio(row[config.COL.TRS]);
        const tempsUtilisationMachine = parseDurationHours(row[config.COL.TEMPS]);

        if (semaineCumulee === null && semaineAnnuelle === null) continue;
        if (cubage === null && heuresOnaya === null && heuresPerdues === null && productiviteCell === null) continue;

        let week = null;
        let year = null;
        if (semaineCumulee !== null && semaineCumulee > 0) {
          const c = Math.round(semaineCumulee);
          year = 2023 + Math.floor((c - 1) / 52);
          week = ((c - 1) % 52) + 1;
        } else if (semaineAnnuelle !== null && semaineAnnuelle > 0) {
          week = Math.round(semaineAnnuelle);
          year = 2023;
        }
        if (!week || !year) continue;

        const heuresUtiles = (heuresOnaya !== null && heuresPerdues !== null) ? Math.max(0, heuresOnaya - heuresPerdues) : null;
        const productivite = (cubage !== null && heuresUtiles !== null && heuresUtiles > 0) ? (cubage / heuresUtiles) : productiviteCell;
        const key = `${year}-${String(week).padStart(2, '0')}`;
        byWeek[key] = {
          week,
          year,
          semaineLabel: `S${week} ${year}`,
          semaineAnnuelle,
          semaineCumulee,
          heuresOnaya,
          heuresPerdues,
          heuresUtiles,
          cubage,
          productivite,
          remarques,
          cibleProductivite,
          trs,
          tempsUtilisationMachine
        };
      }

      return Object.values(byWeek);
    }

    function parseProductiviteExcel(workbook) {
      const scEntries = parseMachineSheet(workbook, {
        sheetKey: 'sc',
        usefulStart: 5, usefulEnd: 13,
        COL: { B: 1, C: 2, D: 3, E: 4, F: 5, G: 6, H: 7, J: 9, TRS: 11, TEMPS: 13 }
      });
      const ultraEntries = parseMachineSheet(workbook, {
        sheetKey: 'ultra',
        usefulStart: 5, usefulEnd: 10,
        COL: { B: 1, C: 2, D: 3, E: 4, F: 5, G: 6, H: 7, J: 9, TRS: 10, TEMPS: 8 }
      });

      if (!scEntries.length && !ultraEntries.length) {
        throw new Error('Aucune donnée exploitable trouvée dans les feuilles SC/ULTRA.');
      }

      const merged = {};
      function ensureWeekBase(week, year) {
        const key = `${year}-${String(week).padStart(2, '0')}`;
        if (!merged[key]) {
          merged[key] = {
            id: `prod-${key}`,
            week,
            year,
            semaineLabel: `S${week} ${year}`,
            importDate: new Date().toISOString(),
            updatedBy: Auth.getSession()?.username || 'system',
            // Speedcut
            semaine_annuelle: null, semaine_cumulee: null, heures_onaya: null, heures_perdues: null,
            cubage: null, productivite: null, remarques: null, cible_productivite: null, trs: null, temps_utilisation_machine: null,
            speedcutM3: null, speedcutHeuresOnaya: null, speedcutHeuresPerdues: null, speedcutHeuresUtiles: null,
            speedcutProductivite: null, speedcutCibleProductivite: null, speedcutTRS: null, speedcutTempsUtilisation: null, speedcutRemarques: null,
            // Ultra
            ultra_semaine_annuelle: null, ultra_semaine_cumulee: null, ultra_heures_onaya: null, ultra_heures_perdues: null,
            ultra_cubage: null, ultra_productivite: null, ultra_remarques: null, ultra_cible_productivite: null, ultra_trs: null, ultra_temps_utilisation_machine: null,
            ultraM3: null, ultraHeuresOnaya: null, ultraHeuresPerdues: null, ultraHeuresUtiles: null,
            ultraProductivite: null, ultraCibleProductivite: null, ultraTRS: null, ultraTempsUtilisation: null, ultraRemarques: null,
            // autres machines
            extraM2: null, collageHeures: null, collagePresses: null, assemblageTempsRealise: null, assemblageTempsTheorique: null
          };
        }
        return merged[key];
      }

      scEntries.forEach(e => {
        const row = ensureWeekBase(e.week, e.year);
        row.semaine_annuelle = e.semaineAnnuelle;
        row.semaine_cumulee = e.semaineCumulee;
        row.heures_onaya = e.heuresOnaya;
        row.heures_perdues = e.heuresPerdues;
        row.cubage = e.cubage;
        row.productivite = e.productivite;
        row.remarques = e.remarques;
        row.cible_productivite = e.cibleProductivite;
        row.trs = e.trs;
        row.temps_utilisation_machine = e.tempsUtilisationMachine;
        row.speedcutM3 = e.cubage;
        row.speedcutHeuresOnaya = e.heuresOnaya;
        row.speedcutHeuresPerdues = e.heuresPerdues;
        row.speedcutHeuresUtiles = e.heuresUtiles;
        row.speedcutProductivite = e.productivite;
        row.speedcutCibleProductivite = e.cibleProductivite;
        row.speedcutTRS = e.trs;
        row.speedcutTempsUtilisation = e.tempsUtilisationMachine;
        row.speedcutRemarques = e.remarques;
      });

      ultraEntries.forEach(e => {
        const row = ensureWeekBase(e.week, e.year);
        row.ultra_semaine_annuelle = e.semaineAnnuelle;
        row.ultra_semaine_cumulee = e.semaineCumulee;
        row.ultra_heures_onaya = e.heuresOnaya;
        row.ultra_heures_perdues = e.heuresPerdues;
        row.ultra_cubage = e.cubage;
        row.ultra_productivite = e.productivite;
        row.ultra_remarques = e.remarques;
        row.ultra_cible_productivite = e.cibleProductivite;
        row.ultra_trs = e.trs;
        row.ultra_temps_utilisation_machine = e.tempsUtilisationMachine;
        row.ultraM3 = e.cubage;
        row.ultraHeuresOnaya = e.heuresOnaya;
        row.ultraHeuresPerdues = e.heuresPerdues;
        row.ultraHeuresUtiles = e.heuresUtiles;
        row.ultraProductivite = e.productivite;
        row.ultraCibleProductivite = e.cibleProductivite;
        row.ultraTRS = e.trs;
        row.ultraTempsUtilisation = e.tempsUtilisationMachine;
        row.ultraRemarques = e.remarques;
      });

      return Object.values(merged).sort((a, b) => a.year !== b.year ? a.year - b.year : a.week - b.week);
    }

    function handleFileSelect(input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const entries = parseProductiviteExcel(workbook);
          showPreview(file.name, entries);
        } catch (error) {
          showMessage('❌ ' + error.message, 'error');
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function showPreview(fileName, entries) {
      const preview = document.getElementById('preview');
      const first = entries[0];
      const last = entries[entries.length - 1];
      const existingCount = getCBCOProductiviteData().length;

      preview.innerHTML = `
        <div style="border:2px solid var(--accent); border-radius:8px; padding:16px; margin-top:12px; background:#f9fdf9;">
          <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
            <div><strong>📄 ${escapeHtml(fileName)}</strong> - ${entries.length} semaines détectées</div>
            <div><span class="badge badge-primary">Aperçu avant validation</span></div>
          </div>
          <p style="margin:0 0 10px 0;">Période: <strong>${escapeHtml(first.semaineLabel)}</strong> à <strong>${escapeHtml(last.semaineLabel)}</strong></p>
          <p style="margin:0 0 14px 0; color:var(--danger);">⚠️ La validation remplacera tout l'historique actuel (${existingCount} semaine${existingCount > 1 ? 's' : ''}).</p>
          <table style="font-size:0.9em;">
            <thead>
              <tr>
                <th>Semaine</th>
                <th>SC m³</th>
                <th>Heures utiles</th>
                <th>Prod SC (m3/h)</th>
                <th>Cible</th>
              </tr>
            </thead>
            <tbody>
              ${entries.slice(-8).map(e => `
                <tr>
                  <td><strong>${escapeHtml(e.semaineLabel)}</strong></td>
                  <td>${formatNumber(e.speedcutM3)}</td>
                  <td>${formatNumber(e.speedcutHeuresUtiles)}</td>
                  <td>${formatNumber(e.speedcutProductivite)}</td>
                  <td>${formatNumber(e.speedcutCibleProductivite)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          <div style="display:flex; gap:10px; margin-top:14px;">
            <button class="btn btn-primary" onclick="confirmImport()">✅ Valider l'import</button>
            <button class="btn btn-secondary" onclick="cancelPreview()">❌ Annuler</button>
          </div>
        </div>`;

      preview.style.display = 'block';
      document.getElementById('dropZone').style.display = 'none';
      window._pendingProductivite = { entries };
    }

    function confirmImport() {
      const p = window._pendingProductivite;
      if (!p) return;
      const saved = replaceCBCOProductiviteData(p.entries);
      Auth.audit('CBCO_PRODUCTIVITE_IMPORT', `Import productivité usine: ${saved.length} semaines (remplacement complet)`);
      showMessage(`✅ Import validé: ${saved.length} semaines enregistrées (historique remplacé).`, 'success');
      cancelPreview();
      refreshHistory();
    }

    function cancelPreview() {
      document.getElementById('preview').style.display = 'none';
      document.getElementById('preview').innerHTML = '';
      document.getElementById('dropZone').style.display = '';
      document.getElementById('fileInput').value = '';
      delete window._pendingProductivite;
    }

    function deleteImport(id) {
      const entry = getCBCOProductiviteData().find(e => e.id === id);
      if (!entry) return;
      if (!confirm(`Supprimer l'import ${entry.semaineLabel} ?`)) return;
      deleteCBCOProductiviteEntry(id);
      Auth.audit('CBCO_PRODUCTIVITE_DELETED', `Suppression productivité ${entry.semaineLabel}`);
      showMessage(`🗑️ Import ${entry.semaineLabel} supprimé`, 'success');
      refreshHistory();
    }

    function refreshHistory() {
      const entries = getCBCOProductiviteData();
      const body = document.getElementById('historyBody');
      const count = document.getElementById('countImports');
      const machine = document.getElementById('machineViewSelect')?.value || 'speedcut';
      count.textContent = `${entries.length} semaine${entries.length > 1 ? 's' : ''}`;
      count.className = entries.length > 0 ? 'badge badge-success' : 'badge badge-secondary';

      if (entries.length === 0) {
        body.innerHTML = '<p style="color:#999; margin:0;">Aucune semaine importée</p>';
        return;
      }

      const cfg = machine === 'ultra'
        ? {
            label: 'Ultra',
            hOnaya: 'ultra_heures_onaya',
            hPerdues: 'ultra_heures_perdues',
            cubage: 'ultra_cubage',
            prod: 'ultra_productivite',
            remarques: 'ultra_remarques',
            cible: 'ultra_cible_productivite',
            trs: 'ultra_trs',
            temps: 'ultra_temps_utilisation_machine',
            trsCol: 'TRS (K)',
            tempsCol: "Tps utilisation (I)"
          }
        : {
            label: 'Speedcut',
            hOnaya: 'heures_onaya',
            hPerdues: 'heures_perdues',
            cubage: 'cubage',
            prod: 'productivite',
            remarques: 'remarques',
            cible: 'cible_productivite',
            trs: 'trs',
            temps: 'temps_utilisation_machine',
            trsCol: 'TRS (L)',
            tempsCol: 'Tps utilisation (N)'
          };

      body.innerHTML = `<table style="font-size:0.88em;">
        <thead>
          <tr>
            <th>Semaine</th>
            <th>Machine</th>
            <th>H Onaya (D)</th>
            <th>H perdues (E)</th>
            <th>Cubage (F)</th>
            <th>Prod (G)</th>
            <th>Remarques (H)</th>
            <th>Cible (J)</th>
            <th>${cfg.trsCol}</th>
            <th>${cfg.tempsCol}</th>
            <th style="text-align:center;">Actions</th>
          </tr>
        </thead>
        <tbody>
          ${entries.map(e => `
            <tr>
              <td><strong>${escapeHtml(e.semaineLabel || ('S' + e.week + ' ' + e.year))}</strong></td>
              <td>${cfg.label}</td>
              <td>${e[cfg.hOnaya] === null || e[cfg.hOnaya] === undefined ? '—' : formatNumber(e[cfg.hOnaya])}</td>
              <td>${e[cfg.hPerdues] === null || e[cfg.hPerdues] === undefined ? '—' : formatNumber(e[cfg.hPerdues])}</td>
              <td>${e[cfg.cubage] === null || e[cfg.cubage] === undefined ? '—' : formatNumber(e[cfg.cubage])}</td>
              <td>${e[cfg.prod] === null || e[cfg.prod] === undefined ? '—' : formatNumber(e[cfg.prod])}</td>
              <td>${e[cfg.remarques] ? escapeHtml(e[cfg.remarques]) : '—'}</td>
              <td>${e[cfg.cible] === null || e[cfg.cible] === undefined ? '—' : formatNumber(e[cfg.cible])}</td>
              <td>${e[cfg.trs] === null || e[cfg.trs] === undefined ? '—' : formatNumber(e[cfg.trs])}</td>
              <td>${e[cfg.temps] === null || e[cfg.temps] === undefined ? '—' : formatNumber(e[cfg.temps])}</td>
              <td style="text-align:center;"><button class="btn btn-small btn-danger" onclick="deleteImport('${e.id}')">🗑️</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
    }

    function setupDragDrop() {
      const zone = document.getElementById('dropZone');
      if (!zone) return;
      zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('ss-import-zone-active'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('ss-import-zone-active'));
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('ss-import-zone-active');
        const file = e.dataTransfer.files[0];
        if (!file) return;
        const input = document.getElementById('fileInput');
        const dt = new DataTransfer();
        dt.items.add(file);
        input.files = dt.files;
        handleFileSelect(input);
      });
    }

    function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectCBCOSecondaryBar();
      setupDragDrop();
      refreshHistory();
    }

    window.onServerReady(init);
  </script>
  <footer class="site-footer"></footer>
</body>
</html>
