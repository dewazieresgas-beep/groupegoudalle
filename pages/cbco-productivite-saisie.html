<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBCO - Saisie Productivité Usine - Intranet</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    window.APP_LOGO = 'cbco';
  </script>
  <script>
    Auth.requirePermission('cbco_saisie');
  </script>

  <div class="app-container">
    <div id="sidebar"></div>
    <main class="main-content">
      <h1>🏭 CBCO - Productivité usine</h1>
      <p class="subtitle" style="margin-bottom: 24px; color: #666;">Import hebdomadaire Excel pour Speedcut, Ultra, Extra, Collage et Assemblage</p>
      <div id="message" class="alert" style="display:none;"></div>

      <div class="card">
        <div class="card-title"><h2 style="margin:0;">📥 Nouvel import hebdomadaire</h2></div>
        <div class="card-body">
          <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:end; margin-bottom:16px;">
            <div>
              <label style="display:block; font-weight:600; margin-bottom:4px;">Semaine</label>
              <select id="weekInput" style="min-width:100px;"></select>
            </div>
            <div>
              <label style="display:block; font-weight:600; margin-bottom:4px;">Année</label>
              <select id="yearInput" style="min-width:100px;"></select>
            </div>
          </div>
          <div id="dropZone" class="ss-import-zone" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;" onchange="handleFileSelect(this)">
            <div class="ss-import-icon">📊</div>
            <p><strong>Glissez-déposez</strong> le fichier Excel ici<br>ou <span style="color:var(--accent-dark); text-decoration:underline;">cliquez pour sélectionner</span></p>
            <p style="font-size:0.82em; color:#999;">Le fichier doit contenir les colonnes de productivité usine.</p>
          </div>
          <div id="preview" style="display:none;"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
          <h2 style="margin:0;">📁 Historique imports</h2>
          <span class="badge badge-secondary" id="countImports">0 import</span>
        </div>
        <div class="card-body" id="historyBody"></div>
      </div>
    </main>
  </div>

  <script>
    function showMessage(message, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = message;
      msgDiv.className = `alert alert-${type}`;
      msgDiv.style.display = 'block';
      window.scrollTo(0, 0);
      if (type === 'success') setTimeout(() => { msgDiv.style.display = 'none'; }, 5000);
    }

    function parseNumber(value) {
      if (value === null || value === undefined || value === '') return 0;
      if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
      const cleaned = String(value).replace(/\s/g, '').replace(',', '.');
      const parsed = parseFloat(cleaned);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function parseProductiviteExcel(workbook) {
      const week = parseInt(document.getElementById('weekInput').value, 10);
      const year = parseInt(document.getElementById('yearInput').value, 10);
      const metrics = {
        speedcutM3: 0,
        ultraM3: 0,
        extraM2: 0,
        collageHeures: 0,
        collagePresses: 0,
        assemblageTempsRealise: 0,
        assemblageTempsTheorique: 0
      };

      // 1) Parsing dédié feuille SC (Speedcut), selon mapping fixe fourni.
      const scSheet = workbook.Sheets['SC'] || workbook.Sheets['Sc'] || workbook.Sheets['sc'];
      if (scSheet) {
        const scRows = XLSX.utils.sheet_to_json(scSheet, { header: 1, defval: '' });
        const targetCumulativeWeek = ((year - 2023) * 52) + week;
        let best = null;
        let emptyFCount = 0;

        for (let r = 3; r < scRows.length; r++) { // ligne 4 => index 3
          const row = scRows[r] || [];
          const semaineB = parseNumber(row[1]); // B
          const semaineC = parseNumber(row[2]); // C
          const heuresOnaya = parseNumber(row[3]); // D
          const heuresPerdues = parseNumber(row[4]); // E
          const cubage = parseNumber(row[5]); // F
          const cibleProd = parseNumber(row[9]); // J
          const trs = parseNumber(row[11]); // L
          const tempsUtilisation = parseNumber(row[13]); // N
          const remarques = String(row[7] || '').trim(); // H

          if (!cubage) emptyFCount++;
          else emptyFCount = 0;
          if (emptyFCount >= 50) break;

          if (!semaineB && !semaineC && !cubage && !heuresOnaya && !heuresPerdues) continue;

          const inferredYear = semaineC > 0 ? (2023 + Math.floor((semaineC - 1) / 52)) : null;
          const matchByC = semaineC > 0 && Math.round(semaineC) === targetCumulativeWeek;
          const matchByBAndYear = Math.round(semaineB) === week && inferredYear === year;
          if (!matchByC && !matchByBAndYear) continue;

          const heuresUtiles = Math.max(0, heuresOnaya - heuresPerdues);
          const productivite = heuresUtiles > 0 ? (cubage / heuresUtiles) : (heuresOnaya > 0 ? cubage / heuresOnaya : 0);
          best = {
            speedcutM3: cubage,
            speedcutHeuresOnaya: heuresOnaya,
            speedcutHeuresPerdues: heuresPerdues,
            speedcutHeuresUtiles: heuresUtiles,
            speedcutProductivite: productivite,
            speedcutCibleProductivite: cibleProd,
            speedcutTRS: trs,
            speedcutTempsUtilisation: tempsUtilisation,
            speedcutRemarques: remarques
          };
          break;
        }

        if (!best) {
          throw new Error(`Aucune donnée Speedcut trouvée dans la feuille SC pour S${week} ${year}.`);
        }

        Object.assign(metrics, best);
      }

      const hasUsefulData = Object.values(metrics).some(v => typeof v === 'number' ? v > 0 : Boolean(v));
      if (!hasUsefulData) throw new Error('Aucune ligne de données exploitable trouvée.');
      return metrics;
    }

    function handleFileSelect(input) {
      const file = input.files[0];
      if (!file) return;

      const week = parseInt(document.getElementById('weekInput').value, 10);
      const year = parseInt(document.getElementById('yearInput').value, 10);
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const metrics = parseProductiviteExcel(workbook);
          showPreview(file.name, week, year, metrics);
        } catch (error) {
          showMessage('❌ ' + error.message, 'error');
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function showPreview(fileName, week, year, m) {
      const collageHParP = m.collagePresses > 0 ? (m.collageHeures / m.collagePresses) : null;
      const assemblageEcart = m.assemblageTempsRealise - m.assemblageTempsTheorique;
      const assemblageRatio = m.assemblageTempsTheorique > 0 ? (m.assemblageTempsRealise / m.assemblageTempsTheorique) : null;
      const preview = document.getElementById('preview');
      const existing = getCBCOProductiviteData().find(e => e.week === week && e.year === year);

      preview.innerHTML = `
        <div style="border:2px solid var(--accent); border-radius:8px; padding:16px; margin-top:12px; background:#f9fdf9;">
          <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
            <div><strong>📄 ${escapeHtml(fileName)}</strong> - Semaine ${week} / ${year} ${existing ? '<span style="color:var(--danger);">⚠️ Remplacera l\'import existant</span>' : ''}</div>
            <div><span class="badge badge-primary">Aperçu avant validation</span></div>
          </div>
          <table style="font-size:0.9em;">
            <tbody>
              <tr><td><strong>Speedcut</strong></td><td>${formatNumber(m.speedcutM3)} m³</td></tr>
              <tr><td><strong>Ultra</strong></td><td>${formatNumber(m.ultraM3)} m³</td></tr>
              <tr><td><strong>Extra</strong></td><td>${formatNumber(m.extraM2)} m²</td></tr>
              <tr><td><strong>Collage</strong></td><td>${collageHParP === null ? 'N/A' : formatNumber(collageHParP) + ' h/presse'} (${formatNumber(m.collageHeures)} h / ${formatNumber(m.collagePresses)} presses)</td></tr>
              <tr><td><strong>Assemblage</strong></td><td>${formatNumber(assemblageEcart)} h d'écart ${assemblageRatio === null ? '' : '(' + formatNumber(assemblageRatio * 100) + ' %)'} </td></tr>
            </tbody>
          </table>
          <div style="display:flex; gap:10px; margin-top:14px;">
            <button class="btn btn-primary" onclick="confirmImport()">✅ Valider l'import</button>
            <button class="btn btn-secondary" onclick="cancelPreview()">❌ Annuler</button>
          </div>
        </div>`;
      preview.style.display = 'block';
      document.getElementById('dropZone').style.display = 'none';
      window._pendingProductivite = { week, year, metrics: m };
    }

    function confirmImport() {
      const p = window._pendingProductivite;
      if (!p) return;
      const saved = saveCBCOProductiviteEntry({
        week: p.week,
        year: p.year,
        semaineLabel: `S${p.week} ${p.year}`,
        ...p.metrics
      });
      Auth.audit('CBCO_PRODUCTIVITE_IMPORT', `Import productivité usine ${saved.semaineLabel}`);
      showMessage(`✅ Productivité usine importée pour ${saved.semaineLabel}`, 'success');
      cancelPreview();
      refreshHistory();
    }

    function cancelPreview() {
      document.getElementById('preview').style.display = 'none';
      document.getElementById('preview').innerHTML = '';
      document.getElementById('dropZone').style.display = '';
      document.getElementById('fileInput').value = '';
      delete window._pendingProductivite;
    }

    function deleteImport(id) {
      const entry = getCBCOProductiviteData().find(e => e.id === id);
      if (!entry) return;
      if (!confirm(`Supprimer l'import ${entry.semaineLabel} ?`)) return;
      deleteCBCOProductiviteEntry(id);
      Auth.audit('CBCO_PRODUCTIVITE_DELETED', `Suppression productivité ${entry.semaineLabel}`);
      showMessage(`🗑️ Import ${entry.semaineLabel} supprimé`, 'success');
      refreshHistory();
    }

    function refreshHistory() {
      const entries = getCBCOProductiviteData();
      const body = document.getElementById('historyBody');
      const count = document.getElementById('countImports');
      count.textContent = `${entries.length} import${entries.length > 1 ? 's' : ''}`;
      count.className = entries.length > 0 ? 'badge badge-success' : 'badge badge-secondary';

      if (entries.length === 0) {
        body.innerHTML = '<p style="color:#999; margin:0;">Aucun import hebdomadaire</p>';
        return;
      }

      body.innerHTML = `<table style="font-size:0.88em;">
        <thead>
          <tr>
            <th>Semaine</th><th>Speedcut (m³)</th><th>Ultra (m³)</th><th>Extra (m²)</th><th>Collage (h/presse)</th><th>Assemblage écart (h)</th><th style="text-align:center;">Actions</th>
          </tr>
        </thead>
        <tbody>
          ${entries.map(e => `
            <tr>
              <td><strong>${escapeHtml(e.semaineLabel || ('S' + e.week + ' ' + e.year))}</strong></td>
              <td>${formatNumber(e.speedcutM3)}</td>
              <td>${formatNumber(e.ultraM3)}</td>
              <td>${formatNumber(e.extraM2)}</td>
              <td>${e.collageHeuresParPresse === null ? 'N/A' : formatNumber(e.collageHeuresParPresse)}</td>
              <td>${formatNumber(e.assemblageEcartHeures)}</td>
              <td style="text-align:center;"><button class="btn btn-small btn-danger" onclick="deleteImport('${e.id}')">🗑️</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
    }

    function setupDragDrop() {
      const zone = document.getElementById('dropZone');
      if (!zone) return;
      zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('ss-import-zone-active'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('ss-import-zone-active'));
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('ss-import-zone-active');
        const file = e.dataTransfer.files[0];
        if (!file) return;
        const input = document.getElementById('fileInput');
        const dt = new DataTransfer();
        dt.items.add(file);
        input.files = dt.files;
        handleFileSelect(input);
      });
    }

    function initSelectors() {
      const weekSel = document.getElementById('weekInput');
      const yearSel = document.getElementById('yearInput');
      const now = new Date();
      const currentWeek = Math.ceil((((now - new Date(now.getFullYear(), 0, 1)) / 86400000) + new Date(now.getFullYear(), 0, 1).getDay() + 1) / 7);

      for (let w = 1; w <= 53; w++) {
        const opt = document.createElement('option');
        opt.value = w;
        opt.textContent = 'S' + w;
        if (w === currentWeek) opt.selected = true;
        weekSel.appendChild(opt);
      }

      for (let y = now.getFullYear() + 1; y >= now.getFullYear() - 3; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        if (y === now.getFullYear()) opt.selected = true;
        yearSel.appendChild(opt);
      }
    }

    function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectCBCOSecondaryBar();
      initSelectors();
      setupDragDrop();
      refreshHistory();
    }

    window.onServerReady(init);
  </script>
  <footer class="site-footer"></footer>
</body>
</html>
