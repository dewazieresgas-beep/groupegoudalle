<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Utilisateurs - Intranet Goudalle</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    window.APP_LOGO = 'groupe';
  </script>

  <script>
    Auth.requirePermission('users_admin');
  </script>

  <div class="app-container">
    <div id="sidebar"></div>
    
    <main class="main-content">
      <h1>Gestion des Utilisateurs</h1>

      <div class="card">
        <div class="card-title">
          <h2>Créer un nouvel utilisateur</h2>
        </div>
        <div class="card-body">
          <div id="message" class="alert" style="display:none;"></div>

          <form onsubmit="handleCreateUser(event)">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="form-group">
                <label for="firstName">Prénom *</label>
                <input type="text" id="firstName" required>
              </div>
              <div class="form-group">
                <label for="lastName">Nom *</label>
                <input type="text" id="lastName" required>
              </div>
            </div>

            <div class="form-group">
              <label for="email">Email *</label>
              <input type="email" id="email" required>
            </div>

            <div class="form-group">
              <label for="username">Identifiant *</label>
              <input type="text" id="username" minlength="3" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
              <div class="form-group">
                <label for="password">Mot de passe *</label>
                <input type="password" id="password" minlength="3" required>
              </div>
              <div class="form-group">
                <label for="niveau">Niveau d'accès *</label>
                <select id="niveau" required onchange="updateEntrepriseVisibility()">
                  <option value="">-- Sélectionner --</option>
                  <option value="lecture">👁️ Consultation</option>
                  <option value="referent">📊 Référent</option>
                  <option value="referent_gc">📊 Référent Goudalle Charpente</option>
                  <option value="direction">🗝️ Direction</option>
                </select>
              </div>
              <div class="form-group" id="entrepriseGroup" style="display:none;">
                <label for="entreprise">Entreprise *</label>
                <select id="entreprise">
                  <option value="">-- Sélectionner --</option>
                  <option value="gm">Goudalle Maçonnerie</option>
                  <option value="cbco">CBCO</option>
                  <option value="sylve">Sylve Support</option>
                </select>
              </div>
            </div>

            <button type="submit" class="btn btn-primary">➕ Créer utilisateur</button>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <h2>Liste des utilisateurs</h2>
        </div>
        <div class="card-body">
          <table id="usersTable">
            <thead>
              <tr>
                <th>Identifiant</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Rôle</th>
                <th>Créé le</th>
                <th>Statut</th>
                <th>Actions</th>
                <th>Accès</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="7" style="text-align:center; padding: 20px;">Chargement...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script>
    function updateEntrepriseVisibility() {
      const niveau = document.getElementById('niveau').value;
      const groupe = document.getElementById('entrepriseGroup');
      const select = document.getElementById('entreprise');
      if (niveau === 'referent') {
        groupe.style.display = '';
        select.required = true;
      } else {
        groupe.style.display = 'none';
        select.required = false;
        select.value = '';
      }
    }

    function showMessage(message, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = message;
      msgDiv.className = `alert alert-${type}`;
      msgDiv.style.display = 'block';
      window.scrollTo(0, 0);
    }

    function handleCreateUser(event) {
      event.preventDefault();

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const niveau = document.getElementById('niveau').value;
      const entreprise = document.getElementById('entreprise').value;

      // Déterminer le rôle final
      let role = niveau;
      if (niveau === 'referent') {
        if (!entreprise) {
          showMessage('❌ Veuillez sélectionner une entreprise pour le rôle référent.', 'error');
          return;
        }
        if (entreprise === 'cbco') role = 'referent_cbco';
        else if (entreprise === 'sylve') role = 'referent_sylve';
        else role = 'referent'; // GM
      }

      const displayName = `${firstName} ${lastName}`;

      let adminCode = null;
      if (role !== 'lecture') {
        adminCode = prompt('Entre le code d\'administration pour créer un compte ' + role + ':');
        if (!adminCode) return;
      }

      const result = Auth.registerUser(username, password, displayName, email, role, adminCode);

      if (result.success) {
        showMessage(result.message, 'success');
        document.getElementById('firstName').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('email').value = '';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('niveau').value = '';
        document.getElementById('entreprise').value = '';
        updateEntrepriseVisibility();
        loadUsers();
      } else {
        showMessage(result.message, 'error');
      }
    }

    function loadUsers() {
      const users = Auth.getUserList();
      const tbody = document.querySelector('#usersTable tbody');

      const roleNames = {
        'direction': '🗝️ Direction',
        'referent': '📊 Référent GM',
        'referent_cbco': '📊 Référent CBCO',
        'referent_sylve': '📊 Référent Sylve',
        'lecture': '👁️ Consultation'
      };


      tbody.innerHTML = users.map(u => {
        const date = new Date(u.createdAt);
        const safeUsername = escapeHtml(u.username);
        const safeName = escapeHtml(u.displayName) || '—';
        const safeEmail = escapeHtml(u.email) || '—';
        return `
          <tr>
            <td><strong>${safeUsername}</strong></td>
            <td>${safeName}</td>
            <td>${safeEmail}</td>
            <td><span class="badge badge-primary">${roleNames[u.role] || escapeHtml(u.role)}</span></td>
            <td><small>${date.toLocaleDateString('fr-FR')}</small></td>
            <td>
              <span class="badge ${u.isActive ? 'badge-success' : 'badge-danger'}">
                ${u.isActive ? '✅ Actif' : '❌ Inactif'}
              </span>
            </td>
            <td>
              ${u.role !== 'direction' 
                ? `<button class="btn btn-small btn-danger" onclick="deleteUser('${safeUsername}')">🗑️ Supprimer</button>` 
                : ''}
            </td>
            <td>
              ${u.role !== 'direction' 
                ? `<button class="btn btn-small btn-secondary" onclick="openAccessModal('${safeUsername}')">Gérer les accès</button>` 
                : ''}
            </td>
          </tr>
        `;
      }).join('');

      if (users.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 20px;">Aucun utilisateur</td></tr>`;
      }
    }

    function deleteUser(username) {
      if (confirm(`⚠️ Supprimer définitivement l'utilisateur "${username}" ? Cette action est irréversible.`)) {
        const result = Auth.deleteUser(username);
        if (result.success) {
          loadUsers();
        } else {
          alert(result.message);
        }
      }
    }

    function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectUsersSecondaryBar();
      loadUsers();
    }

    window.addEventListener('load', init);
  </script>

  <!-- Modale Gérer les accès -->
  <div id="accessModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; overflow:auto;">
    <div style="background:#fff; margin:5% auto; padding:30px; border-radius:10px; max-width:600px; position:relative;">
      <h2 style="margin-top:0;">🔐 Gérer les accès — <span id="accessModalUsername"></span></h2>
      <p style="color:#666; margin-bottom:20px;">Sélectionnez les pages auxquelles cet utilisateur aura accès. Ces permissions s'appliquent en priorité sur celles du rôle.</p>

      <div id="accessCheckboxes" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;"></div>

      <div style="display:flex; gap:10px; justify-content:flex-end; align-items:center;">
        <button class="btn btn-secondary" onclick="resetAccessToRole()">🔄 Réinitialiser selon le rôle</button>
        <button class="btn btn-secondary" onclick="closeAccessModal()">Annuler</button>
        <button class="btn btn-primary" onclick="saveAccessModal()">💾 Enregistrer</button>
      </div>
    </div>
  </div>

  <script>
    const ALL_PAGES = [
      { key: 'gm',            label: '🏗️ Goudalle Maçonnerie' },
      { key: 'gm_saisie',     label: '✏️ GM — Saisie' },
      { key: 'gm_admin',      label: '⚙️ GM — Administration' },
      { key: 'gc',            label: '🪵 Goudalle Charpente' },
      { key: 'gc_saisie',     label: '✏️ GC — Saisie' },
      { key: 'gc_admin',      label: '⚙️ GC — Administration' },
      { key: 'cbco',          label: '🏢 CBCO' },
      { key: 'cbco_saisie',   label: '✏️ CBCO — Saisie' },
      { key: 'cbco_admin',    label: '⚙️ CBCO — Administration' },
      { key: 'sylve',         label: '🌲 Sylve Support' },
      { key: 'sylve_saisie',  label: '✏️ Sylve — Saisie' },
      { key: 'users_admin',   label: '👥 Gestion Utilisateurs' },
      { key: 'thresholds',    label: '📊 Seuils' },
      { key: 'audit',         label: '🔍 Audit' },
    ];

    let _accessUsername = null;

    function openAccessModal(username) {
      _accessUsername = username;
      document.getElementById('accessModalUsername').textContent = username;

      const users = Auth.getAllUsers();
      const user = users[username];
      if (!user) return;

      // Déterminer les permissions effectives
      let currentPerms;
      if (Array.isArray(user.customPermissions)) {
        currentPerms = user.customPermissions;
      } else {
        currentPerms = Auth.PERMISSIONS[user.role] || [];
      }

      const container = document.getElementById('accessCheckboxes');
      container.innerHTML = ALL_PAGES.map(p => `
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; padding:8px; border:1px solid #e0e0e0; border-radius:6px;">
          <input type="checkbox" value="${p.key}" ${currentPerms.includes(p.key) ? 'checked' : ''}>
          ${p.label}
        </label>
      `).join('');

      document.getElementById('accessModal').style.display = 'block';
    }

    function closeAccessModal() {
      document.getElementById('accessModal').style.display = 'none';
      _accessUsername = null;
    }

    function resetAccessToRole() {
      const users = Auth.getAllUsers();
      const user = users[_accessUsername];
      if (!user) return;
      const rolePerms = Auth.PERMISSIONS[user.role] || [];
      document.querySelectorAll('#accessCheckboxes input[type=checkbox]').forEach(cb => {
        cb.checked = rolePerms.includes(cb.value);
      });
    }

    function saveAccessModal() {
      const selected = Array.from(document.querySelectorAll('#accessCheckboxes input[type=checkbox]:checked'))
        .map(cb => cb.value);
      const result = Auth.updateUserPermissions(_accessUsername, selected);
      if (result.success) {
        closeAccessModal();
        showMessage(`✅ Accès de ${_accessUsername} mis à jour.`, 'success');
        loadUsers();
      } else {
        alert(result.message);
      }
    }

    // Fermer la modale en cliquant à l'extérieur
    document.getElementById('accessModal').addEventListener('click', function(e) {
      if (e.target === this) closeAccessModal();
    });
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
