<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Utilisateurs - Intranet Goudalle</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    window.APP_LOGO = 'groupe';
  </script>

  <script>
    Auth.requirePermission('users_admin');
  </script>

  <div class="app-container">
    <div id="sidebar"></div>
    
    <main class="main-content">
      <h1>Gestion des Utilisateurs</h1>

      <div class="card">
        <div class="card-title">
          <h2>Créer un nouvel utilisateur</h2>
        </div>
        <div class="card-body">
          <div id="message" class="alert" style="display:none;"></div>

          <form onsubmit="handleCreateUser(event)">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="form-group">
                <label for="firstName">Prénom *</label>
                <input type="text" id="firstName" required>
              </div>
              <div class="form-group">
                <label for="lastName">Nom *</label>
                <input type="text" id="lastName" required>
              </div>
            </div>

            <div class="form-group">
              <label for="email">Email *</label>
              <input type="email" id="email" required>
            </div>

            <div class="form-group">
              <label for="username">Identifiant *</label>
              <input type="text" id="username" minlength="3" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
              <div class="form-group">
                <label for="password">Mot de passe *</label>
                <input type="password" id="password" minlength="3" required>
              </div>
              <div class="form-group">
                <label for="niveau">Niveau d'accès *</label>
                <select id="niveau" required onchange="updateEntrepriseVisibility()">
                  <option value="">-- Sélectionner --</option>
                  <option value="lecture">👁️ Consultation</option>
                  <option value="referent">📊 Référent</option>
                  <option value="direction">🗝️ Direction</option>
                </select>
              </div>
              <div class="form-group" id="entrepriseGroup" style="display:none;">
                <label for="entreprise">Entreprise *</label>
                <select id="entreprise">
                  <option value="">-- Sélectionner --</option>
                  <option value="gm">Goudalle Maçonnerie</option>
                  <option value="cbco">CBCO</option>
                  <option value="sylve">Sylve Support</option>
                </select>
              </div>
            </div>

            <button type="submit" class="btn btn-primary">➕ Créer utilisateur</button>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <h2>Liste des utilisateurs</h2>
        </div>
        <div class="card-body">
          <table id="usersTable">
            <thead>
              <tr>
                <th>Identifiant</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Rôle</th>
                <th>Créé le</th>
                <th>Statut</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="7" style="text-align:center; padding: 20px;">Chargement...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script>
    function updateEntrepriseVisibility() {
      const niveau = document.getElementById('niveau').value;
      const groupe = document.getElementById('entrepriseGroup');
      const select = document.getElementById('entreprise');
      if (niveau === 'referent') {
        groupe.style.display = '';
        select.required = true;
      } else {
        groupe.style.display = 'none';
        select.required = false;
        select.value = '';
      }
    }

    function showMessage(message, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = message;
      msgDiv.className = `alert alert-${type}`;
      msgDiv.style.display = 'block';
      window.scrollTo(0, 0);
    }

    function handleCreateUser(event) {
      event.preventDefault();

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const niveau = document.getElementById('niveau').value;
      const entreprise = document.getElementById('entreprise').value;

      // Déterminer le rôle final
      let role = niveau;
      if (niveau === 'referent') {
        if (!entreprise) {
          showMessage('❌ Veuillez sélectionner une entreprise pour le rôle référent.', 'error');
          return;
        }
        if (entreprise === 'cbco') role = 'referent_cbco';
        else if (entreprise === 'sylve') role = 'referent_sylve';
        else role = 'referent'; // GM
      }

      const displayName = `${firstName} ${lastName}`;

      let adminCode = null;
      if (role !== 'lecture') {
        adminCode = prompt('Entre le code d\'administration pour créer un compte ' + role + ':');
        if (!adminCode) return;
      }

      const result = Auth.registerUser(username, password, displayName, email, role, adminCode);

      if (result.success) {
        showMessage(result.message, 'success');
        document.getElementById('firstName').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('email').value = '';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('niveau').value = '';
        document.getElementById('entreprise').value = '';
        updateEntrepriseVisibility();
        loadUsers();
      } else {
        showMessage(result.message, 'error');
      }
    }

    function loadUsers() {
      const users = Auth.getUserList();
      const tbody = document.querySelector('#usersTable tbody');

      const roleNames = {
        'direction': '🗝️ Direction',
        'referent': '📊 Référent GM',
        'referent_cbco': '📊 Référent CBCO',
        'referent_sylve': '📊 Référent Sylve',
        'lecture': '👁️ Consultation'
      };

      tbody.innerHTML = users.map(u => {
        const date = new Date(u.createdAt);
        const safeUsername = escapeHtml(u.username);
        const safeName = escapeHtml(u.displayName) || '—';
        const safeEmail = escapeHtml(u.email) || '—';
        const safeRole = roleNames[u.role] || escapeHtml(u.role);
        const status = u.isActive ? '✅ Actif' : '❌ Inactif';
        return `
          <tr>
            <td><strong>${safeUsername}</strong></td>
            <td>${safeName}</td>
            <td>${safeEmail}</td>
            <td><span class="badge badge-primary">${safeRole}</span></td>
            <td><small>${date.toLocaleDateString('fr-FR')}</small></td>
            <td>
              <span class="badge ${u.isActive ? 'badge-success' : 'badge-danger'}">${status}</span>
            </td>
            <td>
              <button class="btn btn-small btn-secondary" onclick="editUser('${safeUsername}')">✏️ Éditer</button>
              ${u.isActive 
                ? `<button class="btn btn-small btn-danger" onclick="disableUser('${safeUsername}')">🔒 Désactiver</button>` 
                : `<button class="btn btn-small btn-success" onclick="enableUser('${safeUsername}')">✅ Réactiver</button>`}
            </td>
          </tr>`;
      }).join('');
      // Modal d'édition avancée (structure, à compléter côté JS)
      if (!document.getElementById('editUserModal')) {
        const modal = document.createElement('div');
        modal.id = 'editUserModal';
        modal.style.display = 'none';
        modal.innerHTML = `
          <div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.25);z-index:1000;display:flex;align-items:center;justify-content:center;">
            <div style="background:#fff;padding:32px 24px;border-radius:8px;min-width:340px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,0.18);position:relative;">
              <button onclick="closeEditUserModal()" style="position:absolute;top:10px;right:10px;font-size:18px;background:none;border:none;cursor:pointer;">✖</button>
              <h2>Édition utilisateur</h2>
              <form id="editUserForm">
                <input type="hidden" id="editUserUsername">
                <!-- À compléter côté JS -->
              </form>
            </div>
          </div>
        `;
        document.body.appendChild(modal);
      }
                    <div class="form-group"><label>Nom complet</label><input type="text" id="editUserDisplayName" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="editUserEmail" required></div>
                    <div class="form-group"><label>Rôle</label>
                      <select id="editUserRole">
                        <option value="direction">🗝️ Direction</option>
                        <option value="referent">📊 Référent GM</option>
                        <option value="referent_cbco">📊 Référent CBCO</option>
                        <option value="referent_sylve">📊 Référent Sylve</option>
                        <option value="lecture">👁️ Consultation</option>
                      </select>
                    </div>
                    <div class="form-group"><label>Mot de passe (laisser vide pour ne pas changer)</label><input type="password" id="editUserPassword"></div>
                    <div class="form-group"><label>Statut</label>
                      <select id="editUserStatus">
                        <option value="active">Actif</option>
                        <option value="inactive">Désactivé</option>
                      </select>
                    </div>
                    <div class="form-group"><label>Accès pages (permissions fines)</label>
                      <div id="editUserPermissions" style="display:flex;flex-wrap:wrap;gap:8px 16px;font-size:13px;"></div>
                    </div>
                    <div style="display:flex;gap:10px;margin-top:18px;">
                      <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
                      <button type="button" class="btn btn-secondary" onclick="closeEditUserModal()">Annuler</button>
                    </div>
                  </form>
                </div>
              </div>
            `;
            document.body.appendChild(modal);
          }
          </tr>
        `;
      }).join('');

      if (users.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 20px;">Aucun utilisateur</td></tr>`;
      }
    }

    function disableUser(username) {
      if (confirm(`Désactiver l'utilisateur ${username} ?`)) {
        const result = Auth.disableUser(username);
        if (result.success) {
          loadUsers();
        }
      }
    }

    function enableUser(username) {
      if (confirm(`Réactiver l'utilisateur ${username} ?`)) {
        const result = Auth.enableUser(username);
        if (result.success) {
          loadUsers();
        }
      }
    }

    function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectUsersSecondaryBar();
      loadUsers();
    }

    window.addEventListener('load', init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
