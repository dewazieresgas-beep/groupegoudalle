<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Utilisateurs - Intranet Goudalle</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    window.APP_LOGO = 'groupe';
  </script>

  <script>
    Auth.requirePermission('users_admin');
  </script>

  <div class="app-container">
    <div id="sidebar"></div>
    
    <main class="main-content">
      <h1>Gestion des Utilisateurs</h1>

      <div class="card">
        <div class="card-title">
          <h2>Créer un nouvel utilisateur</h2>
        </div>
        <div class="card-body">
          <div id="message" class="alert" style="display:none;"></div>

          <form onsubmit="handleCreateUser(event)">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="form-group">
                <label for="firstName">Prénom *</label>
                <input type="text" id="firstName" required>
              </div>
              <div class="form-group">
                <label for="lastName">Nom *</label>
                <input type="text" id="lastName" required>
              </div>
            </div>

            <div class="form-group">
              <label for="email">Email *</label>
              <input type="email" id="email" required>
            </div>

            <div class="form-group">
              <label for="username">Identifiant *</label>
              <input type="text" id="username" minlength="3" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="form-group">
                <label for="password">Mot de passe *</label>
                <input type="password" id="password" minlength="3" required>
              </div>
              <div class="form-group">
                <label for="role">Rôle *</label>
                <select id="role" required>
                  <option value="">-- Sélectionner --</option>
                  <option value="lecture">👁️ Consultation</option>
                  <option value="referent">📊 Référent</option>
                  <option value="direction">🗝️ Direction</option>
                </select>
              </div>
            </div>

            <button type="submit" class="btn btn-primary">➕ Créer utilisateur</button>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <h2>Liste des utilisateurs</h2>
        </div>
        <div class="card-body">
          <table id="usersTable">
            <thead>
              <tr>
                <th>Identifiant</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Rôle</th>
                <th>Créé le</th>
                <th>Statut</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="7" style="text-align:center; padding: 20px;">Chargement...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script>
    function showMessage(message, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = message;
      msgDiv.className = `alert alert-${type}`;
      msgDiv.style.display = 'block';
      window.scrollTo(0, 0);
    }

    function handleCreateUser(event) {
      event.preventDefault();

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;

      const displayName = `${firstName} ${lastName}`;

      let adminCode = null;
      if (role === 'direction' || role === 'referent') {
        adminCode = prompt('Entre le code d\'administration pour créer un compte ' + role + ':');
        if (!adminCode) return;
      }

      const result = Auth.registerUser(username, password, displayName, email, role, adminCode);

      if (result.success) {
        showMessage(result.message, 'success');
        document.getElementById('firstName').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('email').value = '';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('role').value = '';
        loadUsers();
      } else {
        showMessage(result.message, 'error');
      }
    }

    function loadUsers() {
      const users = Auth.getUserList();
      const tbody = document.querySelector('#usersTable tbody');

      const roleNames = {
        'direction': '🗝️ Direction',
        'referent': '📊 Référent',
        'lecture': '👁️ Consultation'
      };

      tbody.innerHTML = users.map(u => {
        const date = new Date(u.createdAt);
        const safeUsername = escapeHtml(u.username);
        const safeName = escapeHtml(u.displayName) || '—';
        const safeEmail = escapeHtml(u.email) || '—';
        return `
          <tr>
            <td><strong>${safeUsername}</strong></td>
            <td>${safeName}</td>
            <td>${safeEmail}</td>
            <td><span class="badge badge-primary">${roleNames[u.role] || escapeHtml(u.role)}</span></td>
            <td><small>${date.toLocaleDateString('fr-FR')}</small></td>
            <td>
              <span class="badge ${u.isActive ? 'badge-success' : 'badge-danger'}">
                ${u.isActive ? '✅ Actif' : '❌ Inactif'}
              </span>
            </td>
            <td>
              ${u.isActive 
                ? `<button class="btn btn-small btn-danger" onclick="disableUser('${safeUsername}')">🔒 Désactiver</button>` 
                : `<button class="btn btn-small btn-success" onclick="enableUser('${safeUsername}')">✅ Réactiver</button>`}
            </td>
          </tr>
        `;
      }).join('');

      if (users.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 20px;">Aucun utilisateur</td></tr>`;
      }
    }

    function disableUser(username) {
      if (confirm(`Désactiver l'utilisateur ${username} ?`)) {
        const result = Auth.disableUser(username);
        if (result.success) {
          loadUsers();
        }
      }
    }

    function enableUser(username) {
      if (confirm(`Réactiver l'utilisateur ${username} ?`)) {
        const result = Auth.enableUser(username);
        if (result.success) {
          loadUsers();
        }
      }
    }

    function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectUsersSecondaryBar();
      loadUsers();
    }

    window.addEventListener('load', init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
