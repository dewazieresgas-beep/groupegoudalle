<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indicateurs RH - Intranet Goudalle</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    :root {
      --rh-ink: #203626;
      --rh-soft: #eef5ef;
      --rh-accent: #4b7856;
      --rh-accent-light: #bdd7c1;
      --rh-alert: #fff4e3;
      --rh-danger: #b14f2d;
    }
    .rh-hero {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      padding: 22px;
      background: linear-gradient(135deg, #f7fbf7 0%, #ebf5ed 55%, #dfeee2 100%);
      border: 1px solid #d4e4d7;
      margin-bottom: 18px;
    }
    .rh-hero::after {
      content: '';
      position: absolute;
      right: -40px;
      top: -40px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(123,169,130,0.28) 0%, rgba(123,169,130,0) 70%);
    }
    .rh-hero-title {
      margin: 0 0 8px 0;
      color: var(--rh-ink);
      font-size: 30px;
    }
    .rh-hero-text {
      margin: 0;
      max-width: 760px;
      color: #506553;
      line-height: 1.5;
    }
    .rh-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .rh-stat {
      background: #fff;
      border: 1px solid #dfe7e0;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 18px rgba(28, 49, 33, 0.05);
    }
    .rh-stat-label {
      color: #647867;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .rh-stat-value {
      color: var(--rh-ink);
      font-size: 32px;
      line-height: 1;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .rh-stat-sub {
      color: #738676;
      font-size: 13px;
    }
    .rh-banner {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--rh-alert);
      border: 1px solid #f1ddb8;
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 16px;
    }
    .rh-banner strong {
      color: #704718;
    }
    .rh-company-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .rh-company-card {
      background: #fff;
      border: 1px solid #dfe7e0;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 22px rgba(24, 43, 28, 0.05);
    }
    .rh-company-title {
      margin: 0 0 14px 0;
      color: var(--rh-ink);
      font-size: 20px;
    }
    .rh-mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .rh-mini {
      background: var(--rh-soft);
      border-radius: 12px;
      padding: 12px;
    }
    .rh-mini .label {
      color: #5e7362;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .rh-mini .value {
      color: var(--rh-ink);
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }
    .rh-mini .sub {
      margin-top: 5px;
      color: #6e8371;
      font-size: 12px;
    }
    .rh-safety-meter {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: linear-gradient(135deg, #edf7ef 0%, #dff0e3 100%);
      border: 1px solid #d2e6d6;
    }
    .rh-safety-meter.alert {
      background: linear-gradient(135deg, #fff3eb 0%, #ffe6d8 100%);
      border-color: #f1c5ad;
    }
    .rh-safety-meter .headline {
      font-size: 14px;
      color: #56705c;
      margin-bottom: 8px;
    }
    .rh-safety-meter .days {
      font-size: 34px;
      color: var(--rh-ink);
      font-weight: 800;
      line-height: 1;
    }
    .rh-safety-meter.alert .days {
      color: var(--rh-danger);
    }
    .rh-section-title {
      margin: 0 0 12px 0;
      color: var(--rh-ink);
    }
    .rh-recent-list {
      display: grid;
      gap: 12px;
    }
    .rh-incident {
      border: 1px solid #dfe7e0;
      border-radius: 14px;
      background: #fff;
      padding: 14px;
    }
    .rh-incident-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }
    .rh-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #edf4ee;
      color: #416247;
      border: 1px solid #d7e5da;
      font-size: 12px;
      font-weight: 600;
    }
    .rh-incident-title {
      font-weight: 700;
      color: var(--rh-ink);
    }
    .rh-incident-meta {
      color: #68806c;
      font-size: 13px;
    }
    .rh-incident-cause {
      color: #455a49;
      line-height: 1.5;
      white-space: pre-wrap;
      margin-top: 8px;
    }
    .rh-empty {
      color: var(--text-muted-dark);
      padding: 20px 0;
    }
    .rh-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 0 0 18px 0;
    }
    .rh-filter {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid #dfe7e0;
      border-radius: 14px;
      box-shadow: 0 8px 18px rgba(28, 49, 33, 0.05);
    }
    .rh-filter label {
      color: #56705c;
      font-size: 13px;
      font-weight: 700;
    }
    .rh-filter select {
      min-width: 150px;
      border: 1px solid #d6e0d7;
      border-radius: 10px;
      padding: 8px 12px;
      background: #f8fbf8;
      color: var(--rh-ink);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>Auth.requirePermission('rh');</script>

  <div class="app-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <div class="d-flex justify-between items-center mb-3" style="gap: 12px; flex-wrap: wrap;">
        <h1 class="mb-0">Indicateurs RH</h1>
        <a href="./rh-securite-saisie.html" id="rhConfigLink" class="btn btn-secondary" style="display:none;">🔗 Lier les Excel sécurité</a>
      </div>

      <div id="pageMessage" class="alert" style="display:none;"></div>

      <section class="rh-hero">
        <h2 class="rh-hero-title">Sécurité du groupe</h2>
        <p class="rh-hero-text">
          Vue consolidée des accidents avec arrêt, du nombre de jours d'arrêt cumulés, du dernier accident enregistré
          et du compteur de jours sans accident pour l'ensemble du groupe puis pour chaque entreprise.
        </p>
      </section>

      <div class="rh-toolbar">
        <div class="rh-filter">
          <label for="exerciseSelect">Exercice affiché</label>
          <select id="exerciseSelect"></select>
        </div>
      </div>

      <div id="rhRoot"></div>
    </main>
  </div>

  <script>
    const RH_HISTORY_START_ISO = '2019-09-01';
    const RH_COMPANIES = [
      { id: 'cbco', label: 'CBCO' },
      { id: 'charpente', label: 'Goudalle Charpente' },
      { id: 'macons', label: 'Goudalle Maçonnerie' }
    ];
    let rhState = {
      incidents: [],
      selectedExercise: null
    };

    function showMessage(msg, type = 'info') {
      const d = document.getElementById('pageMessage');
      d.innerHTML = msg;
      d.className = `alert alert-${type}`;
      d.style.display = 'block';
    }

    function hideMessage() {
      const d = document.getElementById('pageMessage');
      d.style.display = 'none';
      d.innerHTML = '';
    }

    function formatDateFr(iso) {
      if (!iso) return '—';
      const d = new Date(`${iso}T00:00:00Z`);
      if (Number.isNaN(d.getTime())) return iso;
      return d.toLocaleDateString('fr-FR');
    }

    function pluralize(value, singular, plural) {
      return `${value} ${value > 1 ? plural : singular}`;
    }

    function parseIsoDate(iso) {
      if (!iso) return null;
      const d = new Date(`${iso}T00:00:00Z`);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function formatExerciseLabel(startYear) {
      const endShort = String(startYear + 1).slice(-2);
      return `${startYear}/${endShort}`;
    }

    function getHistoryStartDate() {
      return parseIsoDate(RH_HISTORY_START_ISO);
    }

    function getExerciseWindow(startYear) {
      return {
        start: parseIsoDate(startYear === 2019 ? RH_HISTORY_START_ISO : `${startYear}-10-01`),
        end: parseIsoDate(`${startYear + 1}-09-30`)
      };
    }

    function getCurrentExerciseStartYear() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      return month >= 10 ? year : year - 1;
    }

    function buildExerciseOptions(incidents) {
      const years = new Set();
      years.add(2019);
      years.add(getCurrentExerciseStartYear());
      incidents.forEach((incident) => {
        const date = parseIsoDate(incident.accidentDate);
        if (!date) return;
        const month = date.getUTCMonth() + 1;
        const year = date.getUTCFullYear();
        const startYear = year === 2019 && month === 9 ? 2019 : (month >= 10 ? year : year - 1);
        if (startYear >= 2019) years.add(startYear);
      });
      return [...years].sort((a, b) => b - a);
    }

    function filterIncidentsByExercise(incidents, exerciseStartYear) {
      const window = getExerciseWindow(exerciseStartYear);
      if (!window.start || !window.end) return [];
      return incidents.filter((incident) => {
        const date = parseIsoDate(incident.accidentDate);
        return date && date >= window.start && date <= window.end;
      });
    }

    function computeSummaryClient(incidents, referenceStartDate) {
      const today = new Date();
      const todayUtc = new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth(), today.getUTCDate()));
      const periodEndDate = referenceStartDate?.periodEnd || null;
      const periodStartValue = referenceStartDate?.periodStart || referenceStartDate || null;

      function computeLongestGap(sorted, periodStart, periodEnd) {
        if (!(periodStart instanceof Date) || !(periodEnd instanceof Date) || periodEnd < periodStart) return null;
        if (!sorted.length) {
          return Math.max(0, Math.floor((periodEnd.getTime() - periodStart.getTime()) / (24 * 60 * 60 * 1000)));
        }

        let longest = 0;
        let previousPoint = periodStart;

        sorted
          .map((item) => parseIsoDate(item.accidentDate))
          .filter((date) => date instanceof Date)
          .sort((a, b) => a - b)
          .forEach((date) => {
            const gap = Math.max(0, Math.floor((date.getTime() - previousPoint.getTime()) / (24 * 60 * 60 * 1000)));
            longest = Math.max(longest, gap);
            previousPoint = date;
          });

        const finalGap = Math.max(0, Math.floor((periodEnd.getTime() - previousPoint.getTime()) / (24 * 60 * 60 * 1000)));
        return Math.max(longest, finalGap);
      }

      const summarize = (list, label, id = 'group') => {
        const sorted = [...list].sort((a, b) => String(b.accidentDate || '').localeCompare(String(a.accidentDate || '')));
        const latest = sorted[0] || null;
        const latestDate = latest?.accidentDate ? new Date(`${latest.accidentDate}T00:00:00Z`) : null;
        const baseDate = latestDate || periodStartValue || null;
        const rawDaysSince = baseDate ? Math.floor((todayUtc.getTime() - baseDate.getTime()) / (24 * 60 * 60 * 1000)) : null;
        const daysSince = rawDaysSince == null ? null : Math.max(0, rawDaysSince);
        const ongoing = sorted.filter((item) => {
          if (!item.stopStartDate || !item.stopEndDate) return false;
          const start = new Date(`${item.stopStartDate}T00:00:00Z`);
          const end = new Date(`${item.stopEndDate}T00:00:00Z`);
          return start <= todayUtc && end >= todayUtc;
        }).length;
        const longestStreakDays = computeLongestGap(sorted, periodStartValue, periodEndDate || todayUtc);
        const averageStopDays = sorted.length
          ? Number((sorted.reduce((sum, item) => sum + Number(item.stopDays || 0), 0) / Math.max(sorted.filter((item) => Number(item.stopDays || 0) > 0).length || 1, 1)).toFixed(1))
          : 0;
        return {
          id,
          label,
          totalAccidents: sorted.length,
          accidentsAvecArret: sorted.filter((item) => Number(item.stopDays || 0) > 0).length,
          joursArret: sorted.reduce((sum, item) => sum + Number(item.stopDays || 0), 0),
          joursSansAccident: daysSince,
          plusLonguePeriodeSansAccident: longestStreakDays,
          dureeMoyenneArret: averageStopDays,
          dernierAccidentDate: latest?.accidentDate || null,
          dernierAccidentNom: latest?.employeeName || null,
          accidentsEnCours: ongoing
        };
      };

      return {
        group: summarize(incidents, 'Groupe Goudalle'),
        companies: RH_COMPANIES.map((company) => summarize(
          incidents.filter((incident) => incident.companyId === company.id),
          company.label,
          company.id
        ))
      };
    }

    function renderExerciseSelect(options, selected) {
      const select = document.getElementById('exerciseSelect');
      select.innerHTML = options.map((startYear) => `
        <option value="${startYear}" ${startYear === selected ? 'selected' : ''}>${formatExerciseLabel(startYear)}</option>
      `).join('');
    }

    function renderStatCard(label, value, sub) {
      return `
        <div class="rh-stat">
          <div class="rh-stat-label">${label}</div>
          <div class="rh-stat-value">${value}</div>
          <div class="rh-stat-sub">${sub || ''}</div>
        </div>
      `;
    }

    function renderCompanyCard(company, isClosedExercise) {
      const days = isClosedExercise ? company.plusLonguePeriodeSansAccident : company.joursSansAccident;
      const alertClass = days !== null && days < 30 ? ' alert' : '';
      const fourthBlock = isClosedExercise
        ? `
            <div class="rh-mini">
              <div class="label">Durée moyenne arrêt</div>
              <div class="value">${company.dureeMoyenneArret}</div>
              <div class="sub">jours par arrêt</div>
            </div>
          `
        : `
            <div class="rh-mini">
              <div class="label">Arrêts en cours</div>
              <div class="value">${company.accidentsEnCours}</div>
              <div class="sub">aujourd'hui</div>
            </div>
          `;
      const meterHeadline = isClosedExercise ? 'Plus longue période sans accident' : 'Jours sans accident';
      const meterSub = isClosedExercise
        ? `Dernier accident de l'exercice : ${company.dernierAccidentDate ? `${formatDateFr(company.dernierAccidentDate)}${company.dernierAccidentNom ? ` · ${escapeHtml(company.dernierAccidentNom)}` : ''}` : 'aucun'}`
        : `Dernier accident : ${company.dernierAccidentDate ? `${formatDateFr(company.dernierAccidentDate)}${company.dernierAccidentNom ? ` · ${escapeHtml(company.dernierAccidentNom)}` : ''}` : 'aucun'}`;
      return `
        <article class="rh-company-card">
          <h3 class="rh-company-title">${escapeHtml(company.label)}</h3>

          <div class="rh-mini-grid">
            <div class="rh-mini">
              <div class="label">Accidents</div>
              <div class="value">${company.totalAccidents}</div>
              <div class="sub">${pluralize(company.totalAccidents, 'accident', 'accidents')}</div>
            </div>
            <div class="rh-mini">
              <div class="label">Avec arrêt</div>
              <div class="value">${company.accidentsAvecArret}</div>
              <div class="sub">${pluralize(company.accidentsAvecArret, 'arrêt', 'arrêts')}</div>
            </div>
            <div class="rh-mini">
              <div class="label">Jours d'arrêt</div>
              <div class="value">${company.joursArret}</div>
              <div class="sub">cumulés</div>
            </div>
            ${fourthBlock}
          </div>

          <div class="rh-safety-meter${alertClass}">
            <div class="headline">${meterHeadline}</div>
            <div class="days">${days == null ? '—' : days}</div>
            <div class="rh-stat-sub" style="margin-top:8px;">
              ${meterSub}
            </div>
          </div>
        </article>
      `;
    }

    function renderRecentIncident(item) {
      const stopLabel = item.stopDays ? `${item.stopDays} jour${item.stopDays > 1 ? 's' : ''} d'arrêt` : 'Sans durée d\'arrêt renseignée';
      return `
        <article class="rh-incident">
          <div class="rh-incident-top">
            <div>
              <div class="rh-incident-title">${escapeHtml(item.employeeName || 'Salarié non renseigné')}</div>
              <div class="rh-incident-meta">${escapeHtml(item.companyLabel || '—')} · ${formatDateFr(item.accidentDate)}</div>
            </div>
            <span class="rh-chip">${stopLabel}</span>
          </div>
          <div class="rh-incident-meta">Arrêt : ${item.stopRaw ? escapeHtml(item.stopRaw) : 'non renseigné'}</div>
          <div class="rh-incident-cause">${escapeHtml(item.cause || 'Cause non renseignée')}</div>
        </article>
      `;
    }

    function renderDashboard() {
      const exerciseOptions = buildExerciseOptions(rhState.incidents);
      if (!rhState.selectedExercise || !exerciseOptions.includes(rhState.selectedExercise)) {
        rhState.selectedExercise = exerciseOptions[0] || getCurrentExerciseStartYear();
      }
      renderExerciseSelect(exerciseOptions, rhState.selectedExercise);

      const exerciseLabel = formatExerciseLabel(rhState.selectedExercise);
      const filteredIncidents = filterIncidentsByExercise(rhState.incidents, rhState.selectedExercise);
      const exerciseWindow = getExerciseWindow(rhState.selectedExercise);
      const now = new Date();
      const todayUtc = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
      const isClosedExercise = exerciseWindow.end instanceof Date && exerciseWindow.end < todayUtc;
      const summaryPayload = computeSummaryClient(filteredIncidents, {
        periodStart: exerciseWindow.start || getHistoryStartDate(),
        periodEnd: isClosedExercise ? exerciseWindow.end : todayUtc
      });
      const root = document.getElementById('rhRoot');
      const group = summaryPayload.group || {
        totalAccidents: 0,
        accidentsAvecArret: 0,
        joursArret: 0,
        joursSansAccident: null,
        dernierAccidentDate: null,
        accidentsEnCours: 0
      };
      const companies = summaryPayload.companies || [];
      const recentIncidents = filteredIncidents.slice(0, 8);
      const entreprisesTouchees = companies.filter((company) => company.totalAccidents > 0).length;
      const groupCards = isClosedExercise
        ? `
            ${renderStatCard('Accidents enregistrés', group.totalAccidents, `exercice ${exerciseLabel}`)}
            ${renderStatCard('Accidents avec arrêt', group.accidentsAvecArret, 'arrêts renseignés')}
            ${renderStatCard('Jours d’arrêt cumulés', group.joursArret, 'toutes entreprises')}
            ${renderStatCard('Entreprises touchées', entreprisesTouchees, 'sur l’exercice')}
          `
        : `
            ${renderStatCard('Accidents enregistrés', group.totalAccidents, `exercice ${exerciseLabel}`)}
            ${renderStatCard('Accidents avec arrêt', group.accidentsAvecArret, 'arrêts renseignés')}
            ${renderStatCard('Jours d’arrêt cumulés', group.joursArret, 'toutes entreprises')}
            ${renderStatCard('Arrêts en cours', group.accidentsEnCours, 'sur cet exercice')}
          `;
      const bannerTitle = isClosedExercise
        ? (group.plusLonguePeriodeSansAccident == null
            ? `Exercice ${exerciseLabel} clôturé`
            : `Plus longue période sans accident : ${group.plusLonguePeriodeSansAccident} jour${group.plusLonguePeriodeSansAccident > 1 ? 's' : ''}`)
        : (group.joursSansAccident == null
            ? `Aucun accident enregistré sur ${exerciseLabel}`
            : `${group.joursSansAccident} jour${group.joursSansAccident > 1 ? 's' : ''} sans accident`);
      const bannerSub = isClosedExercise
        ? `Dernier accident de l'exercice : ${group.dernierAccidentDate ? `${formatDateFr(group.dernierAccidentDate)}${group.dernierAccidentNom ? ` · ${escapeHtml(group.dernierAccidentNom)}` : ''}` : 'aucun'}`
        : `Dernier accident groupe : ${group.dernierAccidentDate ? `${formatDateFr(group.dernierAccidentDate)}${group.dernierAccidentNom ? ` · ${escapeHtml(group.dernierAccidentNom)}` : ''}` : 'aucun'}`;

      root.innerHTML = `
        <section class="card">
          <div class="card-title">
            <h2>Vue groupe</h2>
          </div>
          <div class="card-body">
            <div class="rh-grid">
              ${groupCards}
            </div>

            <div class="rh-banner">
              <div>
                <strong>${bannerTitle}</strong>
                <div style="color:#8a6a37; margin-top:4px;">
                  ${bannerSub}
                </div>
              </div>
              <div class="rh-chip">Exercice ${exerciseLabel}</div>
            </div>
          </div>
        </section>

        <section class="card" style="margin-top:18px;">
          <div class="card-title">
            <h2>Par entreprise</h2>
          </div>
          <div class="card-body">
            <div class="rh-company-grid">
              ${companies.map((company) => renderCompanyCard(company, isClosedExercise)).join('')}
            </div>
          </div>
        </section>

        <section class="card" style="margin-top:18px;">
          <div class="card-title">
            <h2>Accidents de l'exercice</h2>
          </div>
          <div class="card-body">
            ${recentIncidents.length ? `
              <div class="rh-recent-list">
                ${recentIncidents.map(renderRecentIncident).join('')}
              </div>
            ` : `
              <div class="rh-empty">Aucun accident enregistré sur l'exercice ${exerciseLabel}.</div>
            `}
          </div>
        </section>
      `;
    }

    async function loadDashboard() {
      hideMessage();
      const [incidentsRes, cfgRes] = await Promise.all([
        fetch(SERVER_URL + '/rh-security-incidents', { cache: 'no-store' }),
        fetch(SERVER_URL + '/rh-security-excel-config', { cache: 'no-store' })
      ]);

      const incidents = await incidentsRes.json();
      const cfg = await cfgRes.json();

      if (Auth.hasAccess('rh_security_admin')) {
        document.getElementById('rhConfigLink').style.display = 'inline-flex';
      }

      if (!cfg || !cfg.active) {
        showMessage('⚠️ Aucun fichier Excel sécurité n’est encore lié. Connecte les 3 fichiers depuis la page de liaison RH.', 'warning');
      }

      const historyStart = getHistoryStartDate();
      rhState.incidents = (Array.isArray(incidents) ? incidents : []).filter((incident) => {
        const date = parseIsoDate(incident.accidentDate);
        return date && (!historyStart || date >= historyStart);
      });
      renderDashboard();
    }

    function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectRHSecondaryBar();
      document.getElementById('exerciseSelect').addEventListener('change', (event) => {
        rhState.selectedExercise = Number(event.target.value);
        renderDashboard();
      });
      loadDashboard().catch((e) => showMessage(`❌ Erreur de chargement RH : ${e.message}`, 'danger'));
    }

    window.onServerReady(init);
  </script>
</body>
</html>
