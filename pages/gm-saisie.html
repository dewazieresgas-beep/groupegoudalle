<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synchronisation Excel - Intranet Goudalle</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script> window.APP_LOGO = 'maconnerie'; </script>
  <script> Auth.requirePermission('gm_saisie'); </script>

  <div class="app-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <div class="d-flex justify-between items-center mb-3" style="gap:12px; flex-wrap:wrap;">
        <h1 class="mb-0">Synchronisation Excel - Goudalle Maçonnerie</h1>
        <button type="button" class="btn btn-secondary" onclick="downloadGMIndicators()">📥 Télécharger indicateurs</button>
      </div>

      <div id="pageMessage" class="alert" style="display:none;"></div>

      <!-- ═══ BLOC : CONFIG (formulaire unique, verrouillé après connexion) ═══ -->
      <div id="blockConfig" class="card">
        <div class="card-title">
          <h2 id="cfgCardTitle">🔗 Connexion fichier Excel</h2>
        </div>
        <div class="card-body">
          <form onsubmit="handleConnect(event)" id="cfgForm">
            <div class="form-group">
              <label for="cfgFolder">📁 Chemin du dossier</label>
              <input type="text" id="cfgFolder" value="Z:\03-BE\Projet en cours\Gaspard" required>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
              <div class="form-group">
                <label for="cfgFilename">📄 Nom du fichier</label>
                <input type="text" id="cfgFilename" value="INDICATEURS Goudalle Maçonnerie.xlsx" required>
              </div>
              <div class="form-group">
                <label for="cfgSheet">📋 Nom de la feuille</label>
                <input type="text" id="cfgSheet" value="Données indicateurs" required>
              </div>
            </div>
            <div id="cfgLastSync" style="display:none; font-size:13px; color:var(--text-light); margin-bottom:12px;">
              Dernière sync : <strong id="cfgDisplayLastSync">—</strong>
            </div>
            <div style="display:flex; gap:10px;">
              <button type="submit" id="btnConnect" class="btn btn-success" style="flex:1; padding:14px; font-size:15px;">
                🔗 Connecter et synchroniser
              </button>
              <button type="button" id="btnModifier" class="btn btn-secondary" style="display:none;" onclick="unlockConfig()">
                ✏️ Modifier
              </button>
              <button type="button" id="btnForceSync" class="btn btn-primary" style="display:none;" onclick="handleForceSync()">
                🔄 Sync maintenant
              </button>
              <button type="button" id="btnDesync" class="btn btn-danger" style="display:none;" onclick="handleDesync()">
                🔌 Désynchroniser
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- ═══ TABLEAU DES INDICATEURS ═══ -->
      <div class="card" style="margin-top:20px;">
        <div class="card-title"><h2>Indicateurs importés - Goudalle Maçonnerie</h2></div>
        <div class="card-body">
          <table id="kpiTable">
            <thead>
              <tr>
                <th>Semaine</th>
                <th>m³</th>
                <th>Heures MO</th>
                <th>h/m³</th>
                <th>Béton</th>
                <th>Aciers</th>
                <th>Chargement</th>
                <th>Centrale</th>
                <th>Commentaire</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="10" style="text-align:center; padding:20px;">Chargement...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    function showMessage(msg, type) {
      const d = document.getElementById('pageMessage');
      d.innerHTML = msg;
      d.className = `alert alert-${type}`;
      d.style.display = 'block';
      window.scrollTo(0, 0);
    }

    function loadKPIs() {
      const kpis = getKPIs().sort(compareByYearWeekDesc);
      const tbody = document.querySelector('#kpiTable tbody');
      tbody.innerHTML = kpis.map(k => {
        const ratio = calculateRatio(k.hours, k.m3);
        const smiley = getSmiley(ratio);
        return `<tr>
          <td><strong>S${String(k.week).padStart(2,'0')}/${k.year}</strong></td>
          <td>${k.m3 != null ? parseFloat(k.m3).toFixed(2) : '—'}</td>
          <td>${k.hours != null ? parseFloat(k.hours).toFixed(2) : '—'}</td>
          <td><span class="badge badge-${smiley}">${ratio !== null ? ratio.toFixed(2) : '—'} ${getSmileyEmoji(smiley)}</span></td>
          <td>${k.tempsBeton != null ? k.tempsBeton : '—'}</td>
          <td>${k.tempsAciers != null ? k.tempsAciers : '—'}</td>
          <td>${k.tempsChargement != null ? k.tempsChargement : '—'}</td>
          <td>${k.tempsCentrale != null ? k.tempsCentrale : '—'}</td>
          <td><small style="white-space:pre-wrap;">${escapeHtml(k.comment || '')}</small></td>
        </tr>`;
      }).join('');
      if (kpis.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:20px;">Aucun indicateur — connectez un fichier Excel ci-dessus</td></tr>`;
      }
    }

    function downloadGMIndicators() {
      window.open(`${getBasePath()}pages/gm.html?download=1`, '_blank');
    }

    // ── Verrouille le formulaire après connexion réussie ──
    function lockConfig(cfg) {
      ['cfgFolder','cfgFilename','cfgSheet'].forEach(id => {
        document.getElementById(id).disabled = true;
      });
      document.getElementById('btnConnect').style.display = 'none';
      document.getElementById('btnModifier').style.display = 'inline-flex';
      document.getElementById('btnForceSync').style.display = 'inline-flex';
      document.getElementById('btnDesync').style.display = 'inline-flex';
      document.getElementById('cfgCardTitle').textContent = '✅ Synchronisation active';
      document.getElementById('cfgLastSync').style.display = 'block';
      if (cfg && cfg.lastSync) {
        document.getElementById('cfgDisplayLastSync').textContent = new Date(cfg.lastSync).toLocaleString('fr-FR');
      }
    }

    // ── Déverrouille le formulaire pour modification ──
    function unlockConfig() {
      ['cfgFolder','cfgFilename','cfgSheet'].forEach(id => {
        document.getElementById(id).disabled = false;
      });
      document.getElementById('btnConnect').style.display = 'inline-flex';
      document.getElementById('btnModifier').style.display = 'none';
      document.getElementById('btnForceSync').style.display = 'none';
      document.getElementById('btnDesync').style.display = 'none';
      document.getElementById('cfgCardTitle').textContent = '✏️ Modifier la connexion';
      document.getElementById('cfgLastSync').style.display = 'none';
    }

    // ── Charger la config depuis le serveur ──
    async function loadConfig() {
      try {
        const res = await fetch(SERVER_URL + '/gm-excel-config', { cache: 'no-store' });
        const cfg = await res.json();
        if (cfg && cfg.active) {
          document.getElementById('cfgFolder').value   = cfg.folder;
          document.getElementById('cfgFilename').value = cfg.filename;
          document.getElementById('cfgSheet').value    = cfg.sheet;
          lockConfig(cfg);
        }
      } catch { /* pas de config, formulaire reste déverrouillé */ }
    }

    // ── Connecter et faire le premier import ──
    async function handleConnect(event) {
      event.preventDefault();
      const btn = document.getElementById('btnConnect');
      btn.textContent = '⏳ Connexion...'; btn.disabled = true;
      const body = {
        folder:   document.getElementById('cfgFolder').value.trim(),
        filename: document.getElementById('cfgFilename').value.trim(),
        sheet:    document.getElementById('cfgSheet').value.trim()
      };
      try {
        const res = await fetch(SERVER_URL + '/gm-excel-config', {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const result = await res.json();
        if (!result.success) { showMessage(`❌ ${result.error}`, 'error'); return; }
        showMessage(`✅ Connexion réussie ! ${result.result.added} semaine(s) ajoutée(s), ${result.result.updated} mise(s) à jour. La synchronisation est maintenant automatique.`, 'success');
        lockConfig({ folder: body.folder, filename: body.filename, sheet: body.sheet, lastSync: new Date().toISOString() });
        loadKPIs();
        showMessage(`❌ Erreur : ${e.message}`, 'error');
      } finally {
        btn.textContent = '🔗 Connecter et synchroniser'; btn.disabled = false;
      }
    }

    // ── Forcer une synchronisation immédiate ──
    async function handleForceSync() {
      try {
        const res = await fetch(SERVER_URL + '/gm-import-excel', { method: 'POST' });
        const result = await res.json();
        if (!result.success) { showMessage(`❌ ${result.error}`, 'error'); return; }
        showMessage(`✅ Synchronisation effectuée — ${result.result.added} ajouté(s), ${result.result.updated} mis à jour.`, 'success');
        document.getElementById('cfgDisplayLastSync').textContent = new Date().toLocaleString('fr-FR');
        loadKPIs();
      } catch (e) {
        showMessage(`❌ Erreur : ${e.message}`, 'error');
      }
    }

    // ── Désynchroniser ──
    async function handleDesync() {
      if (!confirm('Désynchroniser le fichier Excel ? Les données déjà importées sont conservées.')) return;
      try {
        await fetch(SERVER_URL + '/gm-excel-config', { method: 'DELETE' });
        showMessage('🔌 Désynchronisé. Vous pouvez connecter un nouveau fichier.', 'success');
        unlockConfig();
      } catch (e) {
        showMessage(`❌ Erreur : ${e.message}`, 'error');
      }
    }

    function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectGMSecondaryBar();
      loadConfig();
      loadKPIs();
    }

    window.onServerReady(init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
