<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBCO - Paiements en attente</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .pe-table {
      width: 100%;
      table-layout: fixed;
      font-size: 0.78em;
    }
    .pe-table th,
    .pe-table td {
      padding: 8px 6px;
      vertical-align: middle;
    }
    .pe-table th:nth-child(1) { width: 18%; }
    .pe-table th:nth-child(2) { width: 10%; }
    .pe-table th:nth-child(3),
    .pe-table th:nth-child(4),
    .pe-table th:nth-child(5),
    .pe-table th:nth-child(6) { width: 10%; }
    .pe-table th:nth-child(7),
    .pe-table th:nth-child(8) { width: 8%; }
    .pe-table th:nth-child(9) { width: 16%; }

    .pe-cell {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .pe-cell input[type="checkbox"] {
      flex: 0 0 auto;
      margin: 0;
    }
    .pe-cell input[type="number"] {
      min-width: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    window.APP_LOGO = 'cbco';
  </script>

  <script>
    Auth.requirePermission('cbco_saisie');
  </script>

  <div class="app-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <div class="d-flex justify-between items-center mb-3" style="gap: 12px; flex-wrap: wrap;">
        <h1 class="mb-0">Paiements en attente - CBCO</h1>
      </div>

      <div id="message" class="alert" style="display:none;"></div>
      <div id="content"></div>
    </main>
  </div>

  <script>
    const ENTREPRISE_ID = 'cbco';
    const ENTREPRISE_LABEL = 'CBCO';
    const ENTREPRISE_LOGO = '../assets/cbco.png';
    const MONTHS = ['', 'Janvier', 'Fevrier', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Aout', 'Septembre', 'Octobre', 'Novembre', 'Decembre'];

    function showMessage(message, type) {
      const msg = document.getElementById('message');
      msg.textContent = message;
      msg.className = `alert alert-${type}`;
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 2200);
    }

    function parseInputNumber(val) {
      if (!val) return 0;
      const cleaned = String(val).replace(/\s/g, '').replace(',', '.');
      const n = parseFloat(cleaned);
      return Number.isFinite(n) ? n : 0;
    }

    function getRetard(client) {
      return (client.j1_30 || 0) + (client.j31_45 || 0) + (client.j46_60 || 0) + (client.j61_plus || 0);
    }

    function formatInputNumber(value) {
      const n = Number(value) || 0;
      return n ? (Math.round(n * 100) / 100).toString() : '';
    }

    function applyRowRules(row) {
      const retard = parseInputNumber(row.dataset.retard);
      const reasonFields = ['sansRaison', 'avecReserves', 'rgAttente', 'litiges', 'solde', 'acompte'];
      const checks = {};
      const inputs = {};

      reasonFields.forEach(field => {
        checks[field] = row.querySelector(`[data-check="${field}"]`);
        inputs[field] = row.querySelector(`[data-field="${field}"]`);
      });

      const checked = reasonFields.filter(f => checks[f] && checks[f].checked);

      if (checked.includes('solde') || checked.includes('acompte')) {
        row.style.backgroundColor = '';
      } else if (checked.includes('litiges')) {
        row.style.backgroundColor = '#fde2e2';
      } else if (checked.includes('sansRaison')) {
        row.style.backgroundColor = '#e8f6e8';
      } else if (checked.includes('avecReserves')) {
        row.style.backgroundColor = '#fff0dc';
      } else {
        row.style.backgroundColor = '';
      }

      if (checked.length === 1) {
        reasonFields.forEach(field => {
          const isSelected = checked[0] === field;
          inputs[field].value = isSelected ? formatInputNumber(retard) : '';
          inputs[field].readOnly = true;
          inputs[field].disabled = true;
        });
      } else if (checked.length > 1) {
        reasonFields.forEach(field => {
          const isSelected = checked.includes(field);
          inputs[field].readOnly = !isSelected;
          inputs[field].disabled = !isSelected;
          if (!isSelected) inputs[field].value = '';
        });
      } else {
        reasonFields.forEach(field => {
          inputs[field].value = '';
          inputs[field].readOnly = true;
          inputs[field].disabled = true;
        });
      }
    }

    function saveRow(row, importId) {
      const compte = row.dataset.compte;
      const payload = {
        chkSansRaison: !!row.querySelector('[data-check="sansRaison"]').checked,
        chkAvecReserves: !!row.querySelector('[data-check="avecReserves"]').checked,
        chkRgAttente: !!row.querySelector('[data-check="rgAttente"]').checked,
        chkLitiges: !!row.querySelector('[data-check="litiges"]').checked,
        chkSolde: !!row.querySelector('[data-check="solde"]').checked,
        chkAcompte: !!row.querySelector('[data-check="acompte"]').checked,
        sansRaison: parseInputNumber(row.querySelector('[data-field="sansRaison"]').value),
        avecReserves: parseInputNumber(row.querySelector('[data-field="avecReserves"]').value),
        rgAttente: parseInputNumber(row.querySelector('[data-field="rgAttente"]').value),
        litiges: parseInputNumber(row.querySelector('[data-field="litiges"]').value),
        solde: parseInputNumber(row.querySelector('[data-field="solde"]').value),
        acompte: parseInputNumber(row.querySelector('[data-field="acompte"]').value),
        commentaire: row.querySelector('[data-field="commentaire"]').value || ''
      };
      saveSylvePaiementAttente(ENTREPRISE_ID, importId, compte, payload);
      showMessage('Sauvegarde effectuee', 'success');
    }

    function render() {
      const imp = getSylveLastImport(ENTREPRISE_ID);
      const root = document.getElementById('content');

      if (!imp || !imp.clients || imp.clients.length === 0) {
        root.innerHTML = `<div class="card"><div class="card-body"><p style="margin:0; color:#999;">Aucun import Sylve disponible pour ${ENTREPRISE_LABEL}.</p></div></div>`;
        return;
      }

      const clients = imp.clients
        .map(c => ({ ...c, retard: getRetard(c) }))
        .filter(c => c.retard > 0)
        .sort((a, b) => b.retard - a.retard);

      const periode = `${MONTHS[imp.mois] || '?'} ${imp.annee}`;

      const rows = clients.map(c => {
        const note = getSylvePaiementAttente(ENTREPRISE_ID, imp.id, c.compte);
        const chkSansRaison = !!(note.chkSansRaison || note.sansRaison > 0);
        const chkAvecReserves = !!(note.chkAvecReserves || note.avecReserves > 0);
        const chkRgAttente = !!(note.chkRgAttente || note.rgAttente > 0);
        const chkLitiges = !!(note.chkLitiges || note.litiges > 0);
        const chkSolde = !!(note.chkSolde || note.solde > 0);
        const chkAcompte = !!(note.chkAcompte || note.acompte > 0);
        return `
          <tr data-compte="${escapeHtml(c.compte)}" data-retard="${c.retard}">
            <td><strong>${escapeHtml(c.client)}</strong></td>
            <td style="font-weight:600; white-space:nowrap;">${formatSylveEuros(c.retard)}</td>
            <td><div class="pe-cell"><input type="checkbox" class="pe-reason-check" data-check="sansRaison" ${chkSansRaison ? 'checked' : ''}><input type="number" step="0.01" class="form-control pe-reason-input" data-field="sansRaison" value="${formatInputNumber(note.sansRaison)}"></div></td>
            <td><div class="pe-cell"><input type="checkbox" class="pe-reason-check" data-check="avecReserves" ${chkAvecReserves ? 'checked' : ''}><input type="number" step="0.01" class="form-control pe-reason-input" data-field="avecReserves" value="${formatInputNumber(note.avecReserves)}"></div></td>
            <td><div class="pe-cell"><input type="checkbox" class="pe-reason-check" data-check="rgAttente" ${chkRgAttente ? 'checked' : ''}><input type="number" step="0.01" class="form-control pe-reason-input" data-field="rgAttente" value="${formatInputNumber(note.rgAttente)}"></div></td>
            <td><div class="pe-cell"><input type="checkbox" class="pe-reason-check" data-check="litiges" ${chkLitiges ? 'checked' : ''}><input type="number" step="0.01" class="form-control pe-reason-input" data-field="litiges" value="${formatInputNumber(note.litiges)}"></div></td>
            <td><div class="pe-cell"><input type="checkbox" class="pe-reason-check" data-check="solde" ${chkSolde ? 'checked' : ''}><input type="number" step="0.01" class="form-control pe-reason-input" data-field="solde" value="${formatInputNumber(note.solde)}"></div></td>
            <td><div class="pe-cell"><input type="checkbox" class="pe-reason-check" data-check="acompte" ${chkAcompte ? 'checked' : ''}><input type="number" step="0.01" class="form-control pe-reason-input" data-field="acompte" value="${formatInputNumber(note.acompte)}"></div></td>
            <td><input type="text" class="form-control pe-save-input" data-field="commentaire" value="${escapeHtml(note.commentaire || '')}"></td>
          </tr>
        `;
      }).join('');

      root.innerHTML = `
        <div class="card">
          <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
            <div style="display:flex; align-items:center; gap:10px;">
              <img src="${ENTREPRISE_LOGO}" alt="${ENTREPRISE_LABEL}" style="height:24px;">
              <h2 style="margin:0;">${ENTREPRISE_LABEL}</h2>
            </div>
            <span class="badge badge-primary">Import: ${periode} - ${clients.length} clients en retard</span>
          </div>
          <div class="card-body" style="overflow:auto;">
            <table class="pe-table">
              <thead>
                <tr>
                  <th style="text-align:center;">Client</th>
                  <th style="text-align:center;">Retard total</th>
                  <th style="text-align:center;">DÛ<br>sans raison</th>
                  <th style="text-align:center;">DÛ<br>avec reserves</th>
                  <th style="text-align:center;">DÛ<br>RG en attente</th>
                  <th style="text-align:center;">DÛ<br>litiges</th>
                  <th style="text-align:center;">Soldé</th>
                  <th style="text-align:center;">Acompte sur encours</th>
                  <th style="text-align:center;">Commentaire</th>
                </tr>
              </thead>
              <tbody>${rows || '<tr><td colspan="9" style="text-align:center; color:#999;">Aucun client en retard</td></tr>'}</tbody>
            </table>
          </div>
        </div>
      `;

      root.querySelectorAll('tbody tr[data-compte]').forEach(row => {
        applyRowRules(row);
        row.querySelectorAll('.pe-reason-check').forEach(chk => {
          chk.addEventListener('change', () => {
            applyRowRules(row);
            saveRow(row, imp.id);
          });
        });
        row.querySelectorAll('.pe-reason-input, .pe-save-input').forEach(input => {
          input.addEventListener('change', () => saveRow(row, imp.id));
        });
      });
    }

    function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectCBCOSecondaryBar();
      render();
    }

    window.addEventListener('load', init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
