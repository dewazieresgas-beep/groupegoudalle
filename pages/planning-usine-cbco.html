<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Usine CBCO - Intranet</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    #pdfContainer {
      width: 100%;
      height: calc(100vh - 120px);
      background: #f5f5f5;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #pdfCanvas {
      display: block;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    #pdfControls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border-radius: 8px;
      padding: 12px 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 10;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pdf-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.9em;
      transition: background 0.2s;
    }

    .pdf-btn:hover {
      background: var(--accent-hover);
    }

    .pdf-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #zoomValue {
      font-size: 0.9em;
      min-width: 60px;
      text-align: center;
      font-weight: 600;
    }

    #loadingSpinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 5;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #noPdfMessage {
      text-align: center;
      color: #999;
      font-size: 1.1em;
    }

    #noPdfMessage a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    #noPdfMessage a:hover {
      text-decoration: underline;
    }

    .fullscreen-btn {
      background: var(--primary) !important;
    }

    .fullscreen-btn:hover {
      background: #2980b9 !important;
    }
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    window.APP_LOGO = 'cbco';
  </script>
  <script>
    Auth.requirePermission('production_saisie_productivite');
  </script>

  <div class="app-container">
    <div id="sidebar"></div>
    <main class="main-content">
      <h1>📋 Planning Usine CBCO</h1>
      
      <div style="background:#e8f4f8; border-left:4px solid var(--accent); padding:12px; margin-bottom:16px; border-radius:4px; font-size:0.9em;">
        <strong>Raccourcis :</strong>
        🔍+/− = Zoom | Ctrl+Molette = Zoom | 🖱️Drag = Déplacement (quand zoomé) | 📄 Adapter = Ajuster à la page | ⛶ Plein écran
      </div>
      
      <div id="pdfContainer">
        <div id="loadingSpinner" style="display:none;">
          <div class="spinner"></div>
          <p>Chargement du planning...</p>
        </div>
        <canvas id="pdfCanvas"></canvas>
        <div id="noPdfMessage" style="display:none;">
          <p>📭 Aucun planning de production importé</p>
          <p style="font-size:0.9em; color:#666; margin-top:10px;">
            Allez à la page <a href="production-saisie-productivite-usine.html">Saisie Productivité Usine</a> pour importer un PDF
          </p>
        </div>
      </div>

      <div id="pdfControls" style="display:none;">
        <button class="pdf-btn" id="zoomOutBtn" onclick="zoomOut()">🔍−</button>
        <span id="zoomValue">100%</span>
        <button class="pdf-btn" id="zoomInBtn" onclick="zoomIn()">🔍+</button>
        <span style="color:#ccc; margin: 0 5px;">|</span>
        <button class="pdf-btn" id="fitPageBtn" onclick="fitPage()">📄 Adapter</button>
        <button class="pdf-btn" id="resetBtn" onclick="resetView()">↺ Réinitialiser</button>
        <span style="color:#ccc; margin: 0 5px;">|</span>
        <button class="pdf-btn fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()">⛶ Plein écran</button>
      </div>
    </main>
  </div>

  <script src="../js/planning-pdf.js"></script>
  <script>
    function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectProductionSecondaryBar();
      initPlanningViewer();
    }

    window.onServerReady(init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
