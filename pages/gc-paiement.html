<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goudalle Charpente - Paiements en attente</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    window.APP_LOGO = 'charpente';
  </script>

  <script>
    Auth.requirePermission('gm_saisie');
  </script>

  <div class="app-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <div class="d-flex justify-between items-center mb-3" style="gap: 12px; flex-wrap: wrap;">
        <h1 class="mb-0">Paiements en attente - Goudalle Charpente</h1>
      </div>

      <div id="message" class="alert" style="display:none;"></div>
      <div id="content"></div>
    </main>
  </div>

  <script>
    const ENTREPRISE_ID = 'gc';
    const ENTREPRISE_LABEL = 'Goudalle Charpente';
    const ENTREPRISE_LOGO = '../assets/goudalle-charpente.png';
    const MONTHS = ['', 'Janvier', 'Fevrier', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Aout', 'Septembre', 'Octobre', 'Novembre', 'Decembre'];

    function showMessage(message, type) {
      const msg = document.getElementById('message');
      msg.textContent = message;
      msg.className = `alert alert-${type}`;
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 2200);
    }

    function parseInputNumber(val) {
      if (!val) return 0;
      const cleaned = String(val).replace(/\s/g, '').replace(',', '.');
      const n = parseFloat(cleaned);
      return Number.isFinite(n) ? n : 0;
    }

    function getRetard(client) {
      return (client.j1_30 || 0) + (client.j31_45 || 0) + (client.j46_60 || 0) + (client.j61_plus || 0);
    }

    function render() {
      const imp = getSylveLastImport(ENTREPRISE_ID);
      const root = document.getElementById('content');

      if (!imp || !imp.clients || imp.clients.length === 0) {
        root.innerHTML = `<div class="card"><div class="card-body"><p style="margin:0; color:#999;">Aucun import Sylve disponible pour ${ENTREPRISE_LABEL}.</p></div></div>`;
        return;
      }

      const clients = imp.clients
        .map(c => ({ ...c, retard: getRetard(c) }))
        .filter(c => c.retard > 0)
        .sort((a, b) => b.retard - a.retard);

      const periode = `${MONTHS[imp.mois] || '?'} ${imp.annee}`;

      const rows = clients.map(c => {
        const note = getSylvePaiementAttente(ENTREPRISE_ID, imp.id, c.compte);
        return `
          <tr data-compte="${escapeHtml(c.compte)}">
            <td><strong>${escapeHtml(c.client)}</strong></td>
            <td style="font-weight:600; white-space:nowrap;">${formatSylveEuros(c.retard)}</td>
            <td><input type="number" step="0.01" class="form-control pe-input" data-field="sansRaison" value="${note.sansRaison || ''}"></td>
            <td><input type="number" step="0.01" class="form-control pe-input" data-field="avecReserves" value="${note.avecReserves || ''}"></td>
            <td><input type="number" step="0.01" class="form-control pe-input" data-field="rgAttente" value="${note.rgAttente || ''}"></td>
            <td><input type="number" step="0.01" class="form-control pe-input" data-field="litiges" value="${note.litiges || ''}"></td>
            <td><input type="number" step="0.01" class="form-control pe-input" data-field="solde" value="${note.solde || ''}"></td>
            <td><input type="number" step="0.01" class="form-control pe-input" data-field="acompte" value="${note.acompte || ''}"></td>
            <td><input type="text" class="form-control pe-input" data-field="commentaire" value="${escapeHtml(note.commentaire || '')}"></td>
          </tr>
        `;
      }).join('');

      root.innerHTML = `
        <div class="card">
          <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
            <div style="display:flex; align-items:center; gap:10px;">
              <img src="${ENTREPRISE_LOGO}" alt="${ENTREPRISE_LABEL}" style="height:24px;">
              <h2 style="margin:0;">${ENTREPRISE_LABEL}</h2>
            </div>
            <span class="badge badge-primary">Import: ${periode} - ${clients.length} clients en retard</span>
          </div>
          <div class="card-body" style="overflow:auto;">
            <table style="font-size:0.86em; min-width:1450px;">
              <thead>
                <tr>
                  <th style="text-align:center;">Client</th>
                  <th style="text-align:center;">Retard total</th>
                  <th style="text-align:center;">DÛ<br>sans raison</th>
                  <th style="text-align:center;">DÛ<br>avec reserves</th>
                  <th style="text-align:center;">DÛ<br>RG en attente</th>
                  <th style="text-align:center;">DÛ<br>litiges</th>
                  <th style="text-align:center;">Soldé</th>
                  <th style="text-align:center;">Acompte sur encours</th>
                  <th style="text-align:center;">Commentaire</th>
                </tr>
              </thead>
              <tbody>${rows || '<tr><td colspan="9" style="text-align:center; color:#999;">Aucun client en retard</td></tr>'}</tbody>
            </table>
          </div>
        </div>
      `;

      root.querySelectorAll('.pe-input').forEach(input => {
        input.addEventListener('change', () => {
          const tr = input.closest('tr');
          const compte = tr.dataset.compte;
          const payload = {
            sansRaison: parseInputNumber(tr.querySelector('[data-field="sansRaison"]').value),
            avecReserves: parseInputNumber(tr.querySelector('[data-field="avecReserves"]').value),
            rgAttente: parseInputNumber(tr.querySelector('[data-field="rgAttente"]').value),
            litiges: parseInputNumber(tr.querySelector('[data-field="litiges"]').value),
            solde: parseInputNumber(tr.querySelector('[data-field="solde"]').value),
            acompte: parseInputNumber(tr.querySelector('[data-field="acompte"]').value),
            commentaire: tr.querySelector('[data-field="commentaire"]').value || ''
          };
          saveSylvePaiementAttente(ENTREPRISE_ID, imp.id, compte, payload);
          showMessage('Sauvegarde effectuee', 'success');
        });
      });
    }

    function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectGCSecondaryBar();
      render();
    }

    window.addEventListener('load', init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
