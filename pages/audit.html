<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal d'Audit - Intranet Goudalle</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    window.APP_LOGO = 'groupe';
  </script>

  <script>
    Auth.requirePermission('audit');
  </script>

  <div class="app-container">
    <div id="sidebar"></div>
    
    <main class="main-content">
      <h1>Journal d'Audit – Indicateurs</h1>

      <div class="card">
        <div class="card-title">
          <h2>Historique des saisies d'indicateurs</h2>
        </div>
        <div class="card-body">
          <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <select id="filterType" class="form-group" style="flex:1; margin:0; padding:10px; min-width: 140px;">
              <option value="">Tous les indicateurs</option>
              <option value="gm">Goudalle Maçonnerie</option>
              <option value="cbco">CBCO</option>
            </select>
            <select id="filterAction" class="form-group" style="flex:1; margin:0; padding:10px; min-width: 140px;">
              <option value="">Toutes les actions</option>
              <option value="saved">Ajout / Modification</option>
              <option value="published">Publication</option>
              <option value="deleted">Suppression</option>
            </select>
            <input type="text" id="filterUser" placeholder="Filtrer par utilisateur..." class="form-group" style="flex:1; margin:0; padding:10px;">
            <button onclick="applyFilters()" class="btn btn-secondary">🔍 Filtrer</button>
            <button onclick="clearFilters()" class="btn btn-secondary">✖️ Réinitialiser</button>
          </div>

          <table id="auditTable">
            <thead>
              <tr>
                <th>Date/Heure</th>
                <th>Action</th>
                <th>Utilisateur</th>
                <th>Détails</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="4" style="text-align:center; padding: 20px;">Chargement...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <h2>Statistiques indicateurs</h2>
        </div>
        <div class="card-body">
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
            <div style="background: #f0f4ff; padding: 20px; border-radius: 8px; text-align: center;">
              <div style="font-size: 12px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 0.5px;">Total saisies</div>
              <div style="font-size: 28px; font-weight: 700; color: #667eea;" id="totalEntries">—</div>
            </div>
            <div style="background: #f0f4ff; padding: 20px; border-radius: 8px; text-align: center;">
              <div style="font-size: 12px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 0.5px;">Indicateurs GM sauvegardés</div>
              <div style="font-size: 28px; font-weight: 700; color: #27ae60;" id="kpiSavedCount">—</div>
            </div>
            <div style="background: #f0f4ff; padding: 20px; border-radius: 8px; text-align: center;">
              <div style="font-size: 12px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 0.5px;">CBCO sauvegardés</div>
              <div style="font-size: 28px; font-weight: 700; color: #f39c12;" id="cbcoSavedCount">—</div>
            </div>
            <div style="background: #f0f4ff; padding: 20px; border-radius: 8px; text-align: center;">
              <div style="font-size: 12px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 0.5px;">Suppressions</div>
              <div style="font-size: 28px; font-weight: 700; color: #e74c3c;" id="deleteCount">—</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Actions d'indicateurs uniquement
    const INDICATOR_ACTIONS = ['KPI_SAVED', 'KPI_PUBLISHED', 'KPI_DELETED', 'CBCO_SAVED', 'CBCO_DELETED'];
    let allAuditData = [];

    function loadAudit() {
      document.getElementById('sidebar').innerHTML = getSidebar();

      // Ne garder que les actions liées aux indicateurs
      allAuditData = Auth.getAuditTrail()
        .filter(entry => INDICATOR_ACTIONS.includes(entry.action))
        .reverse();

      displayAudit(allAuditData);
      updateStats();
    }

    /**
     * Affiche les entrées d'audit dans le tableau
     * @param {Array} data - Liste des entrées d'audit à afficher
     */
    function displayAudit(data) {
      const tbody = document.querySelector('#auditTable tbody');

      const actionLabels = {
        'KPI_SAVED': { label: 'Ajout/Modif indicateur', color: '#27ae60', bg: 'rgba(39, 174, 96, 0.15)' },
        'KPI_PUBLISHED': { label: 'Publication indicateur', color: '#3498db', bg: 'rgba(52, 152, 219, 0.15)' },
        'KPI_DELETED': { label: 'Suppression indicateur', color: '#e74c3c', bg: 'rgba(231, 76, 60, 0.15)' },
        'CBCO_SAVED': { label: 'Ajout/Modif CBCO', color: '#f39c12', bg: 'rgba(243, 156, 18, 0.15)' },
        'CBCO_DELETED': { label: 'Suppression CBCO', color: '#e74c3c', bg: 'rgba(231, 76, 60, 0.15)' },
      };

      tbody.innerHTML = data.map(entry => {
        const date = new Date(entry.timestamp);
        const dateStr = date.toLocaleString('fr-FR');
        const info = actionLabels[entry.action] || { label: entry.action, color: '#667eea', bg: 'rgba(102,126,234,0.2)' };

        return `
          <tr>
            <td><small>${dateStr}</small></td>
            <td>
              <span class="badge badge-primary" style="background: ${info.bg}; color: ${info.color};">
                ${info.label}
              </span>
            </td>
            <td><strong>${entry.user}</strong></td>
            <td><small>${entry.details}</small></td>
          </tr>
        `;
      }).join('');

      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 20px;">Aucune entrée</td></tr>`;
      }
    }

    /**
     * Calcule et affiche les statistiques de l'audit
     * - Nombre total d'entrées
     * - Nombre de connexions
     * - Nombre d'indicateurs créés
     * - Nombre d'utilisateurs actifs
     */
    function updateStats() {
      document.getElementById('totalEntries').textContent = allAuditData.length;
      document.getElementById('kpiSavedCount').textContent = allAuditData.filter(a => a.action === 'KPI_SAVED' || a.action === 'KPI_PUBLISHED').length;
      document.getElementById('cbcoSavedCount').textContent = allAuditData.filter(a => a.action === 'CBCO_SAVED').length;
      document.getElementById('deleteCount').textContent = allAuditData.filter(a => a.action === 'KPI_DELETED' || a.action === 'CBCO_DELETED').length;
    }

    /**
     * Applique les filtres sur les données d'audit
     * Filtre par action et/ou utilisateur (recherche insensible à la casse)
     */
    function applyFilters() {
      const type = document.getElementById('filterType').value;
      const actionFilter = document.getElementById('filterAction').value;
      const user = document.getElementById('filterUser').value.toLowerCase();

      const filtered = allAuditData.filter(entry => {
        // Filtre par type d'indicateur
        if (type === 'gm' && !entry.action.startsWith('KPI_')) return false;
        if (type === 'cbco' && !entry.action.startsWith('CBCO_')) return false;

        // Filtre par type d'action
        if (actionFilter === 'saved' && !entry.action.endsWith('_SAVED')) return false;
        if (actionFilter === 'published' && !entry.action.endsWith('_PUBLISHED')) return false;
        if (actionFilter === 'deleted' && !entry.action.endsWith('_DELETED')) return false;

        // Filtre par utilisateur
        if (user && !entry.user.toLowerCase().includes(user)) return false;

        return true;
      });

      displayAudit(filtered);
    }

    /**
     * Réinitialise les filtres et affiche toutes les données
     */
    function clearFilters() {
      document.getElementById('filterType').value = '';
      document.getElementById('filterAction').value = '';
      document.getElementById('filterUser').value = '';
      displayAudit(allAuditData);
    }

    // ===== INITIALISATION =====
    window.addEventListener('load', loadAudit);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
