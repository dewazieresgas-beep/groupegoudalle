<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saisies indicateurs - Goudalle Charpente</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    window.APP_LOGO = 'charpente';
  </script>

  <script>
    Auth.requirePermission('gc_saisie');
  </script>

  <div class="app-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <div class="d-flex justify-between items-center mb-3" style="gap: 12px; flex-wrap: wrap;">
        <h1 class="mb-0">Saisies indicateurs - Goudalle Charpente</h1>
      </div>

      <div class="card">
        <div class="card-title">
          <h2>Contenu en preparation</h2>
        </div>
        <div class="card-body">
          <p style="color: #666;">Page de saisie vide pour le module Goudalle Charpente.</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectGCSecondaryBar();
    }

    window.onServerReady(init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
