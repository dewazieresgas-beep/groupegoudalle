<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Déclaration accident - Intranet</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .form-section {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-light, #e5e7eb);
    }
    .form-section:last-child { border-bottom: none; margin-bottom: 0; }
    .form-section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-light, #6b7280);
      margin-bottom: 14px;
    }
    .field-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .field-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) {
      .field-grid-2, .field-grid-3, .field-grid-4 { grid-template-columns: 1fr; }
    }
    .conditional-block {
      background: var(--lighter, #f9fafb);
      border: 1px solid var(--border-light, #e5e7eb);
      border-radius: 10px;
      padding: 16px;
      margin-top: 12px;
    }
    .admin-section {
      margin-top: 28px;
      border: 1px dashed var(--border, #d1d5db);
      border-radius: 10px;
      padding: 16px;
    }
    .admin-section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted-dark, #9ca3af);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>Auth.requirePermission('rh');</script>

  <div class="app-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <div class="d-flex justify-between items-center mb-3" style="gap:12px; flex-wrap:wrap;">
        <h1 class="mb-0">Déclarer un accident du travail</h1>
      </div>

      <div id="pageMessage" class="alert" style="display:none;"></div>

      <div class="card">
        <div class="card-title">
          <h2>📝 Formulaire de déclaration</h2>
        </div>
        <div class="card-body">
          <form id="accidentForm" onsubmit="handleSubmit(event)">

            <!-- Entreprise -->
            <div class="form-section">
              <div class="form-section-title">Entreprise concernée</div>
              <div class="form-group">
                <label for="fCompany">Entreprise *</label>
                <select id="fCompany" required>
                  <option value="">— Sélectionner —</option>
                  <option value="cbco">Concept Bois Côte d'Opale (CBCO)</option>
                  <option value="charpente">Goudalle Charpente</option>
                  <option value="macons">Nouvelle Goudalle Maçonnerie</option>
                  <option value="sylve">Sylve Data</option>
                </select>
              </div>
            </div>

            <!-- Salarié -->
            <div class="form-section">
              <div class="form-section-title">Salarié</div>
              <div class="field-grid-3">
                <div class="form-group">
                  <label for="fNom">Nom *</label>
                  <input type="text" id="fNom" placeholder="NOM" required style="text-transform:uppercase;">
                </div>
                <div class="form-group">
                  <label for="fPrenom">Prénom</label>
                  <input type="text" id="fPrenom" placeholder="Prénom">
                </div>
                <div class="form-group">
                  <label for="fStatut">Statut *</label>
                  <select id="fStatut" required>
                    <option value="">— Sélectionner —</option>
                    <option value="CDI/CDD">CDI / CDD</option>
                    <option value="Intérimaire">Intérimaire</option>
                    <option value="Apprenti">Apprenti</option>
                    <option value="Stagiaire">Stagiaire</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Accident -->
            <div class="form-section">
              <div class="form-section-title">Accident</div>
              <div class="field-grid-2">
                <div class="form-group">
                  <label for="fDate">Date de l'accident *</label>
                  <input type="date" id="fDate" required>
                </div>
                <div class="form-group">
                  <label for="fType">Type d'accident *</label>
                  <select id="fType" required>
                    <option value="">— Sélectionner —</option>
                    <option value="AT Travail">AT Travail</option>
                    <option value="AT Trajet">AT Trajet</option>
                    <option value="Maladie Professionnelle">Maladie Professionnelle</option>
                    <option value="Accident Bénin">Accident Bénin</option>
                  </select>
                </div>
              </div>

              <div class="field-grid-2" style="margin-top:12px;">
                <div class="form-group">
                  <label for="fGravite">Gravité *</label>
                  <select id="fGravite" required onchange="handleGraviteChange()">
                    <option value="">— Sélectionner —</option>
                    <option value="Sans arrêt">Sans arrêt</option>
                    <option value="Soins ponctuels">Soins ponctuels</option>
                    <option value="Avec arrêt">Avec arrêt</option>
                    <option value="IPP">IPP</option>
                    <option value="Décès">Décès</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="fCause">Cause principale *</label>
                  <select id="fCause" required>
                    <option value="">— Sélectionner —</option>
                    <option value="Chute de plain-pied">Chute de plain-pied</option>
                    <option value="Chute de hauteur">Chute de hauteur</option>
                    <option value="Manutention manuelle">Manutention manuelle</option>
                    <option value="Heurt / Collision">Heurt / Collision</option>
                    <option value="Coupure / Piqûre">Coupure / Piqûre</option>
                    <option value="Écrasement">Écrasement</option>
                    <option value="Projection">Projection</option>
                    <option value="Sur-effort / TMS">Sur-effort / TMS</option>
                    <option value="Brûlure">Brûlure</option>
                    <option value="Électrisation">Électrisation</option>
                    <option value="Produit chimique">Produit chimique</option>
                    <option value="Autre">Autre</option>
                  </select>
                </div>
              </div>

              <div class="form-group" style="margin-top:12px;">
                <label for="fDescription">Description de l'accident</label>
                <textarea id="fDescription" rows="3" placeholder="Décrire les circonstances de l'accident..."></textarea>
              </div>
            </div>

            <!-- Lésion -->
            <div class="form-section">
              <div class="form-section-title">Lésion</div>
              <div class="field-grid-2">
                <div class="form-group">
                  <label for="fSiege">Siège de la lésion</label>
                  <select id="fSiege">
                    <option value="">— Sélectionner —</option>
                    <option value="Tête / Visage">Tête / Visage</option>
                    <option value="Œil">Œil</option>
                    <option value="Épaule">Épaule</option>
                    <option value="Bras / Jambe">Bras / Jambe</option>
                    <option value="Poignet">Poignet</option>
                    <option value="Main / Doigt">Main / Doigt</option>
                    <option value="Dos / Colonne">Dos / Colonne</option>
                    <option value="Thorax / Abdomen">Thorax / Abdomen</option>
                    <option value="Hanche / Cuisse">Hanche / Cuisse</option>
                    <option value="Genou">Genou</option>
                    <option value="Cheville">Cheville</option>
                    <option value="Pied">Pied</option>
                    <option value="Multiple">Multiple</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="fNature">Nature de la lésion</label>
                  <select id="fNature">
                    <option value="">— Sélectionner —</option>
                    <option value="Plaie / Coupure">Plaie / Coupure</option>
                    <option value="Fracture">Fracture</option>
                    <option value="Entorse / Luxation">Entorse / Luxation</option>
                    <option value="Contusion / Hématome">Contusion / Hématome</option>
                    <option value="Brûlure">Brûlure</option>
                    <option value="Douleur / TMS">Douleur / TMS</option>
                    <option value="Corps étranger">Corps étranger</option>
                    <option value="Malaise / Convulsion">Malaise / Convulsion</option>
                    <option value="Autre">Autre</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Arrêt de travail (conditionnel) -->
            <div id="blockArret" style="display:none;" class="form-section">
              <div class="form-section-title">Arrêt de travail</div>
              <div class="conditional-block">
                <div class="field-grid-3">
                  <div class="form-group">
                    <label for="fDebutArret">Début de l'arrêt</label>
                    <input type="date" id="fDebutArret">
                  </div>
                  <div class="form-group">
                    <label for="fFinArret">Fin prévue de l'arrêt</label>
                    <input type="date" id="fFinArret">
                  </div>
                  <div class="form-group">
                    <label for="fProlongation">Prolongation jusqu'au</label>
                    <input type="date" id="fProlongation">
                  </div>
                </div>
                <div id="joursArretPreview" style="margin-top:10px; font-size:13px; color:var(--text-light);"></div>
              </div>
            </div>

            <!-- Soins ponctuels (conditionnel) -->
            <div id="blockSoins" style="display:none;" class="form-section">
              <div class="form-section-title">Soins ponctuels</div>
              <div class="conditional-block">
                <div class="field-grid-2">
                  <div class="form-group">
                    <label for="fDebutSoins">Début des soins</label>
                    <input type="date" id="fDebutSoins">
                  </div>
                  <div class="form-group">
                    <label for="fFinSoins">Fin des soins</label>
                    <input type="date" id="fFinSoins">
                  </div>
                </div>
              </div>
            </div>

            <!-- Bouton -->
            <div style="margin-top: 24px;">
              <button type="submit" id="btnSubmit" class="btn btn-success" style="padding:12px 28px; font-size:15px;">
                ✅ Enregistrer l'accident dans Excel
              </button>
            </div>

          </form>
        </div>
      </div>

      <!-- Section admin (config dossier) -->
      <div id="adminSection" style="display:none;">
        <div class="admin-section">
          <div class="admin-section-title">⚙️ Configuration administrateur — Dossier des fichiers Excel</div>
          <form onsubmit="handleConnectFolder(event)" style="display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;">
            <div class="form-group" style="flex:1; min-width:300px; margin-bottom:0;">
              <label for="cfgFolder">Chemin du dossier</label>
              <input type="text" id="cfgFolder"
                placeholder="ex: W:\RH paie\ADMINISTRATIF PAIE\Aministratif\accident\TABLEAU ACCIDENTS DU TRAVAIL toutes societes">
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
              <button type="submit" id="btnCfgConnect" class="btn btn-primary" style="white-space:nowrap;">🔗 Connecter</button>
              <button type="button" id="btnCfgSync" class="btn btn-secondary" style="display:none; white-space:nowrap;" onclick="handleForceSync()">🔄 Sync</button>
              <button type="button" id="btnCfgDesync" class="btn btn-danger" style="display:none; white-space:nowrap;" onclick="handleDesync()">🔌 Désynchroniser</button>
            </div>
          </form>
          <div id="cfgStatus" style="margin-top:10px; font-size:13px; color:var(--text-light);"></div>
        </div>
      </div>

    </main>
  </div>

  <script>
    function showMessage(msg, type) {
      const d = document.getElementById('pageMessage');
      d.innerHTML = msg;
      d.className = `alert alert-${type}`;
      d.style.display = 'block';
      window.scrollTo(0, 0);
    }

    function handleGraviteChange() {
      const g = document.getElementById('fGravite').value;
      const showArret = g === 'Avec arrêt' || g === 'IPP';
      const showSoins = g === 'Soins ponctuels';
      document.getElementById('blockArret').style.display = showArret ? '' : 'none';
      document.getElementById('blockSoins').style.display = showSoins ? '' : 'none';
      updateJoursArretPreview();
    }

    function updateJoursArretPreview() {
      const debut = document.getElementById('fDebutArret').value;
      const fin = document.getElementById('fFinArret').value;
      const prolongation = document.getElementById('fProlongation').value;
      const preview = document.getElementById('joursArretPreview');
      if (!debut) { preview.textContent = ''; return; }
      const start = new Date(debut);
      const endStr = prolongation || fin;
      if (!endStr) { preview.textContent = 'Renseigner la fin d\'arrêt pour calculer la durée.'; return; }
      const end = new Date(endStr);
      const jours = Math.max(0, Math.floor((end - start) / 86400000) + 1);
      preview.textContent = `→ ${jours} jour${jours > 1 ? 's' : ''} d'arrêt${prolongation ? ' (avec prolongation)' : ''}`;
    }

    document.getElementById('fDebutArret').addEventListener('change', updateJoursArretPreview);
    document.getElementById('fFinArret').addEventListener('change', updateJoursArretPreview);
    document.getElementById('fProlongation').addEventListener('change', updateJoursArretPreview);

    async function getWriteHeaders() {
      const res = await fetch(SERVER_URL + '/health', { cache: 'no-store' });
      const payload = await res.json();
      const headers = { 'Content-Type': 'application/json' };
      if (payload?.token) headers['x-goudalle-token'] = payload.token;
      return headers;
    }

    async function handleSubmit(event) {
      event.preventDefault();
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.textContent = '⏳ Enregistrement...';

      const gravite = document.getElementById('fGravite').value;
      const showArret = gravite === 'Avec arrêt' || gravite === 'IPP';
      const showSoins = gravite === 'Soins ponctuels';

      const body = {
        companyId:    document.getElementById('fCompany').value,
        nom:          document.getElementById('fNom').value.trim().toUpperCase(),
        prenom:       document.getElementById('fPrenom').value.trim(),
        statut:       document.getElementById('fStatut').value,
        dateAccident: document.getElementById('fDate').value,
        type:         document.getElementById('fType').value,
        gravite,
        cause:        document.getElementById('fCause').value,
        description:  document.getElementById('fDescription').value.trim(),
        siege:        document.getElementById('fSiege').value || null,
        nature:       document.getElementById('fNature').value || null,
        debutArret:   showArret ? (document.getElementById('fDebutArret').value || null) : null,
        finArret:     showArret ? (document.getElementById('fFinArret').value || null) : null,
        prolongation: showArret ? (document.getElementById('fProlongation').value || null) : null,
        soins:        showSoins ? 'Oui' : null,
        debutSoins:   showSoins ? (document.getElementById('fDebutSoins').value || null) : null,
        finSoins:     showSoins ? (document.getElementById('fFinSoins').value || null) : null,
      };

      try {
        const headers = await getWriteHeaders();
        const res = await fetch(SERVER_URL + '/rh-security-add-accident', {
          method: 'POST',
          headers,
          body: JSON.stringify(body)
        });
        const result = await res.json();
        if (!result.success) {
          showMessage(`❌ ${result.error}`, 'error');
          return;
        }
        showMessage(
          `✅ Accident enregistré dans le fichier Excel (ligne ${result.row}, N°${result.num}). ` +
          `${result.incidentCount} accident(s) au total.`,
          'success'
        );
        event.target.reset();
        handleGraviteChange();
        document.getElementById('fDate').value = new Date().toISOString().slice(0, 10);
      } catch (e) {
        showMessage(`❌ Erreur : ${e.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '✅ Enregistrer l\'accident dans Excel';
      }
    }

    /* ─── Admin : config dossier ───────────────────────────────────── */

    async function loadConfig() {
      try {
        const res = await fetch(SERVER_URL + '/rh-security-excel-config', { cache: 'no-store' });
        const cfg = await res.json();
        if (cfg && cfg.active) {
          document.getElementById('cfgFolder').value = cfg.folder || '';
          document.getElementById('cfgStatus').innerHTML =
            `<span style="color:green;">✅ Connecté</span> — Dossier&nbsp;: <code>${escapeHtml(cfg.folder)}</code>` +
            (cfg.lastSync ? ` — Dernière sync&nbsp;: ${new Date(cfg.lastSync).toLocaleString('fr-FR')}` : '');
          document.getElementById('cfgFolder').disabled = true;
          document.getElementById('btnCfgConnect').style.display = 'none';
          document.getElementById('btnCfgSync').style.display = 'inline-flex';
          document.getElementById('btnCfgDesync').style.display = 'inline-flex';
        } else {
          document.getElementById('cfgStatus').textContent = '⚠️ Aucun dossier connecté.';
        }
      } catch { /* ignore */ }
    }

    async function handleConnectFolder(event) {
      event.preventDefault();
      const folder = document.getElementById('cfgFolder').value.trim();
      if (!folder) return;
      const btn = document.getElementById('btnCfgConnect');
      btn.disabled = true; btn.textContent = '⏳...';
      try {
        const headers = await getWriteHeaders();
        const res = await fetch(SERVER_URL + '/rh-security-excel-config', {
          method: 'PUT',
          headers,
          body: JSON.stringify({ folder })
        });
        const result = await res.json();
        if (!result.success) {
          document.getElementById('cfgStatus').innerHTML = `<span style="color:red;">❌ ${escapeHtml(result.error)}</span>`;
          return;
        }
        showMessage(`✅ Dossier connecté — ${result.incidentCount} accident(s) importé(s).`, 'success');
        loadConfig();
      } catch (e) {
        document.getElementById('cfgStatus').innerHTML = `<span style="color:red;">❌ ${escapeHtml(e.message)}</span>`;
      } finally {
        btn.disabled = false; btn.textContent = '🔗 Connecter';
      }
    }

    async function handleForceSync() {
      try {
        const res = await fetch(SERVER_URL + '/rh-security-import-excel', { method: 'POST' });
        const result = await res.json();
        if (result.success) {
          showMessage(`✅ Sync effectuée — ${result.incidentCount} accident(s).`, 'success');
          loadConfig();
        } else {
          showMessage(`❌ ${result.error}`, 'error');
        }
      } catch (e) {
        showMessage(`❌ ${e.message}`, 'error');
      }
    }

    async function handleDesync() {
      if (!confirm('Désynchroniser le dossier Excel ?')) return;
      await fetch(SERVER_URL + '/rh-security-excel-config', { method: 'DELETE' });
      document.getElementById('cfgFolder').disabled = false;
      document.getElementById('cfgFolder').value = '';
      document.getElementById('btnCfgConnect').style.display = 'inline-flex';
      document.getElementById('btnCfgSync').style.display = 'none';
      document.getElementById('btnCfgDesync').style.display = 'none';
      document.getElementById('cfgStatus').textContent = 'Désynchronisé.';
    }

    function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectRHSecondaryBar();
      // Mettre la date du jour par défaut
      document.getElementById('fDate').value = new Date().toISOString().slice(0, 10);
      // Section admin visible uniquement pour rh_security_admin
      if (Auth.hasAccess('rh_security_admin')) {
        document.getElementById('adminSection').style.display = 'block';
        loadConfig();
      }
    }

    window.onServerReady(init);
  </script>
</body>
</html>
