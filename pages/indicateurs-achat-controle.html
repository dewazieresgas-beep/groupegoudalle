<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contrôle imports achats - Intranet Goudalle</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .achat-table-wrap { overflow-x: auto; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width: 980px) { .grid-2 { grid-template-columns:1fr; } }
    .muted { color:#666; font-size:13px; }
    .chip {
      display:inline-block; padding:2px 8px; border-radius:999px;
      border:1px solid #cfd8cf; background:#f4f7f4; font-size:12px;
    }
    .invoice-list {
      border:1px solid #d9d9d9;
      border-radius:12px;
      overflow:hidden;
      background:#fff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.05);
    }
    .invoice-item { border-bottom:1px solid #e6e6e6; background:#fff; }
    .invoice-item:last-child { border-bottom:none; }
    .invoice-row {
      width:100%; border:none; background:#fff; padding:0; cursor:pointer;
      text-align:left; font:inherit;
    }
    .invoice-row:hover { background:#f8fbf8; }
    .invoice-row-grid {
      display:grid;
      grid-template-columns: 5% 9% 18% 13% 43% 12%;
      gap:8px;
      padding:12px 14px;
      align-items:center;
    }
    .invoice-row-grid.head {
      background:linear-gradient(180deg, #f6f6ef 0%, #efefe7 100%);
      font-weight:700;
      cursor:default;
    }
    .invoice-item.open .invoice-row-grid { background:#f3faf3; }
    .invoice-item.open .invoice-summary { font-weight:700; }
    .invoice-toggle {
      display:inline-flex; align-items:center; justify-content:center;
      width:24px; height:24px; border-radius:999px; border:1px solid #d7ded7; background:#fff;
      color:#3d5540; font-size:12px; transition: transform .2s ease, background-color .2s ease;
    }
    .invoice-item.open .invoice-toggle { transform: rotate(90deg); background:#e9f3e9; }
    .line-count {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:24px; height:22px; padding:0 8px; border-radius:999px;
      border:1px solid #d0d7d0; background:#f4f8f4; color:#38503b; font-size:12px;
    }
    .invoice-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
      background:#fcfcfc;
    }
    .invoice-detail.open { border-top:1px solid #e5e5e5; }
    .invoice-detail-inner { padding:12px 14px 14px; }
    .invoice-detail table { width:100%; border-collapse:collapse; table-layout:fixed; background:#fff; }
    .invoice-detail th {
      text-align:left; padding:8px 6px; border-bottom:1px solid #d9d9d9; background:#f8f8f8;
    }
    .invoice-detail td {
      padding:8px 6px; border-bottom:1px solid #ececec; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .invoice-detail tr:last-child td { border-bottom:none; }
    .hidden { display:none !important; }
    .num { text-align:right; font-variant-numeric: tabular-nums; }
    .mono { font-family: Consolas, monospace; }
    .invoice-summary { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    @media (max-width: 980px) {
      .invoice-row-grid { grid-template-columns: 7% 17% 24% 16% 22% 14%; font-size:12px; }
      .invoice-detail table { font-size:12px; }
    }
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>Auth.requireAuth();</script>

  <div class="app-container">
    <div id="sidebar"></div>
    <main class="main-content">
      <div class="d-flex justify-between items-center mb-3" style="gap:12px; flex-wrap:wrap;">
        <h1 class="mb-0">Contrôle imports achats</h1>
      </div>

      <div id="pageMessage" class="alert" style="display:none;"></div>

      <div class="card">
        <div class="card-title"><h2>Batch import</h2></div>
        <div class="card-body">
          <div class="grid-2">
            <div>
              <label for="batchSelect">Sélectionner un import :</label>
              <select id="batchSelect"></select>
            </div>
            <div style="align-self:end;">
              <button id="btnReload" class="btn btn-secondary">🔄 Recharger</button>
            </div>
          </div>
          <p class="muted" id="batchInfo"></p>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><h2>Reconstruction visuelle PDF</h2></div>
        <div class="card-body" id="renderPreview"></div>
      </div>
    </main>
  </div>

  <script>
    const API = window.location.origin + '/api';

    function showMessage(msg, type='info') {
      const el = document.getElementById('pageMessage');
      el.innerHTML = msg;
      el.className = `alert alert-${type}`;
      el.style.display = 'block';
    }

    function clearMessage() {
      const el = document.getElementById('pageMessage');
      el.style.display = 'none';
      el.innerHTML = '';
    }

    function fmt(v) {
      if (v == null || v === '') return '—';
      return Number(v).toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function apiGet(path) {
      const res = await fetch(API + path, { method: 'GET' });
      const raw = await res.text();
      let payload = null;
      try {
        payload = raw ? JSON.parse(raw) : null;
      } catch {
        throw new Error(`Réponse non JSON sur ${path}.`);
      }
      if (!res.ok) throw new Error(payload.error || `Erreur API ${path}`);
      return payload;
    }

    function toLocalControlPayload() {
      const invoicesSrc = JSON.parse(localStorage.getItem('goudalle_achats_factures') || '[]');
      const linesSrc = JSON.parse(localStorage.getItem('goudalle_achats_lignes') || '[]');
      const invById = new Map(invoicesSrc.map((i) => [i.idFacture, i]));
      const invoices = invoicesSrc.map((i) => ({
        id: i.idFacture,
        date: i.dateFacture,
        numero_facture: i.numeroFacture,
        fournisseur: i.fournisseurCode,
        chantier: i.chantierOuAffaire,
        libelle_facture: i.libelleFacture,
        montant_ht: i.montantTotalFacture,
        excluded_from_indicators: i.drapeauStock ? 1 : 0
      }));
      const lines = linesSrc.map((l) => ({
        raw_invoice_id: l.idFactureParente,
        line_order: l.ordreLigne,
        ressource: l.ressource,
        bl_numero: l.bl,
        arc: l.arc,
        chantier_ligne: l.chantierOuAffaireLigne || (invById.get(l.idFactureParente)?.chantierOuAffaire || ''),
        libelle_ligne: l.designation,
        unite: l.unite,
        qte_fact: l.quantite,
        pu: l.prixUnitaire,
        montant: l.montantLigne,
        excluded_from_indicators: l.drapeauStock ? 1 : 0
      }));
      return {
        success: true,
        batch: {
          id: 'local-fallback',
          nom_fichier: 'Historique local',
          total_factures_detectees: invoices.length,
          total_lignes_extraites: lines.length,
          total_lignes_exclues_stock: lines.filter((x) => Number(x.excluded_from_indicators || 0)).length
        },
        invoices,
        lines,
        normalized: [],
        allocated: [],
        versions: [],
        anomalies: [],
        _local: true,
        _invById: invById
      };
    }

    function applyChantierInheritance(factures) {
      return (factures || []).map((facture) => ({
        ...facture,
        lignes: (facture.lignes || []).map((ligne) => ({
          ...ligne,
          chantier: (ligne.chantier == null || String(ligne.chantier).trim() === '')
            ? (facture.chantier || '')
            : ligne.chantier
        }))
      }));
    }

    function composeFactures(invoices, lines) {
      const linesByInvoice = new Map();
      for (const l of (lines || [])) {
        if (!linesByInvoice.has(l.raw_invoice_id)) linesByInvoice.set(l.raw_invoice_id, []);
        linesByInvoice.get(l.raw_invoice_id).push(l);
      }
      for (const arr of linesByInvoice.values()) {
        arr.sort((a, b) => (a.line_order || 0) - (b.line_order || 0));
      }
      const orderedInvoices = [...(invoices || [])].sort((a, b) => {
        const d = String(a.date || '').localeCompare(String(b.date || ''));
        if (d !== 0) return d;
        return String(a.numero_facture || '').localeCompare(String(b.numero_facture || ''));
      });
      const factures = orderedInvoices.map((inv) => ({
        id: inv.id,
        date: inv.date || '',
        fournisseur: inv.fournisseur || '',
        chantier: inv.chantier || '',
        montant: inv.montant_ht,
        libelle: inv.libelle_facture || '',
        lignes: (linesByInvoice.get(inv.id) || []).map((l) => ({
          ressource: l.ressource || '',
          bl_numero: l.bl_numero || '',
          arc: l.arc || '',
          chantier: l.chantier_ligne || '',
          libelle_ligne: l.libelle_ligne || '',
          unite: l.unite || '',
          qte: l.qte_fact,
          pu: l.pu,
          montant: l.montant
        }))
      }));
      return applyChantierInheritance(factures);
    }

    function bindInvoiceAccordion(root) {
      const rows = root.querySelectorAll('.invoice-row[data-invoice-id]');
      rows.forEach((row) => {
        row.addEventListener('click', () => {
          const invoiceId = row.getAttribute('data-invoice-id');
          const item = root.querySelector(`.invoice-item[data-invoice-id="${invoiceId}"]`);
          const detail = root.querySelector(`.invoice-detail[data-invoice-id="${invoiceId}"]`);
          if (!item || !detail) return;
          const willOpen = !detail.classList.contains('open');
          detail.classList.toggle('open');
          item.classList.toggle('open');
          if (willOpen) {
            detail.style.maxHeight = `${detail.scrollHeight}px`;
          } else {
            detail.style.maxHeight = '0px';
          }
        });
      });
    }

    function renderReconstructionFromData(invoices, lines) {
      const root = document.getElementById('renderPreview');
      const factures = composeFactures(invoices, lines);
      if (!factures.length) {
        root.innerHTML = '<p class="muted">Aucune facture disponible.</p>';
        return;
      }
      root.innerHTML = `
        <div class="invoice-list">
          <div class="invoice-row-grid head">
            <div></div>
            <div>Date</div>
            <div>Fournisseur</div>
            <div>Chantier</div>
            <div>Libellé</div>
            <div class="num">Montant H.T</div>
          </div>
          ${factures.map((inv) => {
            return `
              <section class="invoice-item" data-invoice-id="${esc(inv.id)}">
                <button type="button" class="invoice-row" data-invoice-id="${esc(inv.id)}">
                  <div class="invoice-row-grid">
                    <div><span class="invoice-toggle">▶</span></div>
                    <div>${esc(inv.date)}</div>
                    <div>${esc(inv.fournisseur)}</div>
                    <div class="mono">${esc(inv.chantier)}</div>
                    <div class="invoice-summary">${esc(inv.libelle)} <span class="line-count">${inv.lignes.length}</span></div>
                    <div class="num"><strong>${fmt(inv.montant)}</strong></div>
                  </div>
                </button>
                <div class="invoice-detail" data-invoice-id="${esc(inv.id)}">
                  <div class="invoice-detail-inner">
                    <table>
                      <thead>
                        <tr>
                          <th style="width:12%;">Ressource</th>
                          <th style="width:11%;">BL N°</th>
                          <th style="width:8%;">A.R.C</th>
                          <th style="width:11%;">Chantier</th>
                          <th style="width:28%;">Libellé</th>
                          <th style="width:6%;">Unité</th>
                          <th class="num" style="width:10%;">Qté Fact.</th>
                          <th class="num" style="width:7%;">P.U</th>
                          <th class="num" style="width:7%;">Montant</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${inv.lignes.map((l) => `
                          <tr>
                            <td>${esc(l.ressource)}</td>
                            <td class="mono">${esc(l.bl_numero)}</td>
                            <td class="mono">${esc(l.arc)}</td>
                            <td class="mono">${esc(l.chantier)}</td>
                            <td>${esc(l.libelle_ligne)}</td>
                            <td>${esc(l.unite)}</td>
                            <td class="num">${l.qte != null ? fmt(l.qte) : '—'}</td>
                            <td class="num">${l.pu != null ? fmt(l.pu) : '—'}</td>
                            <td class="num">${l.montant != null ? fmt(l.montant) : '—'}</td>
                          </tr>
                        `).join('') || '<tr><td colspan="9" class="muted">Aucune ligne</td></tr>'}
                      </tbody>
                    </table>
                  </div>
                </div>
              </section>
            `;
          }).join('')}
        </div>
      `;
      bindInvoiceAccordion(root);
    }

    async function loadControl(batchId) {
      clearMessage();
      const payload = await apiGet(`/achats-v2/control/${encodeURIComponent(batchId)}`);
      const invoices = payload.invoices || [];
      const lines = payload.lines || [];
      renderReconstructionFromData(invoices, lines);

      const b = payload.batch || {};
      document.getElementById('batchInfo').textContent =
        `Fichier: ${b.nom_fichier || '—'} | Factures: ${b.total_factures_detectees || 0} | Lignes: ${b.total_lignes_extraites || 0} | Exclues stock: ${b.total_lignes_exclues_stock || 0}`;
    }

    async function initPage() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectAchatSecondaryBar();

      let batches = [];
      let localMode = false;
      try {
        batches = await apiGet('/achats-v2/import-batches');
      } catch {
        localMode = true;
      }
      const select = document.getElementById('batchSelect');
      if (!Array.isArray(batches) || !batches.length) {
        const localInvoices = JSON.parse(localStorage.getItem('goudalle_achats_factures') || '[]');
        const localLines = JSON.parse(localStorage.getItem('goudalle_achats_lignes') || '[]');
        if (localInvoices.length || localLines.length) {
          localMode = true;
          select.innerHTML = '<option value="local-fallback">local-fallback — Historique local validé</option>';
          const payload = toLocalControlPayload();
          const invoices = payload.invoices || [];
          const lines = payload.lines || [];
          renderReconstructionFromData(invoices, lines);
          document.getElementById('batchInfo').textContent =
            `Mode fallback local | Factures: ${invoices.length} | Lignes: ${lines.length}`;
          showMessage('⚠️ API imports indisponible. Affichage fallback des données validées locales.', 'warning');
          return;
        }
        select.innerHTML = '<option value="">Aucun import</option>';
        document.getElementById('renderPreview').innerHTML = '<p class="muted">Aucune reconstruction disponible.</p>';
        if (localMode) showMessage('⚠️ API imports indisponible et aucun historique local trouvé.', 'warning');
        return;
      }

      const ordered = [...batches].sort((a,b) => String(b.date_import || '').localeCompare(String(a.date_import || '')));
      select.innerHTML = ordered.map(b => `<option value="${esc(b.id)}">${esc(b.id)} — ${esc(b.nom_fichier || '')}</option>`).join('');
      const load = () => loadControl(select.value).catch(e => showMessage(`❌ ${e.message}`, 'danger'));
      select.addEventListener('change', load);
      document.getElementById('btnReload').addEventListener('click', load);
      await load();
    }

    let _initDone = false;
    async function init() {
      if (_initDone) return;
      _initDone = true;
      if (typeof window.loadServerKeys === 'function') {
        await window.loadServerKeys([
          'goudalle_achats_imports',
          'goudalle_achats_factures',
          'goudalle_achats_lignes',
          'goudalle_achats_regles'
        ]);
      }
      await initPage();
    }
    window.onServerReady(init);
  </script>
</body>
</html>
