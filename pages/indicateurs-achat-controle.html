<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contrôle imports achats - Intranet Goudalle</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .achat-table-wrap { overflow-x: auto; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width: 980px) { .grid-2 { grid-template-columns:1fr; } }
    .muted { color:#666; font-size:13px; }
    .chip {
      display:inline-block; padding:2px 8px; border-radius:999px;
      border:1px solid #cfd8cf; background:#f4f7f4; font-size:12px;
    }
    #renderPreview { overflow-x:auto; }
    .invoice-list {
      border:1px solid #d9d9d9;
      border-radius:12px;
      overflow:hidden;
      background:#fff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.05);
      min-width: 980px;
    }
    .invoice-item { border-bottom:1px solid #e6e6e6; background:#fff; }
    .invoice-item:last-child { border-bottom:none; }
    .invoice-row {
      width:100%; border:none; background:#fff; padding:0; cursor:pointer;
      text-align:left; font:inherit;
    }
    .invoice-row:hover { background:#f8fbf8; }
    .invoice-row-grid {
      display:grid;
      grid-template-columns: 46px 108px 200px 140px 1fr 150px;
      gap:8px;
      padding:12px 14px;
      align-items:center;
      color:#1f2a1f;
    }
    .invoice-row-grid.head {
      background:linear-gradient(180deg, #f6f6ef 0%, #efefe7 100%);
      font-weight:700;
      cursor:default;
    }
    .invoice-item.open .invoice-row-grid { background:#f3faf3; }
    .invoice-item.open .invoice-summary { font-weight:700; }
    .invoice-row-grid > div { min-width:0; }
    .invoice-montant {
      white-space:nowrap;
      overflow:visible;
      text-overflow:clip;
      font-weight:700;
      color:#102710;
    }
    .invoice-toggle {
      display:inline-flex; align-items:center; justify-content:center;
      width:24px; height:24px; border-radius:999px; border:1px solid #d7ded7; background:#fff;
      color:#3d5540; font-size:12px; transition: transform .2s ease, background-color .2s ease;
    }
    .invoice-item.open .invoice-toggle { transform: rotate(90deg); background:#e9f3e9; }
    .line-count {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:24px; height:22px; padding:0 8px; border-radius:999px;
      border:1px solid #d0d7d0; background:#f4f8f4; color:#38503b; font-size:12px;
    }
    .invoice-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
      background:#fcfcfc;
    }
    .invoice-detail.open { border-top:1px solid #e5e5e5; }
    .invoice-detail-inner { padding:12px 14px 14px; }
    .invoice-detail table { width:100%; border-collapse:collapse; table-layout:fixed; background:#fff; }
    .invoice-detail th {
      text-align:left; padding:8px 6px; border-bottom:1px solid #d9d9d9; background:#f2f4f2; color:#2a2a2a;
    }
    .invoice-detail td {
      padding:8px 6px; border-bottom:1px solid #ececec; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#222;
    }
    .invoice-detail th, .invoice-detail td { box-sizing:border-box; }
    .invoice-detail .montant-col { white-space:nowrap; overflow:visible; text-overflow:clip; font-weight:700; }
    .invoice-detail tr:last-child td { border-bottom:none; }
    .hidden { display:none !important; }
    .num { text-align:center; font-variant-numeric: tabular-nums; }
    .mono { font-family: Consolas, monospace; }
    .invoice-summary { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .imports-list { display:flex; flex-direction:column; gap:10px; }
    .imports-header {
      display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;
      background: linear-gradient(180deg, #f7f9f7 0%, #eef4ef 100%);
      border:1px solid #dce6dc; border-radius:10px; padding:10px 12px;
    }
    .imports-title { margin:0; font-weight:700; color:#2f4632; }
    .imports-subtitle { margin:2px 0 0 0; color:#687468; font-size:13px; }
    .imports-count {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:30px; height:24px; padding:0 10px; border-radius:999px;
      border:1px solid #c6d8c8; background:#eaf4eb; color:#2f5434; font-weight:700; font-size:12px;
    }
    .imports-row {
      display:grid; grid-template-columns: 1fr auto; gap:12px; align-items:center;
      border:1px solid #e0e8e0; border-radius:12px; background:#fff; padding:12px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .imports-row.active { border-color:#8fbe95; background:#f2fbf2; box-shadow: 0 4px 12px rgba(79,123,87,0.12); }
    .imports-meta { min-width:0; }
    .imports-meta strong {
      display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      color:#233325; font-size:18px; line-height:1.2;
    }
    .imports-meta span { color:#5f6c5f; font-size:12px; display:block; margin-top:4px; }
    .imports-stats { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .imports-stat {
      display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:999px;
      background:#f3f6f3; border:1px solid #e0e5e0; color:#3f4b3f; font-size:12px;
    }
    .detail-placeholder { padding:8px; }
    .period-filters {
      display:grid; grid-template-columns: 220px 220px; gap:12px;
      margin-bottom:12px; align-items:end;
    }
    .period-filters label { display:block; margin-bottom:6px; font-weight:600; color:#3a3a3a; }
    .period-filters select { width:100%; }
    @media (max-width: 980px) {
      .invoice-list { min-width: 900px; }
      .invoice-row-grid { grid-template-columns: 42px 98px 160px 130px 1fr 130px; font-size:12px; }
      .invoice-detail table { font-size:12px; }
      .imports-row { grid-template-columns: 1fr; }
      .period-filters { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>Auth.requireAuth();</script>

  <div class="app-container">
    <div id="sidebar"></div>
    <main class="main-content">
      <div class="d-flex justify-between items-center mb-3" style="gap:12px; flex-wrap:wrap;">
        <h1 class="mb-0">Contrôle imports achats</h1>
      </div>

      <div id="pageMessage" class="alert" style="display:none;"></div>

      <div class="card">
        <div class="card-title"><h2>Imports effectués</h2></div>
        <div class="card-body">
          <div class="imports-header mb-2">
            <div>
              <p class="imports-title">Historique des imports</p>
              <p class="imports-subtitle">Sélectionne un import pour afficher ses factures, ou supprime-le définitivement.</p>
            </div>
          </div>
          <div id="importsList" class="imports-list"></div>
          <p class="muted" id="batchInfo"></p>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><h2>Reconstruction visuelle PDF</h2></div>
        <div class="card-body">
          <div class="period-filters">
            <div>
              <label for="filterYear">Année</label>
              <select id="filterYear"></select>
            </div>
            <div>
              <label for="filterMonth">Mois</label>
              <select id="filterMonth"></select>
            </div>
          </div>
          <div id="renderPreview"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API = window.location.origin + '/api';
    const MONTHS_FR = ['01 - Janvier', '02 - Février', '03 - Mars', '04 - Avril', '05 - Mai', '06 - Juin', '07 - Juillet', '08 - Août', '09 - Septembre', '10 - Octobre', '11 - Novembre', '12 - Décembre'];
    const controlState = {
      factures: [],
      selectedYear: '',
      selectedMonth: ''
    };

    function showMessage(msg, type='info') {
      const el = document.getElementById('pageMessage');
      el.innerHTML = msg;
      el.className = `alert alert-${type}`;
      el.style.display = 'block';
    }

    function clearMessage() {
      const el = document.getElementById('pageMessage');
      el.style.display = 'none';
      el.innerHTML = '';
    }

    function fmt(v) {
      if (v == null || v === '') return '—';
      return Number(v).toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function apiGet(path) {
      const res = await fetch(API + path, { method: 'GET' });
      const raw = await res.text();
      let payload = null;
      try {
        payload = raw ? JSON.parse(raw) : null;
      } catch {
        throw new Error(`Réponse non JSON sur ${path}.`);
      }
      if (!res.ok) throw new Error(payload.error || `Erreur API ${path}`);
      return payload;
    }

    async function apiDelete(path) {
      const res = await fetch(API + path, { method: 'DELETE' });
      const raw = await res.text();
      let payload = null;
      try {
        payload = raw ? JSON.parse(raw) : null;
      } catch {
        throw new Error(`Réponse non JSON sur ${path}.`);
      }
      if (!res.ok) throw new Error(payload?.error || `Erreur API ${path}`);
      return payload;
    }

    function toLocalControlPayload() {
      const invoicesSrc = JSON.parse(localStorage.getItem('goudalle_achats_factures') || '[]');
      const linesSrc = JSON.parse(localStorage.getItem('goudalle_achats_lignes') || '[]');
      const invById = new Map(invoicesSrc.map((i) => [i.idFacture, i]));
      const invoices = invoicesSrc.map((i) => ({
        id: i.idFacture,
        date: i.dateFacture,
        numero_facture: i.numeroFacture,
        fournisseur: i.fournisseurCode,
        chantier: i.chantierOuAffaire,
        libelle_facture: i.libelleFacture,
        montant_ht: i.montantTotalFacture,
        excluded_from_indicators: i.drapeauStock ? 1 : 0
      }));
      const lines = linesSrc.map((l) => ({
        raw_invoice_id: l.idFactureParente,
        line_order: l.ordreLigne,
        ressource: l.ressource,
        bl_numero: l.bl,
        arc: l.arc,
        chantier_ligne: l.chantierOuAffaireLigne || (invById.get(l.idFactureParente)?.chantierOuAffaire || ''),
        libelle_ligne: l.designation,
        unite: l.unite,
        qte_fact: l.quantite,
        pu: l.prixUnitaire,
        montant: l.montantLigne,
        excluded_from_indicators: l.drapeauStock ? 1 : 0
      }));
      return {
        success: true,
        batch: {
          id: 'local-fallback',
          nom_fichier: 'Historique local',
          total_factures_detectees: invoices.length,
          total_lignes_extraites: lines.length,
          total_lignes_exclues_stock: lines.filter((x) => Number(x.excluded_from_indicators || 0)).length
        },
        invoices,
        lines,
        normalized: [],
        allocated: [],
        versions: [],
        anomalies: [],
        _local: true,
        _invById: invById
      };
    }

    function applyChantierInheritance(factures) {
      return (factures || []).map((facture) => ({
        ...facture,
        lignes: (facture.lignes || []).map((ligne) => ({
          ...ligne,
          chantier: (ligne.chantier == null || String(ligne.chantier).trim() === '')
            ? (facture.chantier || '')
            : ligne.chantier
        }))
      }));
    }

    function computeSafeInvoiceTotal(headerTotal, lines) {
      const h = Number.isFinite(Number(headerTotal)) ? Number(headerTotal) : null;
      const s = (lines || []).reduce((acc, l) => acc + (Number(l.montant) || 0), 0);
      if (h == null) return s;
      const ratio = s !== 0 ? Math.abs(h / s) : null;
      const mismatch = ratio != null && (ratio > 100 || ratio < 0.01 || Math.abs(h - s) > Math.max(5000, Math.abs(s) * 0.9));
      return mismatch ? s : h;
    }

    function composeFactures(invoices, lines) {
      const linesByInvoice = new Map();
      for (const l of (lines || [])) {
        if (!linesByInvoice.has(l.raw_invoice_id)) linesByInvoice.set(l.raw_invoice_id, []);
        linesByInvoice.get(l.raw_invoice_id).push(l);
      }
      for (const arr of linesByInvoice.values()) {
        arr.sort((a, b) => (a.line_order || 0) - (b.line_order || 0));
      }
      // On conserve l'ordre d'apparition du PDF (ordre parser/API), sans re-tri UI.
      const factures = [...(invoices || [])].map((inv) => ({
        id: inv.id,
        date: inv.date || '',
        fournisseur: inv.fournisseur || '',
        chantier: inv.chantier || '',
        montant: inv.montant_ht,
        libelle: inv.libelle_facture || '',
        lignes: (linesByInvoice.get(inv.id) || []).map((l) => ({
          ressource: l.ressource || '',
          bl_numero: l.bl_numero || '',
          arc: l.arc || '',
          chantier: l.chantier_ligne || '',
          libelle_ligne: l.libelle_ligne || '',
          unite: l.unite || '',
          qte: l.qte_fact,
          pu: l.pu,
          montant: l.montant
        }))
      }));
      const withChantier = applyChantierInheritance(factures);
      return withChantier.map((f) => ({ ...f, montant: computeSafeInvoiceTotal(f.montant, f.lignes) }));
    }

    function extractYearMonth(rawDate) {
      const txt = String(rawDate || '').trim();
      let m = txt.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if (m) return { year: m[3], month: m[2] };
      m = txt.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return { year: m[1], month: m[2] };
      return null;
    }

    function buildPeriodIndex(factures) {
      const byYear = new Map();
      for (const f of (factures || [])) {
        const ym = extractYearMonth(f.date);
        if (!ym) continue;
        if (!byYear.has(ym.year)) byYear.set(ym.year, new Set());
        byYear.get(ym.year).add(ym.month);
      }
      return byYear;
    }

    function renderPeriodFilters(factures) {
      const yearSel = document.getElementById('filterYear');
      const monthSel = document.getElementById('filterMonth');
      const idx = buildPeriodIndex(factures);
      const years = [...idx.keys()].sort((a, b) => Number(b) - Number(a));

      if (!years.length) {
        yearSel.innerHTML = '<option value="">Aucune année</option>';
        monthSel.innerHTML = '<option value="">Aucun mois</option>';
        controlState.selectedYear = '';
        controlState.selectedMonth = '';
        yearSel.disabled = true;
        monthSel.disabled = true;
        return;
      }
      yearSel.disabled = false;
      monthSel.disabled = false;

      if (!years.includes(controlState.selectedYear)) controlState.selectedYear = years[0];
      yearSel.innerHTML = years.map((y) => `<option value="${esc(y)}"${y === controlState.selectedYear ? ' selected' : ''}>${esc(y)}</option>`).join('');

      const months = [...(idx.get(controlState.selectedYear) || [])].sort((a, b) => Number(a) - Number(b));
      if (!months.includes(controlState.selectedMonth)) controlState.selectedMonth = months[0] || '';
      monthSel.innerHTML = months.map((m) => {
        const label = MONTHS_FR[Number(m) - 1] || m;
        return `<option value="${esc(m)}"${m === controlState.selectedMonth ? ' selected' : ''}>${esc(label)}</option>`;
      }).join('');
    }

    function getFilteredFactures(factures) {
      return (factures || []).filter((f) => {
        const ym = extractYearMonth(f.date);
        if (!ym) return false;
        return ym.year === controlState.selectedYear && ym.month === controlState.selectedMonth;
      });
    }

    function renderInvoiceDetailTable(inv) {
      return `
        <table>
          <colgroup>
            <col style="width:12%;">
            <col style="width:11%;">
            <col style="width:8%;">
            <col style="width:11%;">
            <col style="width:28%;">
            <col style="width:6%;">
            <col style="width:10%;">
            <col style="width:7%;">
            <col style="width:7%;">
          </colgroup>
          <thead>
            <tr>
              <th>Ressource</th>
              <th>BL N°</th>
              <th>A.R.C</th>
              <th>Chantier</th>
              <th>Libellé</th>
              <th class="num">Unité</th>
              <th class="num">Qté Fact.</th>
              <th class="num">P.U</th>
              <th class="num">Montant</th>
            </tr>
          </thead>
          <tbody>
            ${inv.lignes.map((l) => `
              <tr>
                <td>${esc(l.ressource)}</td>
                <td class="mono">${esc(l.bl_numero)}</td>
                <td class="mono">${esc(l.arc)}</td>
                <td class="mono">${esc(l.chantier)}</td>
                <td>${esc(l.libelle_ligne)}</td>
                <td class="num">${esc(l.unite)}</td>
                <td class="num">${l.qte != null ? fmt(l.qte) : '—'}</td>
                <td class="num">${l.pu != null ? fmt(l.pu) : '—'}</td>
                <td class="num montant-col">${l.montant != null ? fmt(l.montant) : '—'}</td>
              </tr>
            `).join('') || '<tr><td colspan="9" class="muted">Aucune ligne</td></tr>'}
          </tbody>
        </table>
      `;
    }

    function bindInvoiceAccordion(root) {
      const facturesById = new Map((window.__facturesControle || []).map((f) => [String(f.id), f]));
      const rows = root.querySelectorAll('.invoice-row[data-invoice-id]');
      rows.forEach((row) => {
        row.addEventListener('click', () => {
          const invoiceId = row.getAttribute('data-invoice-id');
          const item = root.querySelector(`.invoice-item[data-invoice-id="${invoiceId}"]`);
          const detail = root.querySelector(`.invoice-detail[data-invoice-id="${invoiceId}"]`);
          if (!item || !detail) return;
          const willOpen = !detail.classList.contains('open');
          if (willOpen) {
            root.querySelectorAll('.invoice-detail.open').forEach((d) => {
              if (d !== detail) {
                d.classList.remove('open');
                d.style.maxHeight = '0px';
              }
            });
            root.querySelectorAll('.invoice-item.open').forEach((i) => {
              if (i !== item) i.classList.remove('open');
            });
            if (detail.dataset.loaded !== '1') {
              const inv = facturesById.get(String(invoiceId));
              if (inv) detail.querySelector('.invoice-detail-inner').innerHTML = renderInvoiceDetailTable(inv);
              detail.dataset.loaded = '1';
            }
          }
          detail.classList.toggle('open');
          item.classList.toggle('open');
          if (willOpen) {
            detail.style.maxHeight = `${detail.scrollHeight}px`;
          } else {
            detail.style.maxHeight = '0px';
          }
        });
      });
    }

    function renderReconstructionList(factures) {
      const root = document.getElementById('renderPreview');
      window.__facturesControle = factures;
      if (!factures.length) {
        root.innerHTML = '<p class="muted">Aucune facture disponible pour la période sélectionnée.</p>';
        return;
      }
      root.innerHTML = `
        <div class="invoice-list">
          <div class="invoice-row-grid head">
            <div></div>
            <div>Date</div>
            <div>Fournisseur</div>
            <div>Chantier</div>
            <div>Libellé</div>
            <div class="num">Montant H.T</div>
          </div>
          ${factures.map((inv) => {
            return `
              <section class="invoice-item" data-invoice-id="${esc(inv.id)}">
                <button type="button" class="invoice-row" data-invoice-id="${esc(inv.id)}">
                  <div class="invoice-row-grid">
                    <div><span class="invoice-toggle">▶</span></div>
                    <div>${esc(inv.date)}</div>
                    <div>${esc(inv.fournisseur)}</div>
                    <div class="mono">${esc(inv.chantier)}</div>
                    <div class="invoice-summary">${esc(inv.libelle)} <span class="line-count">${inv.lignes.length}</span></div>
                    <div class="num invoice-montant">${fmt(inv.montant)}</div>
                  </div>
                </button>
                <div class="invoice-detail" data-invoice-id="${esc(inv.id)}" data-loaded="0">
                  <div class="invoice-detail-inner">
                    <div class="detail-placeholder muted">Clique pour charger le détail de cette facture.</div>
                  </div>
                </div>
              </section>
            `;
          }).join('')}
        </div>
      `;
      bindInvoiceAccordion(root);
    }

    function refreshFilteredView() {
      renderPeriodFilters(controlState.factures);
      const filtered = getFilteredFactures(controlState.factures);
      renderReconstructionList(filtered);
    }

    function renderReconstructionFromData(invoices, lines) {
      controlState.factures = composeFactures(invoices, lines);
      refreshFilteredView();
    }

    async function loadControl(batchId) {
      clearMessage();
      const payload = await apiGet(`/achats-v2/control/${encodeURIComponent(batchId)}`);
      const invoices = payload.invoices || [];
      const lines = payload.lines || [];
      renderReconstructionFromData(invoices, lines);

      const b = payload.batch || {};
      document.getElementById('batchInfo').textContent =
        `Fichier: ${b.nom_fichier || '—'} | Factures: ${b.total_factures_detectees || 0} | Lignes: ${b.total_lignes_extraites || 0} | Exclues stock: ${b.total_lignes_exclues_stock || 0}`;
    }

    function renderImportsList(batches, activeBatchId) {
      const root = document.getElementById('importsList');
      if (!Array.isArray(batches) || !batches.length) {
        root.innerHTML = '<p class="muted">Aucun import disponible.</p>';
        return;
      }
      root.innerHTML = `
        <div class="d-flex justify-between items-center" style="margin:2px 0 4px 0;">
          <span class="muted">Liste des imports disponibles</span>
          <span class="imports-count">${batches.length}</span>
        </div>
        ${batches.map((b) => `
        <div class="imports-row ${String(b.id) === String(activeBatchId) ? 'active' : ''}" data-batch-id="${esc(b.id)}">
          <div class="imports-meta">
            <strong>${esc(b.nom_fichier || b.id)}</strong>
            <span>ID: ${esc(b.id)} • ${esc(String(b.date_import || '').replace('T', ' ').slice(0, 19))}</span>
            <div class="imports-stats">
              <span class="imports-stat">📄 Factures: ${Number(b.total_factures_detectees || 0)}</span>
              <span class="imports-stat">📑 Lignes: ${Number(b.total_lignes_extraites || 0)}</span>
              <span class="imports-stat">🚫 Stock exclu: ${Number(b.total_lignes_exclues_stock || 0)}</span>
            </div>
          </div>
          <div class="d-flex" style="gap:8px; justify-content:flex-end;">
            <button class="btn btn-secondary btn-open-batch" data-batch-id="${esc(b.id)}">Afficher</button>
            <button class="btn btn-danger btn-delete-batch" data-batch-id="${esc(b.id)}">Supprimer</button>
          </div>
        </div>
      `).join('')}
      `;
    }

    async function initPage() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectAchatSecondaryBar();

      let batches = [];
      let localMode = false;
      try {
        batches = await apiGet('/achats-v2/import-batches');
      } catch {
        localMode = true;
      }
      let activeBatchId = null;
      if (!Array.isArray(batches) || !batches.length) {
        const localInvoices = JSON.parse(localStorage.getItem('goudalle_achats_factures') || '[]');
        const localLines = JSON.parse(localStorage.getItem('goudalle_achats_lignes') || '[]');
        if (localInvoices.length || localLines.length) {
          localMode = true;
          document.getElementById('importsList').innerHTML = '<p class="muted">Mode fallback local (sans gestion de suppression ciblée).</p>';
          const payload = toLocalControlPayload();
          const invoices = payload.invoices || [];
          const lines = payload.lines || [];
          renderReconstructionFromData(invoices, lines);
          document.getElementById('batchInfo').textContent =
            `Mode fallback local | Factures: ${invoices.length} | Lignes: ${lines.length}`;
          showMessage('⚠️ API imports indisponible. Affichage fallback des données validées locales.', 'warning');
          return;
        }
        document.getElementById('importsList').innerHTML = '<p class="muted">Aucun import.</p>';
        document.getElementById('renderPreview').innerHTML = '<p class="muted">Aucune reconstruction disponible.</p>';
        if (localMode) showMessage('⚠️ API imports indisponible et aucun historique local trouvé.', 'warning');
        return;
      }

      const ordered = [...batches].sort((a,b) => String(b.date_import || '').localeCompare(String(a.date_import || '')));
      activeBatchId = ordered[0]?.id || null;
      renderImportsList(ordered, activeBatchId);
      if (activeBatchId) await loadControl(activeBatchId);

      const yearSel = document.getElementById('filterYear');
      const monthSel = document.getElementById('filterMonth');
      yearSel.onchange = () => {
        controlState.selectedYear = yearSel.value;
        refreshFilteredView();
      };
      monthSel.onchange = () => {
        controlState.selectedMonth = monthSel.value;
        refreshFilteredView();
      };

      const root = document.getElementById('importsList');
      root.addEventListener('click', async (e) => {
        const openBtn = e.target.closest('.btn-open-batch');
        const delBtn = e.target.closest('.btn-delete-batch');
        if (openBtn) {
          const batchId = openBtn.getAttribute('data-batch-id');
          if (!batchId) return;
          activeBatchId = batchId;
          renderImportsList(ordered, activeBatchId);
          await loadControl(activeBatchId).catch((err) => showMessage(`❌ ${err.message}`, 'danger'));
          return;
        }
        if (delBtn) {
          const batchId = delBtn.getAttribute('data-batch-id');
          if (!batchId) return;
          const ok = window.confirm('Confirmer la suppression de cet import ?');
          if (!ok) return;
          await apiDelete(`/achats-v2/import-batches/${encodeURIComponent(batchId)}`).catch((err) => {
            showMessage(`❌ ${err.message}`, 'danger');
            throw err;
          });
          showMessage('✅ Import supprimé.', 'success');
          await initPage();
        }
      });
    }

    let _initDone = false;
    async function init() {
      if (_initDone) return;
      _initDone = true;
      if (typeof window.loadServerKeys === 'function') {
        await window.loadServerKeys([
          'goudalle_achats_imports',
          'goudalle_achats_factures',
          'goudalle_achats_lignes',
          'goudalle_achats_regles'
        ]);
      }
      await initPage();
    }
    window.onServerReady(init);
  </script>
</body>
</html>
