<!DOCTYPE html>

    .dashboard-grid {

        <!-- CBCO -->
        <div class="card" id="cbcoCard">

              <canvas id="cbcoHomeChart"></canvas>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script>
    // ===== GRAPHIQUE DE TENDANCE GM =====
    let gmTrendChart;

    /**
     * Récupère une variable CSS (pour les couleurs du graphique)
     * @param {string} name - Nom de la variable CSS (ex: '--accent-dark')
     * @param {string} fallback - Valeur par défaut si non trouvée
     * @returns {string} - Valeur de la variable CSS
     */
    function getCssVar(name, fallback) {
      const value = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      return value || fallback;
    }

    /**
     * Génère le graphique de tendance h/m³ pour la page d'accueil
     */
    function renderGMTrendChart() {
      const kpis = getKPIs();
      const published = kpis.filter(k => k.status === 'published').sort(compareByYearWeekDesc);

      // Toujours afficher 1 mois (4 semaines)
      drawGMTrendChart(published, 4);
    }

    /**
     * Dessine le graphique de tendance avec Chart.js
     * @param {Array} published - Liste des KPI publiés
     * @param {number} weeksBack - Nombre de semaines à afficher
     */
    function drawGMTrendChart(published, weeksBack) {
      const slice = published.slice(0, weeksBack).reverse();
      if (slice.length === 0) return;

      const labels = slice.map(k => `S${String(k.week).padStart(2, '0')}/${k.year}`);
      const ratioData = slice.map(k => calculateRatio(k.hours, k.m3));

      const ctx = document.getElementById('gmTrendChart').getContext('2d');
      if (gmTrendChart) gmTrendChart.destroy();

      const lineColor = getCssVar('--accent-dark', '#6b8e6f');
      const fillColor = 'rgba(107, 142, 111, 0.12)';
      const threshold = getKpiRatioThreshold();
      const lastWeekArrowPlugin = {
        id: 'lastWeekArrow',
        afterDatasetsDraw(chartInstance) {
          const meta = chartInstance.getDatasetMeta(0);
          const points = meta?.data || [];
          if (points.length === 0) return;

          const lastPoint = points[points.length - 1];
          if (!lastPoint) return;

          const { ctx: canvasCtx, chartArea } = chartInstance;
          const targetX = lastPoint.x;
          const targetY = lastPoint.y;

          // Flèche = soulignement du KPI puis diagonale vers le dernier point
          const canvas = chartInstance.canvas;
          const arrowY = 4;
          const centerX = canvas.width / 2;
          const startX = centerX - 120;
          const elbowX = centerX + 120;
          const endX = targetX + 2;
          const endY = targetY - 2;

          canvasCtx.save();
          canvasCtx.strokeStyle = '#111111';
          canvasCtx.fillStyle = '#111111';
          canvasCtx.lineWidth = 4;
          canvasCtx.lineCap = 'round';
          canvasCtx.lineJoin = 'round';

          // Segment horizontal + segment diagonal
          canvasCtx.beginPath();
          canvasCtx.moveTo(startX, arrowY);
          canvasCtx.lineTo(elbowX, arrowY);
          canvasCtx.lineTo(endX, endY);
          canvasCtx.stroke();

          // Pointe de la flèche
          const angle = Math.atan2(endY - arrowY, endX - elbowX);
          const headLen = 14;
          canvasCtx.beginPath();
          canvasCtx.moveTo(endX, endY);
          canvasCtx.lineTo(
            endX - headLen * Math.cos(angle - Math.PI / 6),
            endY - headLen * Math.sin(angle - Math.PI / 6)
          );
          canvasCtx.lineTo(
            endX - headLen * Math.cos(angle + Math.PI / 6),
            endY - headLen * Math.sin(angle + Math.PI / 6)
          );
          canvasCtx.closePath();
          canvasCtx.fill();
          canvasCtx.restore();
        }
      };

      gmTrendChart = new Chart(ctx, {
        type: 'line',
        plugins: [lastWeekArrowPlugin],
        data: {
          labels,
          datasets: [
            {
              label: 'h/m³',
              data: ratioData,
              borderColor: lineColor,
              backgroundColor: fillColor,
              tension: 0,
              spanGaps: false,
              pointRadius: 3,
              pointHoverRadius: 5,
              fill: true
            },
            {
              label: `Seuil (${threshold} h/m³)`,
              data: new Array(labels.length).fill(threshold),
              borderColor: '#e74c3c',
              borderWidth: 2,
              borderDash: [5, 5],
              pointRadius: 0,
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          layout: {
            padding: { top: 14 }
          },
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const v = ctx.parsed?.y;
                  return Number.isFinite(v) ? `h/m³ : ${v.toFixed(2)}` : 'h/m³ : —';
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              title: { display: true, text: 'h/m³' }
            }
          }
        }
      });
    }

    /**
     * Initialise la page d'accueil
     * - Charge la sidebar
     * - Affiche les données du dernier KPI publié
     * - Affiche le card admin si utilisateur = direction
     */
    function initHome() {
      // Injecter la sidebar dans le DOM
      document.getElementById('sidebar').innerHTML = getSidebar();

      // Récupérer le dernier KPI publié
      const lastWeek = getLastPublishedWeek();
      if (!lastWeek) {
        document.getElementById('gm-content').innerHTML = '<p>📊 Aucune donnée publiée encore</p>';
        document.getElementById('gmInlineRatio').textContent = '--';
        document.getElementById('gmInlineSmiley').innerHTML = '🙂';
      } else {
        // Calculer le ratio et déterminer la performance
        const ratio = calculateRatio(lastWeek.hours, lastWeek.m3);
        const smiley = getSmiley(ratio);

        // Retirer le commentaire sur la carte d'accueil GM
        document.getElementById('gm-content').innerHTML = '';

        // Mettre à jour le KPI compact dans l'en-tête du graphique
        document.getElementById('gmInlineRatio').textContent = ratio !== null ? `${ratio.toFixed(2)} h/m³` : '--';
        document.getElementById('gmInlineSmiley').innerHTML = getSmileyEmoji(smiley);

        // Rendre le graphique de tendance
        renderGMTrendChart();
      }

      // ===== SECTION CBCO =====
      renderCBCOHomeChart();
    }

    /**
     * Génère le graphique CBCO pour la page d'accueil
     * Affiche les 3 dernières années par défaut
     */
    let cbcoHomeChart;
    function renderCBCOHomeChart() {
      const MONTH_NAMES = ['', 'Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin',
                            'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
      
      const byYear = getCBCOByYear();
      const allYears = Object.keys(byYear).sort((a, b) => a - b);
      
      // Prendre seulement les 3 dernières années
      const years = allYears.slice(-3);
      
      if (years.length === 0) {
        const canvas = document.getElementById('cbcoHomeChart');
        if (canvas) {
          const ctx = canvas.getContext('2d');
          ctx.font = '16px Arial';
          ctx.fillStyle = '#666';
          ctx.textAlign = 'center';
          ctx.fillText('Aucune donnée disponible', canvas.width / 2, canvas.height / 2);
        }
        return;
      }

      // Préparer les datasets pour chaque année
      const datasets = [];
      const colors = [
        { border: '#3498db' },
        { border: '#2ecc71' },
        { border: '#e74c3c' },
        { border: '#f39c12' },
        { border: '#9b59b6' },
        { border: '#1abc9c' },
        { border: '#e67e22' },
        { border: '#34495e' },
        { border: '#c0392b' },
        { border: '#16a085' },
      ];

      years.forEach((year, idx) => {
        const entries = byYear[year].sort((a, b) => a.month - b.month);

        // Aligner chaque cumul sur son vrai mois (1..12)
        const cumulByMonth = {};
        entries.forEach(e => {
          cumulByMonth[e.month] = e.cumulAnnuel;
        });

        const cumulValues = Array.from({ length: 12 }, (_, i) => {
          const month = i + 1;
          return Object.prototype.hasOwnProperty.call(cumulByMonth, month)
            ? cumulByMonth[month]
            : null;
        });

        const color = colors[idx % colors.length];
        datasets.push({
          label: `Année ${year}`,
          data: cumulValues,
          borderColor: color.border,
          backgroundColor: color.border,
          tension: 0,
          fill: false,
          pointRadius: 3,
          pointHoverRadius: 5,
          spanGaps: false
        });
      });

      // Créer le graphique
      const ctx = document.getElementById('cbcoHomeChart').getContext('2d');
      if (cbcoHomeChart) cbcoHomeChart.destroy();

      const labels = Array.from({ length: 12 }, (_, i) => MONTH_NAMES[i + 1]);

      const formatCBCOCurrency = (value) => {
        return new Intl.NumberFormat('fr-FR', { 
          minimumFractionDigits: 0, 
          maximumFractionDigits: 0 
        }).format(value) + ' K€';
      };

      cbcoHomeChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              display: true,
              position: 'top'
            },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const v = ctx.parsed?.y;
                  return `Cumul annuel : ${formatCBCOCurrency(v)}`;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                callback: (value) => formatCBCOCurrency(value)
              }
            }
          }
        }
      });
    }

    /**
     * Redirige vers la page Goudalle Maçonnerie
     */
    function goToGM() {
      window.location.href = './pages/gm.html';
    }

    /**
     * Redirige vers la page CBCO
     */
    function goToCBCO() {
      window.location.href = './pages/cbco.html';
    }

    /**
     * Redirige vers la page d'administration GM
     */
    function goToAdmin() {
      window.location.href = './pages/gm-admin.html';
    }

    // ===== INITIALISATION =====
    // Démarrer l'initialisation après un court délai
    // pour garantir que le DOM est complètement chargé
    setTimeout(initHome, 100);
  </script>
