<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Intranet Goudalle</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ═══════════════════════════════════════════════════════════
       TABLEAU DE BORD — INDICATEURS TEMPS RÉEL
       Palette site : blanc/beige, vert sauge, marron chaud
       ═══════════════════════════════════════════════════════════ */

    .app-container { height: 100vh; overflow: hidden; }

    .main-content.home-full {
      padding: 0 !important;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--lighter, #faf8f5);
    }

    /* ── Barre de contrôle ─────────────────────────────────── */
    .tv-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 18px;
      background: white;
      border-bottom: 2px solid var(--accent, #8ba88a);
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      min-height: 50px;
      flex-wrap: nowrap;
    }
    .tv-topbar-brand {
      display: flex; align-items: center; gap: 9px;
      flex-shrink: 0;
    }
    .tv-logo { font-size: 20px; line-height: 1; }
    .tv-brand-company {
      font-size: 9px; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--accent-dark, #6b8e6f);
      font-weight: 700; line-height: 1;
    }
    .tv-brand-slide {
      font-size: 13px; font-weight: 700;
      color: var(--primary, #5a4a3a);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 240px;
      line-height: 1.3; margin-top: 1px;
    }
    .tv-prog-block { flex: 1; max-width: 320px; }
    .tv-prog-wrap {
      height: 4px; background: var(--border-light, #f0ece6);
      border-radius: 2px; overflow: hidden; margin-bottom: 3px;
    }
    .tv-prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent,#8ba88a), var(--accent-dark,#6b8e6f));
      border-radius: 2px; width: 100%;
    }
    .tv-prog-lbl { font-size: 9px; color: #bbb; text-align: right; line-height: 1; }
    .tv-topbar-right {
      display: flex; align-items: center; gap: 9px;
      flex-shrink: 0; margin-left: auto;
    }
    .tv-dots { display: flex; gap: 4px; align-items: center; }
    .tv-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ddd;
      transition: background 0.3s, width 0.3s; flex-shrink: 0;
    }
    .tv-dot.tv-on { background: var(--accent, #8ba88a); width: 16px; border-radius: 3px; }
    .tv-clock { font-size: 11px; color: #999; white-space: nowrap; }
    .tv-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px;
      border: 1px solid var(--border-light, #f0ece6);
      background: white; color: var(--primary, #5a4a3a);
      border-radius: 6px; cursor: pointer;
      font-size: 11px; font-family: inherit; font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap; line-height: 1.4;
    }
    .tv-btn:hover { background: var(--lighter,#faf8f5); border-color: var(--accent,#8ba88a); }
    .tv-btn-primary { background: var(--accent,#8ba88a); color: white; border-color: var(--accent,#8ba88a); }
    .tv-btn-primary:hover { background: var(--accent-dark,#6b8e6f); border-color: var(--accent-dark,#6b8e6f); }

    /* ── Conteneur slides ──────────────────────────────────── */
    .tv-outer { flex: 1; position: relative; overflow: hidden; min-height: 0; }

    .tv-loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: #bbb; font-size: 14px;
    }
    .tv-spinner {
      width: 30px; height: 30px;
      border: 3px solid var(--border-light,#f0ece6);
      border-top-color: var(--accent,#8ba88a);
      border-radius: 50%;
      animation: tvSpin 0.9s linear infinite;
    }
    @keyframes tvSpin { to { transform: rotate(360deg); } }

    .tv-nodata {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: #bbb; font-size: 15px;
      text-align: center; padding: 32px;
    }

    /* ── Slide ─────────────────────────────────────────────── */
    .tv-slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      padding: 16px 20px 12px; gap: 10px;
      opacity: 0; transform: translateY(14px);
      transition: opacity 0.45s ease, transform 0.45s ease;
      pointer-events: none; overflow: hidden;
    }
    .tv-slide.tv-on  { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .tv-slide.tv-out { opacity: 0; transform: translateY(-14px); pointer-events: none; }

    /* Slide header */
    .sl-head { display: flex; align-items: flex-start; gap: 11px; flex-shrink: 0; }
    .sl-icon  { font-size: 24px; line-height: 1; padding-top: 2px; }
    .sl-cat   {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--accent-dark,#6b8e6f); font-weight: 700; margin-bottom: 2px;
    }
    .sl-title { font-size: 16px; font-weight: 800; color: var(--primary,#5a4a3a); line-height: 1.15; }
    .sl-sub   { font-size: 11px; color: #999; margin-top: 1px; }

    /* KPI row */
    .kpi-row  { display: flex; gap: 9px; flex-shrink: 0; }
    .kpi-card {
      flex: 1; background: white;
      border-radius: 10px; padding: 11px 14px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
      border: 1px solid var(--border-light,#f0ece6);
      display: flex; flex-direction: column; align-items: center;
      text-align: center; min-width: 80px;
    }
    .kpi-card.t-green  { border-top: 3px solid var(--success,#7bad75); }
    .kpi-card.t-orange { border-top: 3px solid var(--warning,#d4a574); }
    .kpi-card.t-red    { border-top: 3px solid var(--danger,#b85c5c); }
    .kpi-card.t-sage   { border-top: 3px solid var(--accent,#8ba88a); }
    .kpi-card.t-blue   { border-top: 3px solid #7ec8e3; }
    .kpi-card.t-purple { border-top: 3px solid #b39ddb; }
    .kpi-card.t-gold   { border-top: 3px solid #d4c27a; }
    .kc-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: #aaa; font-weight: 600; margin-bottom: 4px; }
    .kc-val {
      font-size: clamp(20px, 3.2vw, 38px); font-weight: 800;
      color: var(--primary,#5a4a3a); line-height: 1;
      letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
    }
    .kc-val.big { font-size: clamp(30px, 4.8vw, 54px) !important; }
    .kc-unit { font-size: 10px; color: #bbb; margin-top: 3px; }
    .kc-sub  { font-size: 10px; color: #999; margin-top: 3px; }
    .kc-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: 999px;
      font-size: 9px; font-weight: 700; margin-top: 5px;
    }
    .kc-ok   { background: #e8f5e9; color: #388e3c; }
    .kc-warn { background: #fff8e1; color: #f57f17; }
    .kc-bad  { background: #fce4ec; color: #c62828; }

    /* Two-column layout */
    .two-col { display: flex; gap: 10px; flex: 1; min-height: 0; }
    .col { flex: 1; display: flex; flex-direction: column; gap: 9px; min-height: 0; }

    /* Chart wrap */
    .chart-wrap {
      background: white; border-radius: 10px;
      border: 1px solid var(--border-light,#f0ece6);
      box-shadow: 0 1px 5px rgba(0,0,0,0.06);
      padding: 10px 12px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .chart-lbl {
      font-size: 9px; font-weight: 700;
      color: var(--primary,#5a4a3a);
      text-transform: uppercase; letter-spacing: 0.09em;
      margin-bottom: 6px; flex-shrink: 0;
    }
    .chart-inner { flex: 1; min-height: 0; position: relative; }

    /* Explanation */
    .sl-expl {
      flex-shrink: 0;
      background: rgba(139,168,138,0.05);
      border: 1px solid rgba(139,168,138,0.2);
      border-radius: 7px; padding: 7px 12px;
    }
    .sl-expl-lbl {
      font-size: 8px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--accent-dark,#6b8e6f); font-weight: 700;
      display: block; margin-bottom: 2px;
    }
    .sl-expl-txt { font-size: 10px; color: #888; line-height: 1.5; }

    /* ── Fullscreen ────────────────────────────────────────── */
    .main-content.home-full:fullscreen,
    .main-content.home-full:-webkit-full-screen {
      height: 100vh !important; background: var(--lighter,#faf8f5);
    }
    .main-content.home-full:fullscreen .tv-topbar,
    .main-content.home-full:-webkit-full-screen .tv-topbar {
      padding: 12px 36px; min-height: 60px;
    }
    .main-content.home-full:fullscreen .tv-brand-slide,
    .main-content.home-full:-webkit-full-screen .tv-brand-slide {
      font-size: 17px; max-width: 420px;
    }
    .main-content.home-full:fullscreen .tv-slide,
    .main-content.home-full:-webkit-full-screen .tv-slide {
      padding: 24px 42px 18px; gap: 14px;
    }
    .main-content.home-full:fullscreen .sl-title,
    .main-content.home-full:-webkit-full-screen .sl-title { font-size: 24px; }
    .main-content.home-full:fullscreen .sl-icon,
    .main-content.home-full:-webkit-full-screen .sl-icon { font-size: 34px; }
    .main-content.home-full:fullscreen .kc-val,
    .main-content.home-full:-webkit-full-screen .kc-val {
      font-size: clamp(28px, 4.2vw, 50px);
    }
    .main-content.home-full:fullscreen .kc-val.big,
    .main-content.home-full:-webkit-full-screen .kc-val.big {
      font-size: clamp(46px, 6.5vw, 76px) !important;
    }
    .main-content.home-full:fullscreen .kc-lbl,
    .main-content.home-full:-webkit-full-screen .kc-lbl { font-size: 11px; }
    .main-content.home-full:fullscreen .kc-unit,
    .main-content.home-full:-webkit-full-screen .kc-unit { font-size: 13px; }
    .main-content.home-full:fullscreen .sl-expl-txt,
    .main-content.home-full:-webkit-full-screen .sl-expl-txt { font-size: 13px; }
    .main-content.home-full:fullscreen .chart-lbl,
    .main-content.home-full:-webkit-full-screen .chart-lbl { font-size: 12px; }
  </style>
</head>
<body>
  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/utils.js"></script>
  <script>Auth.requireAuth();</script>

  <div class="app-container">
    <div id="sidebar"></div>

    <main class="main-content home-full" id="mainContent">

      <!-- Barre de contrôle -->
      <div class="tv-topbar">
        <div class="tv-topbar-brand">
          <div class="tv-logo">🏗</div>
          <div>
            <div class="tv-brand-company">Intranet Groupe Goudalle</div>
            <div class="tv-brand-slide" id="tvSlideTitle">Indicateurs</div>
          </div>
        </div>

        <div class="tv-prog-block">
          <div class="tv-prog-wrap"><div class="tv-prog-fill" id="tvProgFill"></div></div>
          <div class="tv-prog-lbl" id="tvProgLbl">&nbsp;</div>
        </div>

        <div class="tv-topbar-right">
          <div class="tv-dots" id="tvDots"></div>
          <div class="tv-clock" id="tvClock"></div>
          <button class="tv-btn" onclick="tvSkip()">▶ Suivant</button>
          <button class="tv-btn tv-btn-primary" id="tvFsBtn" onclick="tvToggleFs()">⛶ Plein écran</button>
        </div>
      </div>

      <!-- Zone slides -->
      <div class="tv-outer" id="tvOuter">
        <div class="tv-loading" id="tvLoading">
          <div class="tv-spinner"></div>
          <div>Chargement des indicateurs…</div>
        </div>
      </div>

    </main>
  </div>

  <script>document.getElementById('sidebar').innerHTML = getSidebar();</script>

  <script>
  // ══════════════════════════════════════════════════════════════════
  //  TABLEAU DE BORD — Rotation automatique 60s
  //  Raccourcis : →/Espace = suivant, F = plein écran
  // ══════════════════════════════════════════════════════════════════

  const TV_MS = 60000;
  let _slides    = [];
  let _idx       = 0;
  let _rotId     = null;
  let _progId    = null;
  let _clockId   = null;
  let _progStart = 0;
  let _charts    = {};

  // ── Helpers ──────────────────────────────────────────────────────
  const _fmt = (v, d) => Number(v||0).toLocaleString('fr-FR',{minimumFractionDigits:d||0,maximumFractionDigits:d||0});
  function _fmtEur(v) {
    const n = Number(v||0);
    if(n>=1000000) return (n/1000000).toFixed(2).replace('.',',')+' M€';
    if(n>=1000)    return Math.round(n/1000)+' K€';
    return Math.round(n)+' €';
  }
  function _fmtCA(v) {
    const n = Number(v||0);
    if(n>=1000) return (n/1000).toFixed(1).replace('.',',')+' M€';
    return Math.round(n)+' K€';
  }
  function _parseIso(s) {
    if(!s) return null;
    const d = new Date(s+'T00:00:00Z');
    return isNaN(d) ? null : d;
  }
  function _fmtDate(s) {
    const d = _parseIso(s);
    return d ? d.toLocaleDateString('fr-FR') : '—';
  }
  function _exYear() {
    const now = new Date();
    return (now.getMonth()+1)>=10 ? now.getFullYear() : now.getFullYear()-1;
  }
  function _toN(v) { const n=Number(v); return Number.isFinite(n)?n:0; }
  function _sh(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── Calculs RH ───────────────────────────────────────────────────
  function _rhGroup(inc) {
    const tod=new Date();
    const tu=new Date(Date.UTC(tod.getUTCFullYear(),tod.getUTCMonth(),tod.getUTCDate()));
    const ey=_exYear();
    const es=_parseIso(ey===2019?'2019-09-01':`${ey}-10-01`);
    const ee=_parseIso(`${ey+1}-09-30`);
    const fil=(inc||[]).filter(i=>{const d=_parseIso(i.accidentDate);return d&&es&&ee&&d>=es&&d<=ee;});
    const srt=[...fil].sort((a,b)=>String(b.accidentDate||'').localeCompare(String(a.accidentDate||'')));
    const lat=srt[0]||null; const ld=lat?_parseIso(lat.accidentDate):null;
    const jsa=ld?Math.max(0,Math.floor((tu-ld)/86400000)):null;
    return { exLabel:`${ey}/${String(ey+1).slice(-2)}`, total:fil.length,
      avecArret:fil.filter(i=>i.gravite==='Avec arrêt'||Number(i.stopDays||0)>0).length,
      joursArret:fil.reduce((s,i)=>s+Number(i.stopDays||0),0),
      jsa, dernierDate:lat?.accidentDate||null };
  }
  function _rhCo(inc,cid) {
    const tod=new Date();
    const tu=new Date(Date.UTC(tod.getUTCFullYear(),tod.getUTCMonth(),tod.getUTCDate()));
    const ey=_exYear();
    const es=_parseIso(ey===2019?'2019-09-01':`${ey}-10-01`);
    const ee=_parseIso(`${ey+1}-09-30`);
    const all=(inc||[]).filter(i=>i.companyId===cid);
    const srt=[...all].sort((a,b)=>String(b.accidentDate||'').localeCompare(String(a.accidentDate||'')));
    const lat=srt[0]||null; const ld=lat?_parseIso(lat.accidentDate):null;
    const jsa=ld?Math.max(0,Math.floor((tu-ld)/86400000)):null;
    const exl=all.filter(i=>{const d=_parseIso(i.accidentDate);return d&&es&&ee&&d>=es&&d<=ee;});
    return {jsa, total:exl.length, dernierDate:lat?.accidentDate||null};
  }

  // ── Construction slides ──────────────────────────────────────────
  function _buildSlides(rhInc) {
    const slides = [];
    const ey = _exYear();

    // ── 1. Sécurité Groupe ─────────────────────────────────────────
    if (Auth.hasAccess('rh_indicateurs') && Array.isArray(rhInc)) {
      const g = _rhGroup(rhInc);
      const cos = [
        {id:'cbco',      short:'CBCO', full:"Concept Bois Côte d'Opale"},
        {id:'charpente', short:'GC',   full:'Goudalle Charpente'},
        {id:'macons',    short:'NGM',  full:'Nouvelle Goudalle Maçonnerie'},
      ];
      const coCards = cos.map(co => {
        const cs = _rhCo(rhInc, co.id);
        const j = cs.jsa;
        const t = j===null?'sage': j>=90?'green': j>=30?'orange':'red';
        const badge = j===null?'' : j>=90
          ?'<div class="kc-badge kc-ok">✓ Excellent</div>'
          : j>=30 ?'<div class="kc-badge kc-warn">⚠ Vigilance</div>'
          :'<div class="kc-badge kc-bad">● Récent</div>';
        return `<div class="kpi-card t-${t}" style="min-width:90px;">
          <div class="kc-lbl">${co.short}</div>
          <div class="kc-val big">${j!==null?_fmt(j):'—'}</div>
          <div class="kc-unit">${j!==null?'jours sans accident':'Aucun enregistré'}</div>
          <div class="kc-sub">${co.full}</div>${badge}
        </div>`;
      }).join('');

      slides.push({
        id:'securite', title:'Sécurité Groupe', chartFn:null,
        html:`
          <div class="sl-head">
            <div class="sl-icon">🦺</div>
            <div>
              <div class="sl-cat">Ressources Humaines</div>
              <div class="sl-title">Sécurité Groupe</div>
              <div class="sl-sub">Exercice ${g.exLabel} — oct. → sept.</div>
            </div>
          </div>
          <div class="kpi-row">${coCards}</div>
          <div class="kpi-row">
            <div class="kpi-card t-sage">
              <div class="kc-lbl">Accidents — exercice ${g.exLabel}</div>
              <div class="kc-val big">${_fmt(g.total)}</div>
              <div class="kc-unit">au total</div>
            </div>
            <div class="kpi-card t-orange">
              <div class="kc-lbl">Avec arrêt de travail</div>
              <div class="kc-val big">${_fmt(g.avecArret)}</div>
              <div class="kc-unit">accidents</div>
            </div>
            <div class="kpi-card t-red">
              <div class="kc-lbl">Jours d'arrêt cumulés</div>
              <div class="kc-val big">${_fmt(g.joursArret)}</div>
              <div class="kc-unit">jours</div>
            </div>
            ${g.jsa!==null?`<div class="kpi-card t-green">
              <div class="kc-lbl">Groupe — sans accident</div>
              <div class="kc-val big">${_fmt(g.jsa)}</div>
              <div class="kc-unit">${g.jsa>1?'jours consécutifs':'jour consécutif'}</div>
              ${g.dernierDate?`<div class="kc-sub">Dernier : ${_fmtDate(g.dernierDate)}</div>`:''}
            </div>`:''}
          </div>
          <div class="sl-expl">
            <span class="sl-expl-lbl">Méthode de calcul</span>
            <span class="sl-expl-txt">Jours calendaires écoulés depuis le dernier accident déclaré, par entité et pour le groupe. Bilan exercice ${g.exLabel} (1er oct. → 30 sept.). Source : registre interne des incidents RH.</span>
          </div>`
      });
    }

    // ── 2. Production Maçonnerie ────────────────────────────────────
    if (Auth.hasAccess('production_indicateurs_maconnerie')) {
      try {
        const kpis = (JSON.parse(localStorage.getItem('goudalle_kpis')||'[]'))
          .filter(k=>k.status==='published')
          .sort((a,b)=>a.year!==b.year?b.year-a.year:b.week-a.week);
        if (kpis.length > 0) {
          const l = kpis[0];
          const r = l.m3>0 ? l.hours/l.m3 : null;
          const th = typeof getKpiRatioThreshold==='function' ? getKpiRatioThreshold() : 5;
          const ok = r!==null && r<=th;
          const last8 = kpis.slice(0,8).reverse();
          const cdata = {
            labels: last8.map(k=>`S${String(k.week).padStart(2,'0')}`),
            m3:     last8.map(k=>Number(k.m3)||0),
            ratio:  last8.map(k=>k.m3>0?Number(k.hours)/Number(k.m3):null),
            th
          };
          slides.push({
            id:'macon', title:'Production Maçonnerie',
            chartFn:(el)=>_chartMacon(el,cdata),
            html:`
              <div class="sl-head">
                <div class="sl-icon">🧱</div>
                <div>
                  <div class="sl-cat">Production — NGM</div>
                  <div class="sl-title">Production Maçonnerie</div>
                  <div class="sl-sub">Dernière semaine publiée : S${String(l.week).padStart(2,'0')} / ${l.year}</div>
                </div>
              </div>
              <div class="kpi-row">
                <div class="kpi-card t-sage">
                  <div class="kc-lbl">Béton coulé</div>
                  <div class="kc-val big">${Number(l.m3).toLocaleString('fr-FR',{minimumFractionDigits:1,maximumFractionDigits:1})}</div>
                  <div class="kc-unit">m³ cette semaine</div>
                </div>
                <div class="kpi-card t-orange">
                  <div class="kc-lbl">Heures travaillées</div>
                  <div class="kc-val big">${Math.round(l.hours)}</div>
                  <div class="kc-unit">heures</div>
                </div>
                <div class="kpi-card t-${ok?'green':'red'}">
                  <div class="kc-lbl">Ratio h/m³</div>
                  <div class="kc-val big">${r!==null?r.toFixed(2):'—'}</div>
                  <div class="kc-unit">objectif ≤ ${th} h/m³</div>
                  ${r!==null?`<div class="kc-badge ${ok?'kc-ok':'kc-bad'}">${ok?'✓ Objectif atteint':'▲ À améliorer'}</div>`:''}
                </div>
              </div>
              <div class="chart-wrap" style="flex:1;">
                <div class="chart-lbl">Tendance — ${last8.length} dernières semaines publiées</div>
                <div class="chart-inner"><canvas id="chart-macon"></canvas></div>
              </div>
              <div class="sl-expl">

    // ── 3. Commerce ─────────────────────────────────────────────────

    // ── 5. Usine CBCO ────────────────────────────────────────────────
    if (Auth.hasAccess('production_indicateurs_usine')) {
      try {
        const sr = localStorage.getItem('goudalle_cbco_securite');

          const sec = sr ? JSON.parse(sr) : null;

          let prodRows = '';

          if (pr) {
            const pd = JSON.parse(pr).sort((a,b)=>a.year!==b.year?b.year-a.year:b.week-a.week);
            if (pd.length > 0) {
              const lp = pd[0];
              const sp = _toN(lp.speedcutM3), ul = _toN(lp.ultraM3), ex = _toN(lp.extraM2);
              prodRows = `<div class="kpi-row" style="flex-shrink:0;">
                <div class="kpi-card t-blue">
                  <div class="kc-lbl">Speedcut S${String(lp.week).padStart(2,'0')}/${lp.year}</div>

      } catch(e) {}

    return slides;

  // ── Charts ────────────────────────────────────────────────────────

    Object.values(_charts).forEach(c=>{ try{c.destroy();}catch{} });
    _charts = {};
  }

  // ── Affichage slides ──────────────────────────────────────────────
  function _showSlide(idx) {
    const cur = document.querySelector('#tvOuter .tv-on');
    const nxt = document.querySelector(`#tvOuter #tvS_${idx}`);
    if (!nxt) return;
    if (cur && cur!==nxt) {
      cur.classList.add('tv-out'); cur.classList.remove('tv-on');
      setTimeout(()=>cur.classList.remove('tv-out'), 550);
    }
    nxt.classList.add('tv-on');
  }

  function _updateBar(idx) {
    const el = document.getElementById('tvSlideTitle');
    if (el) el.textContent = _slides[idx]?.title||'';
    const dc = document.getElementById('tvDots');
    if (!dc) return;
    const n = _slides.length;
    if (n<=1) { dc.innerHTML=''; return; }
    if (n>12) { dc.innerHTML=`<span style="font-size:10px;color:#bbb;">${idx+1} / ${n}</span>`; return; }
    dc.innerHTML = _slides.map((_,i)=>`<div class="tv-dot${i===idx?' tv-on':''}"></div>`).join('');
  }

  function _startProg() {
    _progStart = Date.now();
    const f = document.getElementById('tvProgFill');
    const l = document.getElementById('tvProgLbl');
    if (f) {
      f.style.transition='none'; f.style.width='100%';
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        f.style.transition=`width ${TV_MS}ms linear`; f.style.width='0%';
      }));
    }
    if (_progId) clearInterval(_progId);
    _progId = setInterval(()=>{
      const r = Math.max(0,Math.ceil((TV_MS-(Date.now()-_progStart))/1000));
      if (l) l.textContent = r+'s';
    }, 500);
  }

  function _advance() {
    if (!_slides.length) return;
    _idx = (_idx+1) % _slides.length;
    _showSlide(_idx);
    _updateBar(_idx);
    _startProg();
  }

  function tvSkip() {
    if (_rotId) clearInterval(_rotId);
    _advance();
    _rotId = setInterval(_advance, TV_MS);
  }

  function tvToggleFs() {
    const mc = document.getElementById('mainContent');
    if (!mc) return;
    if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    else mc.requestFullscreen().catch(()=>{});
  }

  document.addEventListener('fullscreenchange', ()=>{
    const btn = document.getElementById('tvFsBtn');
    if (btn) {
      if (document.fullscreenElement) {
        btn.textContent='⛶ Quitter'; btn.classList.add('tv-btn-primary');
      } else {
        btn.textContent='⛶ Plein écran';
      }
    }
    requestAnimationFrame(()=>{
      Object.values(_charts).forEach(c=>{try{c.resize();}catch{}});
    });
  });

  function _tick() {
    const now = new Date();
    const s = now.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})
      +' · '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const el = document.getElementById('tvClock');
    if (el) el.textContent = s;
  }

  function _keyHandler(e) {
    if ((e.key==='ArrowRight'||e.key===' ')&&!e.target.matches('input,textarea,select')) {
      e.preventDefault(); tvSkip();
    }
    if ((e.key==='f'||e.key==='F')&&!e.target.matches('input,textarea,select')) tvToggleFs();
  }

  // ── Init ──────────────────────────────────────────────────────────
  async function _init() {
    if (typeof loadKeysFromServer==='function') {
      await loadKeysFromServer(['goudalle_kpis','goudalle_thresholds','goudalle_cbco_data',
        'goudalle_cbco_commercial','goudalle_sylve_balance','goudalle_cbco_securite',
        'goudalle_cbco_productivite'], {force:false});
    }
    let rhInc = null;
    if (Auth.hasAccess('rh_indicateurs')) {
      try {
        const r = await fetch(SERVER_URL+'/rh-security-incidents',{cache:'no-store'});
        if (r.ok) rhInc = await r.json();
      } catch{}
    }
    _slides = _buildSlides(rhInc);
    _idx    = 0;

    const outer = document.getElementById('tvOuter');
    if (!outer) return;

    if (!_slides.length) {
      outer.innerHTML='<div class="tv-nodata"><div style="font-size:40px;margin-bottom:8px;">📭</div><div>Aucun indicateur disponible pour votre profil.</div></div>';
      return;
    }

    outer.innerHTML = _slides.map((s,i)=>`<div class="tv-slide" id="tvS_${i}">${s.html}</div>`).join('');

    _destroyCharts();
    requestAnimationFrame(()=>{
      _slides.forEach((s,i)=>{
        if (s.chartFn) {
          const el = document.getElementById(`tvS_${i}`);
          if (el) s.chartFn(el);
        }
      });
    });

    _showSlide(0);
    _updateBar(0);
    _startProg();

    if (_rotId) clearInterval(_rotId);
    _rotId = setInterval(_advance, TV_MS);

    _tick();
    if (_clockId) clearInterval(_clockId);
    _clockId = setInterval(_tick, 30000);

    document.addEventListener('keydown', _keyHandler);
  }

  window.addEventListener('load', async ()=>{
    await window.serverReady;
    _init();
  });
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
