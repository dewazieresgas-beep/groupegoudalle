<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Intranet Goudalle</title>
  <link rel="stylesheet" href="./style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .dashboard-grid > .card {
      display: flex;
      flex-direction: column;
    }
    .dashboard-grid > .card > .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .gm-chart-kpi {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding-bottom: 0;
      margin-bottom: 0;
      position: relative;
    }
    .gm-arrow-underline {
      position: relative;
      height: 10px;
      margin-bottom: 0;
      overflow: visible;
    }
    .gm-arrow-underline svg {
      position: absolute;
      top: 0;
      left: 0;
      overflow: visible;
      z-index: 2;
      pointer-events: none;
    }
    .gm-chart-kpi-value {
      font-size: 56px;
      line-height: 1;
      font-weight: 700;
      color: #1f1f1f;
      letter-spacing: 0.5px;
    }
    .gm-chart-kpi-smiley img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      display: block;
    }
    @media (max-width: 768px) {
      .gm-chart-kpi-value {
        font-size: 38px;
      }
      .gm-chart-kpi-smiley img {
        width: 80px;
        height: 80px;
      }
    }
    @media (max-width: 1024px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <script src="./js/auth.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/reminders.js"></script>
  <script>
    // Définir le logo à utiliser (groupe ou maconnerie)
    window.APP_LOGO = 'groupe';
  </script>
  <script>
    // ===== PROTECTION DE LA PAGE =====
    // Vérifier immédiatement si l'utilisateur est connecté
    // Rediriger vers login si non authentifié
    if (!Auth.isConnected()) {
      window.location.href = './login.html';
    }
  </script>

  <div class="app-container">
    <div id="sidebar"></div>
    
    <main class="main-content">
      <h1>Tableau de bord</h1>

      <!-- Notification des rappels envoyés -->
      <div id="reminderNotif" style="display:none; padding: 12px 18px; border-radius: 8px; background: rgba(52, 152, 219, 0.12); border-left: 4px solid #3498db; margin-bottom: 18px; font-size: 14px; color: #2c3e50;"></div>

      <div class="dashboard-grid">
        <!-- GOUDALLE MAÇONNERIE -->
        <div class="card">
          <div class="card-title" style="display: flex; justify-content: center; align-items: center; height: 70px;">
            <img src="./assets/goudalle-maconnerie.png" alt="Goudalle Maçonnerie" style="height: 60px; width: auto;">
          </div>
          <div class="card-body">
            <div id="gm-content">Chargement...</div>
            
            <!-- GRAPHIQUE DE TENDANCE -->
            <div id="gm-chart-section" style="margin-top: 20px;">
              <div class="gm-chart-kpi">
                <div id="gmInlineRatio" class="gm-chart-kpi-value">--</div>
                <div id="gmInlineSmiley" class="gm-chart-kpi-smiley">🙂</div>
              </div>
              <div class="gm-arrow-underline">
                <svg id="gmArrowSvg" viewBox="0 0 400 50" preserveAspectRatio="none"></svg>
              </div>
              <div style="position: relative; flex: 1; min-height: 200px;">
                <canvas id="gmTrendChart"></canvas>
              </div>
            </div>
          </div>
        </div>

        <!-- CBCO -->
        <div class="card" id="cbcoCard">
          <div class="card-title" style="display: flex; justify-content: center; align-items: center; height: 70px;">
            <img src="./assets/cbco.png" alt="CBCO" style="height: 60px; width: auto;">
          </div>
          <div class="card-body">
            <div style="position: relative; flex: 1; min-height: 200px;">
              <canvas id="cbcoHomeChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- TAUX DE RÉUSSITE COMMERCIAL -->
      <div class="card" style="margin-bottom: 20px;">
        <div class="card-title">
          <h2>💼 Taux de réussite commercial CBCO – Mois dernier</h2>
        </div>
        <div class="card-body">
          <div style="display: flex; align-items: center; gap: 30px; flex-wrap: wrap;">
            <div style="position: relative; width: 180px; height: 180px; flex-shrink: 0;">
              <canvas id="commercialTauxChart"></canvas>
            </div>
            <div id="commercialTauxDetails" style="flex: 1; min-width: 200px;"></div>
          </div>
        </div>
      </div>

      <!-- SYLVE SUPPORT - RETARDS RÈGLEMENTS -->
      <div class="dashboard-grid" style="margin-bottom: 20px;">
        <div class="card">
          <div class="card-title">
            <h2>🏗️ Retard règlements clients — en M€</h2>
          </div>
          <div class="card-body">
            <div style="position: relative; flex: 1; min-height: 200px;">
              <canvas id="ssHomeRetardChart"></canvas>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-title">
            <h2>🏗️ Retard règlements / CA mensuel</h2>
          </div>
          <div class="card-body">
            <div style="position: relative; flex: 1; min-height: 200px;">
              <canvas id="ssHomeRetardCAChart"></canvas>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script>
    // ===== GRAPHIQUE DE TENDANCE GM =====
    let gmTrendChart;

    /**
     * Récupère une variable CSS (pour les couleurs du graphique)
     * @param {string} name - Nom de la variable CSS (ex: '--accent-dark')
     * @param {string} fallback - Valeur par défaut si non trouvée
     * @returns {string} - Valeur de la variable CSS
     */
    function getCssVar(name, fallback) {
      const value = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      return value || fallback;
    }

    /**
     * Dessine la flèche SVG de soulignement indicateur vers le dernier point du graphique
     */
    function drawGMArrowSVG() {
      if (!gmTrendChart) return;
      const meta = gmTrendChart.getDatasetMeta(0);
      const points = meta?.data || [];
      if (points.length === 0) return;

      const lastPoint = points[points.length - 1];
      if (!lastPoint) return;

      const canvas = gmTrendChart.canvas;
      const svgEl = document.getElementById('gmArrowSvg');
      const arrowContainer = svgEl?.parentElement;
      if (!svgEl || !arrowContainer) return;

      // Coordonnées du dernier point : position relative au container SVG
      const canvasRect = canvas.getBoundingClientRect();
      const containerRect = arrowContainer.getBoundingClientRect();

      const targetX = canvasRect.left - containerRect.left + lastPoint.x;
      const targetY = canvasRect.top - containerRect.top + lastPoint.y;

      // Soulignement centré
      const containerW = containerRect.width;
      const containerH = containerRect.height;
      const lineY = 4;
      const startX = containerW * 0.15;
      const elbowX = containerW * 0.85;

      // Mise à jour du viewBox
      svgEl.setAttribute('viewBox', `0 0 ${containerW} ${containerH + targetY}`);
      svgEl.style.width = containerW + 'px';
      svgEl.style.height = Math.max(containerH, targetY + 10) + 'px';

      // Calcul de la pointe
      const angle = Math.atan2(targetY - lineY, targetX - elbowX);
      const hl = 12;
      const ax = targetX - hl * Math.cos(angle - Math.PI / 6);
      const ay = targetY - hl * Math.sin(angle - Math.PI / 6);
      const bx = targetX - hl * Math.cos(angle + Math.PI / 6);
      const by = targetY - hl * Math.sin(angle + Math.PI / 6);

      svgEl.innerHTML = `
        <line x1="${startX}" y1="${lineY}" x2="${elbowX}" y2="${lineY}" stroke="#111" stroke-width="4" stroke-linecap="round"/>
        <line x1="${elbowX}" y1="${lineY}" x2="${targetX}" y2="${targetY}" stroke="#111" stroke-width="4" stroke-linecap="round"/>
        <polygon points="${targetX},${targetY} ${ax},${ay} ${bx},${by}" fill="#111"/>
      `;
    }

    /**
     * Génère le graphique de tendance h/m³ pour la page d'accueil
     */
    function renderGMTrendChart() {
      const kpis = getKPIs();
      const published = kpis.filter(k => k.status === 'published').sort(compareByYearWeekDesc);

      // Toujours afficher 1 mois (4 semaines)
      drawGMTrendChart(published, 4);
    }

    /**
     * Dessine le graphique de tendance avec Chart.js
     * @param {Array} published - Liste des indicateurs publiés
     * @param {number} weeksBack - Nombre de semaines à afficher
     */
    function drawGMTrendChart(published, weeksBack) {
      const slice = published.slice(0, weeksBack).reverse();
      if (slice.length === 0) return;

      const labels = slice.map(k => `S${String(k.week).padStart(2, '0')}/${k.year}`);
      const ratioData = slice.map(k => calculateRatio(k.hours, k.m3));

      const ctx = document.getElementById('gmTrendChart').getContext('2d');
      if (gmTrendChart) gmTrendChart.destroy();

      const lineColor = getCssVar('--accent-dark', '#6b8e6f');
      const fillColor = 'rgba(107, 142, 111, 0.12)';
      const threshold = getKpiRatioThreshold();
      gmTrendChart = new Chart(ctx, {
        type: 'line',
        plugins: [{
          id: 'drawArrowAfter',
          afterRender: () => drawGMArrowSVG()
        }],
        data: {
          labels,
          datasets: [
            {
              label: 'h/m³',
              data: ratioData,
              borderColor: lineColor,
              backgroundColor: fillColor,
              tension: 0,
              spanGaps: false,
              pointRadius: 3,
              pointHoverRadius: 5,
              fill: true
            },
            {
              label: `Seuil (${threshold} h/m³)`,
              data: new Array(labels.length).fill(threshold),
              borderColor: '#e74c3c',
              borderWidth: 2,
              borderDash: [5, 5],
              pointRadius: 0,
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const v = ctx.parsed?.y;
                  return Number.isFinite(v) ? `h/m³ : ${v.toFixed(2)}` : 'h/m³ : —';
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: (context) => context.index === labels.length - 1 ? '#e74c3c' : undefined,
                font: (context) => context.index === labels.length - 1 ? { weight: 'bold', size: 13 } : {}
              }
            },
            y: {
              beginAtZero: true,
              title: { display: true, text: 'h/m³' }
            }
          }
        }
      });
    }

    /**
     * Initialise la page d'accueil
     * - Charge la sidebar
     * - Affiche les données du dernier indicateur publié
     * - Affiche le card admin si utilisateur = direction
     */
    function initHome() {
      // Injecter la sidebar dans le DOM
      document.getElementById('sidebar').innerHTML = getSidebar();

      // Récupérer le dernier indicateur publié
      const lastWeek = getLastPublishedWeek();
      if (!lastWeek) {
        document.getElementById('gm-content').innerHTML = '<p>📊 Aucune donnée publiée encore</p>';
        document.getElementById('gmInlineRatio').textContent = '--';
        document.getElementById('gmInlineSmiley').innerHTML = '🙂';
      } else {
        // Calculer le ratio et déterminer la performance
        const ratio = calculateRatio(lastWeek.hours, lastWeek.m3);
        const smiley = getSmiley(ratio);

        // Retirer le commentaire sur la carte d'accueil GM
        document.getElementById('gm-content').innerHTML = '';

        // Mettre à jour l'indicateur compact dans l'en-tête du graphique
        document.getElementById('gmInlineRatio').textContent = ratio !== null ? `${ratio.toFixed(2)} h/m³` : '--';
        document.getElementById('gmInlineSmiley').innerHTML = getSmileyEmoji(smiley);

        // Rendre le graphique de tendance
        renderGMTrendChart();
      }

      // ===== SECTION CBCO =====
      renderCBCOHomeChart();

      // ===== TAUX DE RÉUSSITE COMMERCIAL =====
      renderCommercialTauxChart();

      // ===== RAPPELS AUTOMATIQUES (direction uniquement) =====
      if (Auth.isDirection()) {
        Reminders.checkAndSendReminders().then(results => {
          if (results.length > 0) {
            const notif = document.getElementById('reminderNotif');
            const details = results.map(r => `${r.indicator} → ${r.user}`).join(', ');
            notif.innerHTML = `📧 <strong>${results.length} rappel(s) envoyé(s) :</strong> ${details}`;
            notif.style.display = 'block';
          }
        });
      }

      // ===== SYLVE SUPPORT CHARTS =====
      renderSylveHomeCharts();
    }

    /**
     * Génère le graphique CBCO pour la page d'accueil
     * Affiche les 3 dernières années par défaut
     */
    let cbcoHomeChart;
    function renderCBCOHomeChart() {
      const MONTH_NAMES = ['', 'Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin',
                            'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
      
      const byYear = getCBCOByYear();
      const allYears = Object.keys(byYear).sort((a, b) => a - b);
      
      // Prendre seulement les 3 dernières années
      const years = allYears.slice(-3);
      
      if (years.length === 0) {
        const canvas = document.getElementById('cbcoHomeChart');
        if (canvas) {
          const ctx = canvas.getContext('2d');
          ctx.font = '16px Arial';
          ctx.fillStyle = '#666';
          ctx.textAlign = 'center';
          ctx.fillText('Aucune donnée disponible', canvas.width / 2, canvas.height / 2);
        }
        return;
      }

      // Préparer les datasets pour chaque année
      const datasets = [];
      const colors = [
        { border: '#3498db' },
        { border: '#2ecc71' },
        { border: '#e74c3c' },
        { border: '#f39c12' },
        { border: '#9b59b6' },
        { border: '#1abc9c' },
        { border: '#e67e22' },
        { border: '#34495e' },
        { border: '#c0392b' },
        { border: '#16a085' },
      ];

      years.forEach((year, idx) => {
        const entries = byYear[year].sort((a, b) => a.month - b.month);

        // Aligner chaque cumul sur son vrai mois (1..12)
        const cumulByMonth = {};
        entries.forEach(e => {
          cumulByMonth[e.month] = e.cumulAnnuel;
        });

        const cumulValues = Array.from({ length: 12 }, (_, i) => {
          const month = i + 1;
          return Object.prototype.hasOwnProperty.call(cumulByMonth, month)
            ? cumulByMonth[month]
            : null;
        });

        const color = colors[idx % colors.length];
        datasets.push({
          label: `Année ${year}`,
          data: cumulValues,
          borderColor: color.border,
          backgroundColor: color.border,
          tension: 0,
          fill: false,
          pointRadius: 3,
          pointHoverRadius: 5,
          spanGaps: false
        });
      });

      // Créer le graphique
      const ctx = document.getElementById('cbcoHomeChart').getContext('2d');
      if (cbcoHomeChart) cbcoHomeChart.destroy();

      const labels = Array.from({ length: 12 }, (_, i) => MONTH_NAMES[i + 1]);

      // Trouver le dernier mois avec données dans l'année la plus récente
      const latestYear = years[years.length - 1];
      const latestEntries = byYear[latestYear].sort((a, b) => a.month - b.month);
      const lastMonthIndex = latestEntries.length > 0 ? latestEntries[latestEntries.length - 1].month - 1 : -1;

      const formatCBCOCurrency = (value) => {
        return new Intl.NumberFormat('fr-FR', { 
          minimumFractionDigits: 0, 
          maximumFractionDigits: 0 
        }).format(value) + ' K€';
      };

      cbcoHomeChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              display: true,
              position: 'top'
            },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const v = ctx.parsed?.y;
                  return `Cumul annuel : ${formatCBCOCurrency(v)}`;
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: (context) => context.index === lastMonthIndex ? '#e74c3c' : undefined,
                font: (context) => context.index === lastMonthIndex ? { weight: 'bold', size: 13 } : {}
              }
            },
            y: {
              beginAtZero: true,
              ticks: {
                callback: (value) => formatCBCOCurrency(value)
              }
            }
          }
        }
      });
    }

    /**
     * Redirige vers la page Goudalle Maçonnerie
     */
    function goToGM() {
      window.location.href = './pages/gm.html';
    }

    /**
     * Redirige vers la page CBCO
     */
    function goToCBCO() {
      window.location.href = './pages/cbco.html';
    }

    /**
     * Redirige vers la page d'administration GM
     */
    function goToAdmin() {
      window.location.href = './pages/gm-admin.html';
    }

    /**
     * Affiche le graphique taux de réussite commercial CBCO du mois dernier
     */
    let commercialTauxChart;
    function renderCommercialTauxChart() {
      const MOIS = ['', 'janvier', 'février', 'mars', 'avril', 'mai', 'juin',
                     'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];

      const today = new Date();
      const prevMonth = today.getMonth() === 0 ? 12 : today.getMonth();
      const prevYear = today.getMonth() === 0 ? today.getFullYear() - 1 : today.getFullYear();

      const stats = getCBCOCommercialTauxReussite(prevMonth, prevYear);
      const periodLabel = `${MOIS[prevMonth]} ${prevYear}`;

      const detailsDiv = document.getElementById('commercialTauxDetails');
      const ctx = document.getElementById('commercialTauxChart').getContext('2d');

      if (stats.total === 0) {
        detailsDiv.innerHTML = `
          <div style="color: #999; font-size: 15px;">
            <strong>Période : ${periodLabel}</strong><br><br>
            Aucune affaire saisie sur cette période.
          </div>
        `;
        // Graphique vide
        if (commercialTauxChart) commercialTauxChart.destroy();
        commercialTauxChart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['Aucune donnée'],
            datasets: [{ data: [1], backgroundColor: ['#e0e0e0'], borderWidth: 0 }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            cutout: '70%',
            plugins: {
              legend: { display: false },
              tooltip: { enabled: false }
            }
          }
        });
        return;
      }

      const taux = stats.taux !== null ? stats.taux.toFixed(0) : '—';
      const tauxColor = stats.taux === null ? '#999' : (stats.taux >= 50 ? '#27ae60' : '#e74c3c');

      detailsDiv.innerHTML = `
        <div style="font-size: 15px; line-height: 1.8;">
          <strong>Période : ${periodLabel}</strong><br>
          <span style="color: #27ae60;">✅ Gagnées : <strong>${stats.gagnees}</strong></span><br>
          <span style="color: #e74c3c;">❌ Perdues : <strong>${stats.perdues}</strong></span><br>
          <span style="color: #f39c12;">⏳ En cours : <strong>${stats.enCours}</strong></span><br>
          <span>📊 Total affaires : <strong>${stats.total}</strong></span><br><br>
          <span style="font-size: 22px; font-weight: 700; color: ${tauxColor};">
            Taux de réussite : ${taux}${stats.taux !== null ? ' %' : ''}
          </span>
        </div>
      `;

      // Doughnut chart
      const gagnees = stats.gagnees;
      const perdues = stats.perdues;
      const cloturees = gagnees + perdues;

      if (commercialTauxChart) commercialTauxChart.destroy();

      if (cloturees === 0) {
        commercialTauxChart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['En cours'],
            datasets: [{ data: [stats.enCours], backgroundColor: ['#f39c12'], borderWidth: 0 }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            cutout: '70%',
            plugins: {
              legend: { display: false },
              tooltip: { enabled: false }
            }
          }
        });
      } else {
        commercialTauxChart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['Gagnées', 'Perdues'],
            datasets: [{
              data: [gagnees, perdues],
              backgroundColor: ['#27ae60', '#e74c3c'],
              borderWidth: 2,
              borderColor: '#fff'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            cutout: '70%',
            plugins: {
              legend: { display: true, position: 'bottom' },
              tooltip: {
                callbacks: {
                  label: (ctx) => `${ctx.label} : ${ctx.parsed}`
                }
              }
            }
          }
        });
      }
    }

    // ===== SYLVE SUPPORT - GRAPHIQUES ACCUEIL =====
    let ssHomeRetardChart, ssHomeRetardCAChart;

    function renderSylveHomeCharts() {
      const retards = getSylveRetardsMensuels();
      if (retards.length === 0) return;

      const MOIS_COURT = ['', 'Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Jun', 'Jul', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];
      const labels = retards.map(r => `${MOIS_COURT[r.mois]} ${r.annee}`);

      // Graphique 1 : Retards en M€ (courbes)
      const ctx1 = document.getElementById('ssHomeRetardChart');
      if (ctx1) {
        if (ssHomeRetardChart) ssHomeRetardChart.destroy();
        ssHomeRetardChart = new Chart(ctx1.getContext('2d'), {
          type: 'line',
          data: {
            labels,
            datasets: [
              {
                label: 'CBCO',
                data: retards.map(r => r.cbco / 1000000),
                borderColor: '#3498db',
                backgroundColor: '#3498db',
                tension: 0.3,
                fill: false,
                pointRadius: 3
              },
              {
                label: 'Goudalle Charpente',
                data: retards.map(r => r.gc / 1000000),
                borderColor: '#2ecc71',
                backgroundColor: '#2ecc71',
                tension: 0.3,
                fill: false,
                pointRadius: 3
              },
              {
                label: 'Goudalle Maçonnerie',
                data: retards.map(r => r.gm / 1000000),
                borderColor: '#e67e22',
                backgroundColor: '#e67e22',
                tension: 0.3,
                fill: false,
                pointRadius: 3
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: true, position: 'top' },
              tooltip: {
                callbacks: {
                  label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)} M€`
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { callback: (v) => v.toFixed(2) + ' M€' }
              }
            }
          }
        });
      }

      // Graphique 2 : Retards en € (barres)
      const ctx2 = document.getElementById('ssHomeRetardCAChart');
      if (ctx2) {
        if (ssHomeRetardCAChart) ssHomeRetardCAChart.destroy();
        ssHomeRetardCAChart = new Chart(ctx2.getContext('2d'), {
          type: 'bar',
          data: {
            labels,
            datasets: [
              {
                label: 'CBCO',
                data: retards.map(r => r.cbco),
                backgroundColor: 'rgba(52, 152, 219, 0.7)',
                borderColor: '#3498db',
                borderWidth: 1
              },
              {
                label: 'Goudalle Charpente',
                data: retards.map(r => r.gc),
                backgroundColor: 'rgba(46, 204, 113, 0.7)',
                borderColor: '#2ecc71',
                borderWidth: 1
              },
              {
                label: 'Goudalle Maçonnerie',
                data: retards.map(r => r.gm),
                backgroundColor: 'rgba(230, 126, 34, 0.7)',
                borderColor: '#e67e22',
                borderWidth: 1
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: true, position: 'top' },
              tooltip: {
                callbacks: {
                  label: (ctx) => `${ctx.dataset.label}: ${formatSylveEuros(ctx.parsed.y)}`
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { callback: (v) => formatSylveEuros(v) }
              }
            }
          }
        });
      }
    }

    // ===== INITIALISATION =====
    // Démarrer l'initialisation après un court délai
    // pour garantir que le DOM est complètement chargé
    setTimeout(initHome, 100);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
