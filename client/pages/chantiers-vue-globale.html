<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue globale — Intranet Goudalle</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    #map { height: 520px; width: 100%; z-index: 1; }
    .kpi-stat { background:white; border-radius:8px; padding:14px 16px; border:1px solid var(--border); text-align:center; flex:1; min-width:110px; }
    .kpi-stat-value { font-size:24px; font-weight:700; line-height:1; margin-bottom:4px; color:var(--primary); }
    .kpi-stat-label { font-size:11px; color:var(--text-muted-dark); font-weight:600; text-transform:uppercase; letter-spacing:.4px; }
    .filters { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
    .filters select { padding:7px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; background:white; cursor:pointer; }
    .filters label { font-size:13px; font-weight:600; color:var(--dark); }
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>Auth.requirePermission('chantiers_vue_globale');</script>

  <div class="app-container">
    <div id="sidebar"></div>
    <main class="main-content">

      <div class="d-flex justify-between items-center mb-3" style="gap:12px;flex-wrap:wrap;">
        <div>
          <h1 class="mb-0">Vue globale — Goudalle Charpente</h1>
          <p style="color:var(--text-muted-dark);margin:4px 0 0;font-size:14px;">Tous les chantiers dont l'adresse est renseignée dans la fiche chantier.</p>
        </div>
        <button onclick="loadData(true)" title="Recharger les données" style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--lighter);cursor:pointer;font-size:12px;color:var(--text-muted-dark);">🔄 Actualiser</button>
      </div>

      <!-- Filtre conducteur -->
      <div class="filters">
        <label>Conducteur :</label>
        <select id="filter-conducteur" onchange="applyFilter()">
          <option value="">Tous</option>
        </select>
      </div>

      <!-- Stats -->
      <div id="stats-row" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;"></div>

      <!-- Carte -->
      <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px;border-radius:8px;">
        <div id="map"></div>
        <div id="map-note" style="padding:10px 14px;border-top:1px solid var(--border);background:var(--lighter);font-size:12px;color:var(--text-muted-dark);">
          Chargement…
        </div>
      </div>

    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let map, markers = {};
    let allChantiers = [], displayed = [];

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function normName(s) { return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim(); }

    function pinIcon() {
      return L.divIcon({
        html: `<div style="background:#5a4a3a;width:20px;height:20px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.35);"></div>`,
        iconSize:[20,20], iconAnchor:[10,20], popupAnchor:[0,-24], className:'',
      });
    }

    function buildPopup(c) {
      return `<div style="min-width:200px;font-family:Arial,sans-serif;font-size:13px;line-height:1.5;">
        <div style="font-weight:700;font-size:14px;margin-bottom:5px;">${esc(c.nom)}</div>
        ${c.adresse ? `<div style="color:#555;margin-bottom:3px;">📍 ${esc(c.adresse)}</div>` : ''}
        ${c.conducteur ? `<div style="margin-bottom:3px;">👷 ${esc(c.conducteur)}</div>` : ''}
        ${c.dossier ? `<div style="margin-top:8px;"><a href="chantiers-dossiers.html?rel=${encodeURIComponent(c.dossier)}" style="display:block;text-align:center;padding:5px;background:#5a4a3a;color:white;border-radius:5px;font-size:12px;text-decoration:none;">📁 Ouvrir le dossier</a></div>` : ''}
      </div>`;
    }

    function getFiltered() {
      const conducteur = document.getElementById('filter-conducteur').value;
      return conducteur ? allChantiers.filter(c => normName(c.conducteur) === normName(conducteur)) : [...allChantiers];
    }

    function renderMarkers() {
      Object.values(markers).forEach(m => map.removeLayer(m));
      markers = {};
      const bounds = [];
      displayed = getFiltered();
      displayed.forEach(c => {
        if (!c.lat || !c.lng) return;
        markers[c.id] = L.marker([c.lat, c.lng], { icon: pinIcon() })
          .addTo(map).bindPopup(buildPopup(c), { maxWidth:280 });
        bounds.push([c.lat, c.lng]);
      });
      if (bounds.length) map.fitBounds(bounds, { padding:[35,35], maxZoom:12 });
    }

    function renderStats() {
      document.getElementById('stats-row').innerHTML = `
        <div class="kpi-stat"><div class="kpi-stat-value">${displayed.filter(c=>c.lat&&c.lng).length}</div><div class="kpi-stat-label">Sur la carte</div></div>
        <div class="kpi-stat"><div class="kpi-stat-value">${allChantiers.length}</div><div class="kpi-stat-label">Total avec adresse</div></div>
        <div class="kpi-stat"><div class="kpi-stat-value">${new Set(allChantiers.map(c=>c.conducteur).filter(Boolean)).size}</div><div class="kpi-stat-label">Conducteurs</div></div>`;
    }

    function applyFilter() {
      renderMarkers();
      renderStats();
      document.getElementById('map-note').textContent = `${displayed.filter(c=>c.lat&&c.lng).length} chantier(s) affiché(s).`;
    }

    function populateConducteurs() {
      const sel = document.getElementById('filter-conducteur');
      const seen = new Map();
      allChantiers.forEach(c => {
        if (c.conducteur) {
          const k = normName(c.conducteur);
          if (!seen.has(k)) seen.set(k, c.conducteur.replace(/\S+/g, w => w[0].toUpperCase()+w.slice(1).toLowerCase()));
        }
      });
      [...seen.values()].sort().forEach(n => {
        const o = document.createElement('option');
        o.value = n; o.textContent = n;
        sel.appendChild(o);
      });
    }

    async function loadData(force = false) {
      document.getElementById('map-note').textContent = 'Chargement…';
      try {
        const data = await fetch(SERVER_URL + '/dossiers/carte' + (force ? '?refresh=1' : '')).then(r => r.json());
        allChantiers = data?.chantiers || [];
        populateConducteurs();
        applyFilter();
      } catch(e) {
        document.getElementById('map-note').textContent = 'Erreur : ' + e.message;
      }
    }

    async function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectChantiersSecondaryBar();

      map = L.map('map').setView([50.5, 2.5], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19,
      }).addTo(map);

      await loadData();
    }

    window.onServerReady(init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
