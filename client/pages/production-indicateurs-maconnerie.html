<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indicateurs Maçonnerie - Intranet</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    window.APP_LOGO = 'maconnerie';
  </script>

  <script>
    Auth.requirePermission('production_indicateurs_maconnerie');
  </script>

  <div class="app-container">
    <div id="sidebar"></div>
    
    <main class="main-content">
      <!-- SECTION PRINCIPALE - DERNIÈRE SEMAINE -->
      <div class="gm-main-section">
        <div class="gm-header">
          <h1 id="gmMainTitle">Volume de béton coulé semaine <span id="weekNumber">—</span></h1>
          <div style="display: none;" id="gmStatus" class="gm-status"></div>
        </div>

        <!-- CONTAINER PRINCIPAL 3 COLONNES -->
        <div class="gm-main-container">
          <!-- COLONNE 1 : INDICATEURS VERTICAUX -->
          <div class="gm-kpi-column">
            <div class="gm-kpi-card gm-kpi-m3">
              <div class="gm-kpi-label">m³ coulés</div>
              <div class="gm-kpi-value" id="mainM3">30.00</div>
            </div>
            <div class="gm-kpi-card gm-kpi-hours">
              <div class="gm-kpi-label">Heures</div>
              <div class="gm-kpi-value" id="mainHours">121</div>
            </div>
            <div class="gm-kpi-card gm-kpi-ratio">
              <div class="gm-kpi-label">h/m³</div>
              <div class="gm-kpi-value" id="mainRatio">5.27</div>
            </div>
          </div>

          <!-- COLONNE 2 : GRAPHIQUE -->
          <div class="gm-chart-column">
            <div class="gm-chart-section">
              <div class="gm-chart-header">
                <h2>Tendance h/m³</h2>
                <select id="trendRange" class="gm-range-select">
                  <option value="4">1 mois</option>
                  <option value="8">2 mois</option>
                  <option value="52">1 an</option>
                  <option value="104">2 ans</option>
                </select>
              </div>
              <div class="gm-chart-container">
                <canvas id="kpiChart"></canvas>
              </div>
            </div>
          </div>

          <!-- COLONNE 3 : INDICATEUR EMOJI -->
          <div class="gm-indicator-column">
            <div class="gm-indicator-card" id="mainIndicator"></div>
          </div>
        </div>

        <!-- COMMENTAIRE + ACIER -->
        <div class="gm-comment-section" style="display:grid; grid-template-columns:1fr auto; gap:20px; align-items:stretch;">
          <div>
            <h2>Commentaire de la semaine</h2>
            <textarea id="weekComment" class="gm-comment-input" placeholder="Ajouter un commentaire..." rows="4" readonly></textarea>
          </div>
          <div class="gm-kpi-card gm-kpi-acier" style="min-width:160px; margin:0; box-shadow:none; flex:none;">
            <div class="gm-kpi-label">Acier façonné (T)</div>
            <div class="gm-kpi-value" id="mainAcier" style="font-size:36px;">—</div>
          </div>
        </div>
      </div>

      <!-- SECTION SECONDAIRE - HISTORIQUE -->
      <div class="gm-secondary-section">
        <h2>Historique du mois dernier (4 semaines)</h2>
        <div class="gm-history-layout">
          <div class="gm-history-table-wrap">
            <table id="historyTable">
              <thead>
                <tr>
                  <th>Semaine</th>
                  <th>m³</th>
                  <th>Heures</th>
                  <th>h/m³</th>
                  <th>Commentaire</th>
                </tr>
              </thead>
              <tbody>
                <tr><td colspan="5" style="text-align:center; padding: 20px;">Chargement...</td></tr>
              </tbody>
            </table>
          </div>
          <aside class="gm-history-summary">
            <div class="gm-history-summary-title" id="historyMonthLabel">Mois dernier</div>
            <div class="gm-history-summary-value" id="historyMonthAvg">— h/m³</div>
            <div class="gm-history-indicator" id="historyMonthIndicator"></div>
          </aside>
        </div>
      </div>

      <!-- CAMEMBERT RÉPARTITION DU TEMPS -->
      <div id="timeDistributionSection" class="gm-comment-section" style="display:none;">
        <h2>Répartition du temps de travail</h2>
        <div id="timeDistributionLegend" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px;"></div>
        <div style="display:grid; grid-template-columns: 320px 1fr; gap:24px; align-items:start;">
          <div style="padding:20px;">
            <canvas id="timeDistributionChart"></canvas>
          </div>
          <div style="min-height:280px;">
            <h3 style="margin:0 0 10px 0; font-size:14px; color:var(--primary);">Évolution par semaine</h3>
            <div style="height:260px;">
              <canvas id="timeEvolutionChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    /**
     * Indique si la page est ouverte en mode impression
     * @returns {boolean}
     */
    function isDownloadMode() {
      const params = new URLSearchParams(window.location.search);
      return params.get('download') === '1';
    }

    // Variable globale pour stocker l'instance du graphique Chart.js
    let chart;
    // Clé de stockage pour la préférence de plage de temps du graphique
    const GM_TREND_RANGE_STORAGE_KEY = 'goudalle_gm_trend_range_weeks';

    /**
     * Formate le titre du graphique selon le nombre de semaines
     * @param {number} weeks - Nombre de semaines à afficher
     * @returns {string} - Titre formaté
     */
    function formatTrendTitle(weeks) {
      if (weeks === 4) return 'Tendance 1 mois';
      if (weeks === 8) return 'Tendance 2 mois';
      if (weeks === 52) return 'Tendance 1 an';
      if (weeks === 104) return 'Tendance 2 ans';
      return `Tendance ${weeks} semaines`;
    }

    /**
     * Récupère le nombre de semaines sélectionné dans l'interface
     * @returns {number} - Nombre de semaines (par défaut : 8)
     */
    function getTrendWeeksFromUI() {
      const raw = document.getElementById('trendRange')?.value;
      const weeks = parseInt(raw, 10);
      return Number.isFinite(weeks) && weeks > 0 ? weeks : 8;
    }

    /**
     * Charge la préférence de plage de temps depuis localStorage
     * @returns {number} - Nombre de semaines sauvegardé (par défaut : 8)
     */
    function loadTrendWeeksPreference() {
      const stored = localStorage.getItem(GM_TREND_RANGE_STORAGE_KEY);
      const weeks = parseInt(stored || '', 10);
      // Valider que c'est une des options proposées
      if ([4, 8, 52, 104].includes(weeks)) return weeks;
      return 8;  // Par défaut : 2 mois
    }

    /**
     * Sauvegarde la préférence de plage de temps
     * @param {number} weeks - Nombre de semaines à sauvegarder
     */
    function saveTrendWeeksPreference(weeks) {
      localStorage.setItem(GM_TREND_RANGE_STORAGE_KEY, String(weeks));
    }

    /**
     * Récupère une variable CSS (pour les couleurs du graphique)
     * @param {string} name - Nom de la variable CSS (ex: '--accent-dark')
     * @param {string} fallback - Valeur par défaut si non trouvée
     * @returns {string} - Valeur de la variable CSS
     */
    function getCssVar(name, fallback) {
      const value = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      return value || fallback;
    }

    /**
     * Parse une date FR au format jj/mm/aaaa
     * @param {string} frDate - Date formatée
     * @returns {Date|null} - Date JS ou null si invalide
     */
    function parseFrDate(frDate) {
      const parts = (frDate || '').split('/');
      if (parts.length !== 3) return null;
      const day = parseInt(parts[0], 10);
      const month = parseInt(parts[1], 10);
      const year = parseInt(parts[2], 10);
      if (!Number.isFinite(day) || !Number.isFinite(month) || !Number.isFinite(year)) return null;
      return new Date(year, month - 1, day);
    }

    /**
     * Génère le graphique de tendance h/m³ avec Chart.js
     * @param {Array} published - Liste des indicateurs publiés (triés du plus récent au plus ancien)
     * @param {number} weeksBack - Nombre de semaines à afficher
     */
    function renderTrendChart(published, weeksBack) {
      // Prendre les N dernières semaines et inverser pour avoir chronologique
      const slice = published.slice(0, weeksBack).reverse();
      if (slice.length === 0) return;  // Pas de données, ne rien afficher

      const downloadMode = isDownloadMode();

      // Préparer les données pour Chart.js
      const labels = slice.map(k => `S${String(k.week).padStart(2, '0')}/${k.year}`);
      const ratioData = slice.map(k => calculateRatio(k.hours, k.m3));

      // Récupérer le contexte du canvas
      const ctx = document.getElementById('kpiChart').getContext('2d');
      // Destroy le graphique précédent s'il existe
      if (chart) chart.destroy();

      // Récupérer les couleurs depuis le thème CSS (conservées même en impression)
      const lineColor = getCssVar('--accent-dark', '#6b8e6f');
      const fillColor = 'rgba(107, 142, 111, 0.12)';
      const threshold = getKpiRatioThreshold(); // Seuil de performance (par défaut 5)

      // Créer le graphique Chart.js
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'h/m³',
              data: ratioData,
              borderColor: lineColor,
              backgroundColor: fillColor,
              tension: 0,           // Segments droits (pas d'arrondi)
              spanGaps: false,     // Ne pas relier les points si données manquantes
              pointRadius: 3,
              pointHoverRadius: 5,
              fill: true           // Remplir sous la courbe
            },
            {
              label: `Seuil (${threshold} h/m³)`,
              data: new Array(labels.length).fill(threshold),
              borderColor: '#e74c3c',
              borderWidth: 2,
              borderDash: [5, 5],  // Ligne pointillée
              pointRadius: 0,      // Pas de points
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              display: true,
              position: 'top',
              labels: {
                color: downloadMode ? '#000000' : undefined
              }
            },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const v = ctx.parsed?.y;
                  return Number.isFinite(v) ? `h/m³ : ${v.toFixed(2)}` : 'h/m³ : —';
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,   // Commencer l'axe Y à 0
              title: { display: true, text: 'h/m³' },
              grid: {
                color: downloadMode ? '#9a9a9a' : undefined,
                lineWidth: downloadMode ? 1.1 : 1
              },
              ticks: {
                color: downloadMode ? '#000000' : undefined,
                callback: (value) => value
              }
            },
            x: {
              grid: {
                color: downloadMode ? '#b3b3b3' : undefined,
                lineWidth: downloadMode ? 1 : 1
              },
              ticks: {
                color: downloadMode ? '#000000' : undefined
              }
            }
          }
        }
      });
    }

    /**
     * Initialise la page Goudalle Maçonnerie
     * - Charge la sidebar
     * - Affiche le dernier indicateur
     * - Génère le graphique de tendance
     * - Affiche l'historique des 4 dernières semaines
     */
    async function initGM() {
      const downloadMode = isDownloadMode();

      // Injecter la navigation uniquement hors téléchargement
      if (!downloadMode) {
        document.getElementById('sidebar').innerHTML = getSidebar();
        injectProductionSecondaryBar();
      } else {
        document.body.classList.add('download-mode');
      }

      // Récupérer tous les indicateurs depuis le serveur (API Excel)
      let published = [];
      try {
        const res = await fetch(SERVER_URL + '/gm-kpis-by-period?');
        const data = await res.json();
        if (data.success && Array.isArray(data.kpis)) {
          published = data.kpis.sort(compareByYearWeekDesc);
        }
      } catch (e) {
        console.error('Erreur chargement KPIs:', e);
      }

      // ===== INITIALISATION DU SÉLECTEUR DE PÉRIODE =====
      const trendSelect = document.getElementById('trendRange');
      const initialWeeks = loadTrendWeeksPreference();
      if (trendSelect) {
        trendSelect.value = String(initialWeeks);
        // Écouter les changements de période
        trendSelect.addEventListener('change', () => {
          const weeks = getTrendWeeksFromUI();
          saveTrendWeeksPreference(weeks);  // Sauvegarder la préférence
          renderTrendChart(published, weeks);  // Redessiner le graphique
        });
      }

      // ===== AFFICHAGE DU DERNIER INDICATEUR - NOUVEAUX ÉLÉMENTS =====
      if (published.length > 0) {
        const last = published[0];  // Le plus récent
        const ratio = calculateRatio(last.hours, last.m3);
        const smiley = getSmiley(ratio);

        // Obtenir les dates de la semaine
        const dateRange = getWeekDateRange(last.week, last.year);

        // Mettre à jour les éléments principaux
        document.getElementById('weekNumber').textContent = `${String(last.week).padStart(2, '0')} (${last.year}) - du ${dateRange.monday} au ${dateRange.friday}`;
        document.getElementById('mainM3').textContent = last.m3.toFixed(2);
        document.getElementById('mainHours').textContent = Math.round(last.hours);
        document.getElementById('mainRatio').textContent = ratio !== null ? ratio.toFixed(2) : '—';
        document.getElementById('mainAcier').textContent = last.qtAcierFaconne != null ? last.qtAcierFaconne : '—';
        
        // Mettre à jour le smiley avec couleur (image + fond dégradé)
        const indicatorEl = document.getElementById('mainIndicator');
        const base = getBasePath();
        const imageSrc = smiley === 'vert' ? `${base}assets/smiley%20vert.png` : `${base}assets/smiley%20rouge.png`;
        indicatorEl.innerHTML = `<img src="${imageSrc}" alt="Smiley ${smiley}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
        indicatorEl.className = `gm-indicator-card ${smiley}`;

        // Charger le commentaire de la semaine (désactivé = readonly)
        const weekCommentArea = document.getElementById('weekComment');
        if (weekCommentArea) {
          weekCommentArea.value = last.comment || '';
        }
      } else {
        // Si pas d'indicateur, afficher des valeurs par défaut
        document.getElementById('weekNumber').textContent = '—';
        document.getElementById('mainM3').textContent = '0.00';
        document.getElementById('mainHours').textContent = '0';
        document.getElementById('mainRatio').textContent = '—';
        
        const indicatorEl = document.getElementById('mainIndicator');
        const base = getBasePath();
        indicatorEl.innerHTML = `<img src="${base}assets/smiley%20vert.png" alt="Smiley vert" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
        indicatorEl.className = 'gm-indicator-card vert';
      }

      // ===== GÉNÉRATION DU GRAPHIQUE DE TENDANCE =====
      renderTrendChart(published, initialWeeks);

      // ===== CAMEMBERT RÉPARTITION DU TEMPS =====
      if (published.length > 0) {
        const last = published[0];
        const beton = parseFloat(last.tempsBeton) || 0;
        const aciers = parseFloat(last.tempsAciers) || 0;
        const chargement = parseFloat(last.tempsChargement) || 0;
        const centrale = parseFloat(last.tempsCentrale) || 0;
        const total = beton + aciers + chargement + centrale;

        if (total > 0) {
          document.getElementById('timeDistributionSection').style.display = 'block';
          const legendEl = document.getElementById('timeDistributionLegend');
          const makeCard = (label, value, colorClass) => `
            <div class="gm-kpi-card" style="border-top:4px solid ${colorClass}; height:auto; padding:12px 16px;">
              <div class="gm-kpi-label">${label}</div>
              <div class="gm-kpi-value" style="font-size:28px;">${value} h</div>
            </div>`;
          legendEl.innerHTML =
            makeCard('Béton', beton, '#4472C4') +
            makeCard('Aciers', aciers, '#ED7D31') +
            makeCard('Chargement', chargement, '#A5A5A5') +
            makeCard('Centrale', centrale, '#FFC000');

          const pieCtx = document.getElementById('timeDistributionChart').getContext('2d');
          new Chart(pieCtx, {
            type: 'pie',
            data: {
              labels: ['Béton', 'Aciers', 'Chargement', 'Centrale'],
              datasets: [{
                data: [beton, aciers, chargement, centrale],
                backgroundColor: ['#4472C4', '#ED7D31', '#A5A5A5', '#FFC000'],
                borderWidth: 1,
                borderColor: '#fff'
              }]
            },
            options: {
              responsive: true,
              plugins: {
                legend: { display: true, position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
                tooltip: {
                  callbacks: {
                    label: (ctx) => {
                      const val = ctx.parsed;
                      const pct = total > 0 ? ((val / total) * 100).toFixed(0) : 0;
                      return `${ctx.label}: ${val} h (${pct}%)`;
                    }
                  }
                }
              }
            },
            plugins: [{
              id: 'pieLabels',
              afterDraw(chart) {
                const ctx2 = chart.ctx;
                const ds = chart.data.datasets[0].data;
                const labels = chart.data.labels;
                ds.forEach((val, i) => {
                  if (val <= 0) return;
                  const meta = chart.getDatasetMeta(0).data[i];
                  const pct = ((val / total) * 100).toFixed(0);
                  const { x, y } = meta.tooltipPosition();
                  ctx2.save();
                  ctx2.font = 'bold 13px sans-serif';
                  ctx2.fillStyle = '#fff';
                  ctx2.textAlign = 'center';
                  ctx2.textBaseline = 'middle';
                  ctx2.fillText(pct + '%', x, y);
                  ctx2.restore();
                });
              }
            }]
          });

          // Graphique d'évolution empilé
          const weeksForEvolution = published
            .filter(k => k.tempsBeton != null || k.tempsAciers != null || k.tempsChargement != null || k.tempsCentrale != null)
            .slice(0, 4)
            .reverse();

          if (weeksForEvolution.length > 0) {
            const evoLabels = weeksForEvolution.map(k => `S${String(k.week).padStart(2, '0')}/${k.year}`);
            const evoCtx = document.getElementById('timeEvolutionChart').getContext('2d');
            new Chart(evoCtx, {
              type: 'bar',
              data: {
                labels: evoLabels,
                datasets: [
                  {
                    label: 'Béton',
                    data: weeksForEvolution.map(k => parseFloat(k.tempsBeton) || 0),
                    backgroundColor: '#4472C4'
                  },
                  {
                    label: 'Aciers',
                    data: weeksForEvolution.map(k => parseFloat(k.tempsAciers) || 0),
                    backgroundColor: '#ED7D31'
                  },
                  {
                    label: 'Chargement',
                    data: weeksForEvolution.map(k => parseFloat(k.tempsChargement) || 0),
                    backgroundColor: '#A5A5A5'
                  },
                  {
                    label: 'Centrale',
                    data: weeksForEvolution.map(k => parseFloat(k.tempsCentrale) || 0),
                    backgroundColor: '#FFC000'
                  }
                ]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 11 } } },
                  tooltip: {
                    callbacks: {
                      label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y} h`
                    }
                  }
                },
                scales: {
                  x: { stacked: true },
                  y: { stacked: true, beginAtZero: true, title: { display: true, text: 'Heures' } }
                }
              }
            });
          }
        }
      }

      // ===== HISTORIQUE DU MOIS DERNIER (4 SEMAINES) =====
      const today = new Date();
      const previousMonthRef = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      const targetMonth = previousMonthRef.getMonth();
      const targetYear = previousMonthRef.getFullYear();

      const previousMonthKpis = published
        .filter(k => {
          const fridayDateString = getWeekDateRange(k.week, k.year).friday;
          const fridayDate = parseFrDate(fridayDateString);
          return fridayDate && fridayDate.getMonth() === targetMonth && fridayDate.getFullYear() === targetYear;
        })
        .sort(compareByYearWeekDesc);

      const last4 = previousMonthKpis.slice(0, 4).reverse(); // 4 semaines, ordre chronologique
      const tbody = document.querySelector('#historyTable tbody');

      // Résumé du mois dernier (moyenne h/m³ + gros smiley)
      const historyMonthLabel = document.getElementById('historyMonthLabel');
      const historyMonthAvg = document.getElementById('historyMonthAvg');
      const historyMonthIndicator = document.getElementById('historyMonthIndicator');
      const monthLabel = previousMonthRef.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
      historyMonthLabel.textContent = `Mois dernier : ${monthLabel}`;

      const ratios = previousMonthKpis
        .map(k => calculateRatio(k.hours, k.m3))
        .filter(v => Number.isFinite(v));

      if (ratios.length > 0) {
        const averageRatio = ratios.reduce((sum, value) => sum + value, 0) / ratios.length;
        const averageSmiley = getSmiley(averageRatio) === 'rouge' ? 'rouge' : 'vert';
        const base = getBasePath();
        const imageSrc = averageSmiley === 'vert' ? `${base}assets/smiley%20vert.png` : `${base}assets/smiley%20rouge.png`;

        historyMonthAvg.textContent = `${averageRatio.toFixed(2)} h/m³`;
        historyMonthIndicator.className = `gm-history-indicator ${averageSmiley}`;
        historyMonthIndicator.innerHTML = `<img src="${imageSrc}" alt="Smiley ${averageSmiley}">`;
      } else {
        historyMonthAvg.textContent = '— h/m³';
        historyMonthIndicator.className = 'gm-history-indicator vert';
        historyMonthIndicator.innerHTML = '';
      }

      tbody.innerHTML = last4.map(k => {
        const ratio = calculateRatio(k.hours, k.m3);
        const smiley = getSmiley(ratio) === 'rouge' ? 'rouge' : 'vert';
        return `
          <tr>
            <td><strong>S${String(k.week).padStart(2, '0')}/${k.year}</strong></td>
            <td>${k.m3.toFixed(2)}</td>
            <td>${k.hours.toFixed(2)}</td>
            <td>
              <span class="badge badge-${smiley}">
                ${ratio !== null ? ratio.toFixed(2) : '—'}
              </span>
            </td>
            <td><small style="white-space:pre-wrap;">${escapeHtml(k.comment)}</small></td>
          </tr>
        `;
      }).join('');

      if (last4.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 20px;">Aucune donnée sur le mois dernier</td></tr>`;
      }

      // Déclencher automatiquement le téléchargement de l'image JPEG
      if (downloadMode) {
        setTimeout(() => {
          downloadAsImage();
        }, 1000); // Attendre que tout soit chargé (graphique, etc.)
      }
    }

    /**
     * Capture la page et la télécharge en tant qu'image JPEG
     */
    function downloadAsImage() {
      const element = document.querySelector('.main-content');
      
      html2canvas(element, {
        scale: 2, // Qualité de l'image (2x pour meilleure résolution)
        backgroundColor: '#ffffff',
        logging: false,
        useCORS: true,
        onclone: (doc) => {
          // Désactiver toutes les animations dans le document cloné (évite opacity:0 du fadeIn)
          const style = doc.createElement('style');
          style.textContent = '*, *::before, *::after { animation: none !important; transition: none !important; opacity: 1 !important; }';
          doc.head.appendChild(style);

          doc.querySelectorAll('textarea.gm-comment-input').forEach((ta) => {
            const div = doc.createElement('div');
            div.textContent = ta.value || '';
            div.style.width = ta.offsetWidth + 'px';
            div.style.minHeight = ta.offsetHeight + 'px';
            div.style.padding = '12px';
            div.style.border = '2px solid #000';
            div.style.borderRadius = '6px';
            div.style.background = '#fff';
            div.style.whiteSpace = 'pre-wrap';
            div.style.wordBreak = 'break-word';
            div.style.fontFamily = 'inherit';
            div.style.fontSize = '13px';
            div.style.color = '#000';
            ta.parentNode.replaceChild(div, ta);
          });
        }
      }).then(canvas => {
        // Convertir le canvas en blob JPEG
        canvas.toBlob((blob) => {
          // Créer un lien de téléchargement
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          
          // Générer un nom de fichier avec la date
          const now = new Date();
          const year = now.getFullYear();
          const week = getWeekNumber(now);
          const filename = `Goudalle_GM_S${String(week).padStart(2, '0')}_${year}.jpg`;
          
          link.href = url;
          link.download = filename;
          link.click();
          
          // Nettoyer
          URL.revokeObjectURL(url);
          
          // Fermer la fenêtre après un court délai
          setTimeout(() => {
            window.close();
          }, 500);
        }, 'image/jpeg', 0.95); // Qualité JPEG à 95%
      }).catch(error => {
        console.error('Erreur lors de la capture de l\'image:', error);
        alert('❌ Erreur lors de la génération de l\'image');
      });
    }

    window.onServerReady(initGM);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
