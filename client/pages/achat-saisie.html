<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import achats - Intranet Goudalle</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .import-card {
      max-width: 640px;
      margin: 0 auto;
    }
    .dropzone {
      border: 2px dashed var(--accent-dark);
      border-radius: 10px;
      background: var(--lighter);
      padding: 36px 24px;
      text-align: center;
      transition: border-color .2s, background .2s;
      cursor: pointer;
      user-select: none;
    }
    .dropzone.dragover {
      border-color: var(--success);
      background: #eef7ee;
    }
    .dropzone.has-file {
      border-color: var(--primary);
      background: #f0f5f0;
    }
    .dropzone-icon { font-size: 36px; margin-bottom: 8px; }
    .dropzone-label { font-weight: 600; font-size: 15px; color: var(--text); }
    .dropzone-sub { font-size: 13px; color: var(--text-light); margin-top: 4px; }
    .file-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid var(--border-light);
      border-radius: 8px; padding: 8px 12px; margin-top: 12px;
      font-size: 13px; max-width: 100%; overflow: hidden;
    }
    .file-badge-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
    .file-badge-size { color: var(--text-light); white-space: nowrap; }
    .file-badge-remove {
      margin-left: 4px; background: none; border: none; cursor: pointer;
      color: var(--danger); font-size: 14px; padding: 0 2px; line-height: 1;
    }
    .progress-bar-wrap {
      height: 8px; border-radius: 999px; background: #e4ece4; overflow: hidden; margin-top: 12px;
    }
    .progress-bar-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, #3e6b46, #7cb682);
      border-radius: 999px; transition: width .2s ease;
    }
    .progress-label { font-size: 13px; color: var(--text-light); margin-top: 6px; }
    .result-box {
      border-radius: 10px; padding: 16px 18px; margin-top: 8px;
      border: 1px solid #c3e6cb; background: #d4edda;
    }
    .result-box.error { border-color: #f5c6cb; background: #f8d7da; }
    .result-title { font-weight: 700; font-size: 15px; margin-bottom: 8px; }
    .result-stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    .stat-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600;
      background: rgba(255,255,255,.6); border: 1px solid rgba(0,0,0,.08);
    }
    .warn-list { margin: 8px 0 0 0; padding-left: 18px; font-size: 12px; color: #664d00; }
    .warn-list li { margin-bottom: 3px; }
    .filename-preview {
      margin-top: 10px; padding: 8px 12px; border-radius: 8px;
      background: #fff; border: 1px solid var(--border-light);
      font-size: 13px; color: var(--text-light);
    }
    .filename-preview strong { color: var(--primary); }
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>Auth.requirePermission('achat_saisie');</script>

  <div class="app-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <h1 class="mb-3">Import achats</h1>

      <div id="pageMessage" class="alert" style="display:none;"></div>

      <div class="card import-card">
        <div class="card-title"><h2>Importer un fichier ONAYA</h2></div>
        <div class="card-body" style="display:flex; flex-direction:column; gap:16px;">

          <!-- Société + Période -->
          <div style="display:grid; grid-template-columns: 1fr 140px 140px; gap:12px; align-items:end;">
            <div>
              <label for="selectCompany" style="display:block; font-weight:600; margin-bottom:6px;">Société</label>
              <select id="selectCompany" style="width:100%;">
                <option value="">— Sélectionner —</option>
              </select>
            </div>
            <div>
              <label for="selectMonth" style="display:block; font-weight:600; margin-bottom:6px;">Mois</label>
              <select id="selectMonth" style="width:100%;">
                <option value="">— Mois —</option>
                <option value="01">Janvier</option>
                <option value="02">Février</option>
                <option value="03">Mars</option>
                <option value="04">Avril</option>
                <option value="05">Mai</option>
                <option value="06">Juin</option>
                <option value="07">Juillet</option>
                <option value="08">Août</option>
                <option value="09">Septembre</option>
                <option value="10">Octobre</option>
                <option value="11">Novembre</option>
                <option value="12">Décembre</option>
              </select>
            </div>
            <div>
              <label for="selectYear" style="display:block; font-weight:600; margin-bottom:6px;">Année</label>
              <select id="selectYear" style="width:100%;"></select>
            </div>
          </div>

          <!-- Dropzone -->
          <div>
            <label style="display:block; font-weight:600; margin-bottom:6px;">Fichier PDF</label>
            <input id="inputFile" type="file" accept=".pdf,application/pdf" style="display:none;">
            <div id="dropzone" class="dropzone">
              <div class="dropzone-icon">📄</div>
              <div class="dropzone-label">Déposez le fichier ONAYA ici</div>
              <div class="dropzone-sub">ou cliquez pour sélectionner un fichier PDF</div>
            </div>
            <div id="fileBadge" style="display:none;" class="file-badge">
              <span>📄</span>
              <span id="fileBadgeName" class="file-badge-name"></span>
              <span id="fileBadgeSize" class="file-badge-size"></span>
              <button class="file-badge-remove" id="btnRemoveFile" title="Retirer le fichier">✕</button>
            </div>
            <div id="filenamePreview" class="filename-preview" style="display:none;">
              Le fichier sera enregistré sous&nbsp;: <strong id="filenamePreviewText"></strong>
            </div>
          </div>

          <!-- Barre de progression -->
          <div id="progressWrap" style="display:none;">
            <div class="progress-bar-wrap"><div id="progressFill" class="progress-bar-fill"></div></div>
            <div id="progressLabel" class="progress-label">Envoi en cours...</div>
          </div>

          <!-- Résultat -->
          <div id="resultBox" style="display:none;"></div>

          <!-- Actions -->
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn btn-primary" id="btnImport" disabled>📤 Importer</button>
            <button class="btn btn-secondary" id="btnDiag" style="display:none;">🔍 Diagnostic parsing</button>
            <button class="btn btn-secondary" id="btnReset" style="display:none;">↩ Nouvel import</button>
          </div>

          <!-- Résultat diagnostic -->
          <div id="diagBox" style="display:none; background:#f4f4f0; border:1px solid #d0d0c0; border-radius:8px; padding:14px; font-size:12px; font-family:Consolas,monospace; white-space:pre-wrap; max-height:400px; overflow-y:auto;"></div>

        </div>
      </div>

    </main>
  </div>

  <script>
    const API = window.location.origin + '/api';
    let selectedFile = null;
    let companies = [];

    async function getToken() {
      const res = await fetch(API + '/health');
      const data = await res.json();
      return data?.token || null;
    }

    function fmtSize(bytes) {
      if (bytes < 1024) return `${bytes} o`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} Ko`;
      return `${(bytes / 1024 / 1024).toFixed(1)} Mo`;
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function setProgress(pct, label) {
      document.getElementById('progressFill').style.width = `${Math.max(0, Math.min(100, pct))}%`;
      if (label) document.getElementById('progressLabel').textContent = label;
    }

    function showResult(data) {
      const box = document.getElementById('resultBox');
      if (!data.success) {
        box.innerHTML = `<div class="result-box error"><div class="result-title">❌ Erreur</div><div>${esc(data.error || 'Erreur inconnue')}</div></div>`;
      } else {
        const warns = (data.warnings || []).length
          ? `<ul class="warn-list">${data.warnings.map((w) => `<li>${esc(w)}</li>`).join('')}</ul>` : '';
        box.innerHTML = `
          <div class="result-box">
            <div class="result-title">✅ Import réussi</div>
            <div style="font-size:14px;">Fichier enregistré : <strong>${esc(data.nom_fichier)}</strong></div>
            ${data.saved_local ? '<div style="font-size:12px; color:#856404; margin-top:4px;">⚠️ Dossier réseau inaccessible — fichier sauvegardé localement sur le serveur.</div>' : ''}
            <div class="result-stats">
              <span class="stat-chip">📄 ${data.total_factures} factures</span>
              <span class="stat-chip">📑 ${data.total_lignes} lignes</span>
              <span class="stat-chip">🚫 ${data.total_stock_exclu} stock exclu</span>
            </div>
            ${warns ? `<div style="margin-top:8px; font-size:12px; color:#664d00; font-weight:600;">Avertissements :</div>${warns}` : ''}
          </div>`;
      }
      box.style.display = 'block';
    }

    function lastDayOfMonth(year, month) {
      return new Date(Number(year), Number(month), 0).getDate();
    }

    function buildFilenamePreview() {
      const company = document.getElementById('selectCompany').value;
      const month = document.getElementById('selectMonth').value;
      const year = document.getElementById('selectYear').value;
      const preview = document.getElementById('filenamePreview');
      const previewText = document.getElementById('filenamePreviewText');
      if (!company || !month || !year || !selectedFile) { preview.style.display = 'none'; return; }
      const last = lastDayOfMonth(year, month);
      previewText.textContent = `Commandes ${company} du 01.${month}.${year} au ${last}.${month}.${year}.pdf`;
      preview.style.display = 'block';
    }

    async function doDiag() {
      if (!selectedFile) return;
      const diagBox = document.getElementById('diagBox');
      diagBox.style.display = 'block';
      diagBox.textContent = '⏳ Analyse en cours...';
      try {
        const token = await getToken();
        const fd = new FormData();
        fd.append('pdf', selectedFile, selectedFile.name);
        const res = await fetch(API + '/achats/debug-parse', {
          method: 'POST',
          headers: token ? { 'x-goudalle-token': token } : {},
          body: fd
        });
        const d = await res.json();
        if (!d.success) { diagBox.textContent = '❌ ' + (d.error || 'Erreur'); return; }

        let out = '';
        out += `📄 Fichier        : ${selectedFile.name}\n`;
        out += `📃 Pages          : ${d.pages ?? '?'}\n`;
        out += `🔤 Caractères     : ${d.total_chars}\n`;
        out += `📋 Lignes totales : ${d.total_lines}\n`;
        out += `──────────────────────────────────────\n`;
        out += `✅ Entêtes facture trouvées  : ${d.header_lines_found}\n`;
        out += `✅ Lignes articles trouvées  : ${d.article_lines_found}\n`;
        out += `✅ Lignes Total Bon trouvées : ${d.total_bon_lines_found}\n`;
        out += `🧾 FACTURES PARSÉES          : ${d.invoices_parsed}\n`;
        if (d.warnings?.length) {
          out += `\n⚠️ Avertissements :\n`;
          d.warnings.forEach((w) => { out += `   - ${w}\n`; });
        }
        out += `\n──── 30 premières lignes du PDF ────\n`;
        (d.sample_lines || []).forEach((l, i) => { out += `${String(i+1).padStart(2,'0')} │ ${l}\n`; });
        if (d.header_samples?.length) {
          out += `\n──── Exemples entêtes reconnues ────\n`;
          d.header_samples.forEach((l) => { out += `  → ${l}\n`; });
        }
        diagBox.textContent = out;
      } catch (e) {
        diagBox.textContent = '❌ ' + e.message;
      }
    }

    function setFile(file) {
      if (!file || file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
        showPageMessage('Seuls les fichiers PDF sont acceptés.', 'danger');
        return;
      }
      selectedFile = file;
      document.getElementById('dropzone').classList.add('has-file');
      document.getElementById('fileBadgeName').textContent = file.name;
      document.getElementById('fileBadgeSize').textContent = fmtSize(file.size);
      document.getElementById('fileBadge').style.display = 'flex';
      document.getElementById('resultBox').style.display = 'none';
      document.getElementById('diagBox').style.display = 'none';
      document.getElementById('btnDiag').style.display = '';
      updateImportBtn();
      buildFilenamePreview();
    }

    function clearFile() {
      selectedFile = null;
      document.getElementById('dropzone').classList.remove('has-file');
      document.getElementById('fileBadge').style.display = 'none';
      document.getElementById('filenamePreview').style.display = 'none';
      document.getElementById('btnDiag').style.display = 'none';
      document.getElementById('diagBox').style.display = 'none';
      document.getElementById('inputFile').value = '';
      updateImportBtn();
    }

    function updateImportBtn() {
      const btn = document.getElementById('btnImport');
      const company = document.getElementById('selectCompany').value;
      const month = document.getElementById('selectMonth').value;
      const year = document.getElementById('selectYear').value;
      btn.disabled = !(selectedFile && company && month && year);
    }

    function showPageMessage(msg, type = 'danger') {
      const el = document.getElementById('pageMessage');
      el.textContent = msg;
      el.className = `alert alert-${type}`;
      el.style.display = 'block';
    }

    function resetForm() {
      clearFile();
      document.getElementById('progressWrap').style.display = 'none';
      document.getElementById('resultBox').style.display = 'none';
      document.getElementById('btnReset').style.display = 'none';
      document.getElementById('btnImport').style.display = '';
      document.getElementById('pageMessage').style.display = 'none';
    }

    async function doImport() {
      const company = document.getElementById('selectCompany').value;
      const month = document.getElementById('selectMonth').value;
      const year = document.getElementById('selectYear').value;
      if (!selectedFile || !company || !month || !year) return;

      const btn = document.getElementById('btnImport');
      btn.disabled = true;
      document.getElementById('progressWrap').style.display = 'block';
      document.getElementById('resultBox').style.display = 'none';
      setProgress(10, 'Envoi du fichier...');

      try {
        const token = await getToken();
        const formData = new FormData();
        formData.append('pdf', selectedFile, selectedFile.name);
        formData.append('company', company);
        formData.append('month', month);
        formData.append('year', year);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', API + '/achats/upload', true);
        if (token) xhr.setRequestHeader('x-goudalle-token', token);

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) setProgress(10 + (e.loaded / e.total) * 60, 'Envoi du fichier...');
        };

        const result = await new Promise((resolve, reject) => {
          xhr.onload = () => {
            setProgress(85, 'Analyse en cours...');
            try { resolve(JSON.parse(xhr.responseText)); }
            catch { reject(new Error('Réponse serveur invalide.')); }
          };
          xhr.onerror = () => reject(new Error('Erreur réseau.'));
          xhr.send(formData);
        });

        setProgress(100, 'Terminé.');
        showResult(result);
        if (result.success) {
          document.getElementById('btnImport').style.display = 'none';
          document.getElementById('btnReset').style.display = '';
        } else {
          btn.disabled = false;
        }
      } catch (err) {
        setProgress(0, '');
        document.getElementById('progressWrap').style.display = 'none';
        showResult({ success: false, error: err.message });
        btn.disabled = false;
      }
    }

    async function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectAchatSecondaryBar();

      // Charger la liste des sociétés
      try {
        const res = await fetch(API + '/achats/companies');
        const data = await res.json();
        companies = data.companies || [];
      } catch { companies = ['Goudalle Charpente', 'Nouvelle Goudalle Maçonnerie', 'CBCO', 'Sylve Data']; }
      const sel = document.getElementById('selectCompany');
      sel.innerHTML = `<option value="">— Sélectionner une société —</option>` +
        companies.map((c) => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
      sel.onchange = () => { updateImportBtn(); buildFilenamePreview(); };

      // Populate year dropdown
      const currentYear = new Date().getFullYear();
      const selYear = document.getElementById('selectYear');
      selYear.innerHTML = `<option value="">— Année —</option>` +
        [currentYear + 1, currentYear, currentYear - 1, currentYear - 2]
          .map((y) => `<option value="${y}"${y === currentYear ? ' selected' : ''}>${y}</option>`)
          .join('');
      selYear.onchange = () => { updateImportBtn(); buildFilenamePreview(); };
      document.getElementById('selectMonth').onchange = () => { updateImportBtn(); buildFilenamePreview(); };

      // Dropzone
      const dz = document.getElementById('dropzone');
      const input = document.getElementById('inputFile');
      dz.addEventListener('click', () => input.click());
      dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('dragover'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
      dz.addEventListener('drop', (e) => {
        e.preventDefault(); dz.classList.remove('dragover');
        const f = e.dataTransfer.files[0];
        if (f) setFile(f);
      });
      input.addEventListener('change', () => { if (input.files[0]) setFile(input.files[0]); });

      document.getElementById('btnRemoveFile').addEventListener('click', (e) => { e.stopPropagation(); clearFile(); });
      document.getElementById('btnImport').addEventListener('click', doImport);
      document.getElementById('btnDiag').addEventListener('click', doDiag);
      document.getElementById('btnReset').addEventListener('click', resetForm);
    }

    window.onServerReady(init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
