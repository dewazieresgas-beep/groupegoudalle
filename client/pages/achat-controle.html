<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contrôle imports achats - Intranet Goudalle</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ── Bandeau import (re-parser / supprimer) ── */
    .imports-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .import-row {
      display: grid; grid-template-columns: 1fr auto;
      gap: 12px; align-items: center;
      border: 1px solid var(--border-light); border-radius: 10px;
      background: #fff; padding: 12px 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,.03);
    }
    .import-meta strong {
      display: block; font-size: 15px; color: #1f2a1f;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .import-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
      background: #f3f6f3; border: 1px solid #dde5dd; color: #3a4b3a;
    }
    .import-actions { display: flex; gap: 6px; justify-content: flex-end; }
    /* ── Filtres période ── */
    .period-filters { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 14px; }
    .period-filters label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .period-filters select { min-width: 160px; }
    /* ── Liste factures ── */
    .invoice-list-wrap { overflow-x: auto; }
    .invoice-list {
      border: 1px solid #d9d9d9; border-radius: 10px;
      overflow: hidden; background: #fff;
      box-shadow: 0 4px 12px rgba(0,0,0,.04);
      min-width: 820px;
    }
    .invoice-grid {
      display: grid;
      grid-template-columns: 34px 105px 220px 160px 1fr 140px;
      gap: 8px; padding: 10px 14px; align-items: center;
    }
    .invoice-grid.head {
      background: linear-gradient(180deg, #f6f6ef 0%, #efefe7 100%);
      font-weight: 700; font-size: 12px; color: #2a2a2a;
    }
    .invoice-item { border-top: 1px solid #ebebeb; }
    .invoice-row-btn {
      width: 100%; border: none; background: #fff; padding: 0;
      cursor: pointer; text-align: left; font: inherit;
      transition: background .1s;
    }
    .invoice-row-btn:hover { background: #f8fbf8; }
    .invoice-item.open .invoice-row-btn { background: #f2fbf2; }
    .invoice-toggle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%;
      border: 1px solid #d0d8d0; background: #fff;
      font-size: 11px; color: #3d5540;
      transition: transform .2s, background .2s;
    }
    .invoice-item.open .invoice-toggle { transform: rotate(90deg); background: #dff0df; }
    .invoice-summary { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .invoice-montant { font-weight: 700; white-space: nowrap; text-align: right; }
    .excluded-badge {
      display: inline-block; padding: 1px 6px; border-radius: 999px;
      background: #fff3cd; border: 1px solid #ffc107; color: #856404;
      font-size: 10px; font-weight: 600;
    }
    /* ── Détail lignes ── */
    .invoice-detail { max-height: 0; overflow: hidden; transition: max-height .25s ease; background: #fafafa; }
    .invoice-detail.open { border-top: 1px solid #e5e5e5; }
    .invoice-detail-inner { padding: 10px 14px 14px; overflow-x: auto; }
    .lines-table { width: 100%; min-width: 1050px; border-collapse: collapse; font-size: 12px; }
    .lines-table th {
      text-align: left; padding: 6px 10px; border-bottom: 1px solid #d9d9d9;
      background: #f2f4f2; color: #2a2a2a; white-space: nowrap;
    }
    .lines-table td { padding: 6px 10px; border-bottom: 1px solid #ededed; color: #222; white-space: nowrap; }
    .lines-table tr:last-child td { border-bottom: none; }
    .lines-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .lines-table .mono { font-family: Consolas, monospace; }
    .lines-table .excluded-line td { color: #aaa; background: #fafafa; }
    .lines-table .col-libelle { white-space: normal; min-width: 200px; word-break: break-word; }
    /* ── Scrollbars toujours visibles ── */
    .invoice-list-wrap::-webkit-scrollbar,
    .invoice-detail-inner::-webkit-scrollbar { height: 8px; }
    .invoice-list-wrap::-webkit-scrollbar-track,
    .invoice-detail-inner::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 4px; }
    .invoice-list-wrap::-webkit-scrollbar-thumb,
    .invoice-detail-inner::-webkit-scrollbar-thumb { background: #b0b8b0; border-radius: 4px; }
    .invoice-list-wrap::-webkit-scrollbar-thumb:hover,
    .invoice-detail-inner::-webkit-scrollbar-thumb:hover { background: #7a8f7a; }
    /* ── États vides ── */
    .empty-state { text-align: center; padding: 28px; color: var(--text-light); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    @media (max-width: 900px) {
      .invoice-grid { grid-template-columns: 34px 90px 1fr 110px; }
      .invoice-grid .col-chantier, .invoice-grid .col-fournisseur { display: none; }
    }
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>Auth.requirePermission('achat_controle');</script>

  <div class="app-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <h1 class="mb-3">Contrôle des imports</h1>
      <div id="pageMessage" class="alert" style="display:none;"></div>

      <!-- ── Factures ── -->
      <div class="card" id="invoicesCard">
        <div class="card-title">
          <h2>Factures</h2>
        </div>
        <div class="card-body">
          <div class="period-filters">
            <div>
              <label for="filterCompany">Entreprise</label>
              <select id="filterCompany"></select>
            </div>
            <div>
              <label for="filterYear">Année</label>
              <select id="filterYear"></select>
            </div>
            <div>
              <label for="filterMonth">Mois</label>
              <select id="filterMonth"></select>
            </div>
          </div>
          <div id="batchActions"></div>
          <div class="invoice-list-wrap"><div id="invoicesList"><p class="empty-state">Chargement...</p></div></div>
        </div>
      </div>

    </main>
  </div>

  <script>
    const API = window.location.origin + '/api';
    const COMPANY_ORDER = ['Goudalle Charpente', 'Nouvelle Goudalle Maçonnerie', 'CBCO', 'Sylve Data'];
    const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

    const state = {
      companies: [],
      selectedCompany: '',
      periods: [],
      selectedYear: '',
      selectedMonth: '',
      batches: [],
      loadedLinesByInvId: new Map()
    };

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function fmt(v, d = 2) {
      if (v == null || v === '') return '—';
      return Number(v).toLocaleString('fr-FR', { minimumFractionDigits: d, maximumFractionDigits: d });
    }

    function showMessage(msg, type = 'danger') {
      const el = document.getElementById('pageMessage');
      el.innerHTML = msg; el.className = `alert alert-${type}`; el.style.display = 'block';
    }

    function clearMessage() { document.getElementById('pageMessage').style.display = 'none'; }

    async function apiGet(path) {
      const res = await fetch(API + path);
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.error || `Erreur API ${path}`);
      return data;
    }

    async function apiDelete(path) {
      const token = await getToken();
      const res = await fetch(API + path, { method: 'DELETE', headers: token ? { 'x-goudalle-token': token } : {} });
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.error || `Erreur suppression`);
      return data;
    }

    async function apiPost(path, body) {
      const token = await getToken();
      const res = await fetch(API + path, { method: 'POST', headers: { 'Content-Type': 'application/json', ...(token ? { 'x-goudalle-token': token } : {}) }, body: JSON.stringify(body || {}) });
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.error || `Erreur`);
      return data;
    }

    async function getToken() {
      try { const d = await (await fetch(API + '/health')).json(); return d.token || null; }
      catch { return null; }
    }

    // ── Sélecteur entreprise ────────────────────────────────────────────────────
    function populateCompanySelect() {
      const sel = document.getElementById('filterCompany');
      if (!state.companies.length) {
        sel.innerHTML = '<option value="">Aucune donnée</option>';
        return;
      }
      if (!state.companies.includes(state.selectedCompany)) state.selectedCompany = state.companies[0];
      sel.innerHTML = state.companies.map((c) => `<option value="${esc(c)}"${c === state.selectedCompany ? ' selected' : ''}>${esc(c)}</option>`).join('');
    }

    async function refreshCompanies() {
      const data = await apiGet('/achats/imports');
      const present = new Set((data.imports || []).map((i) => i.company).filter(Boolean));
      state.companies = COMPANY_ORDER.filter((c) => present.has(c));
      populateCompanySelect();
    }

    // ── Filtres de période ─────────────────────────────────────────────────────
    function buildPeriodFilters() {
      const yearSel = document.getElementById('filterYear');
      const monthSel = document.getElementById('filterMonth');

      const byYear = new Map();
      for (const p of state.periods) {
        if (!byYear.has(p.year)) byYear.set(p.year, []);
        byYear.get(p.year).push(p);
      }
      const years = [...byYear.keys()].sort((a, b) => Number(b) - Number(a));

      if (!years.length) {
        yearSel.innerHTML = '<option value="">Aucune année</option>';
        monthSel.innerHTML = '<option value="">Aucun mois</option>';
        state.selectedYear = ''; state.selectedMonth = '';
        return;
      }

      if (!years.includes(state.selectedYear)) state.selectedYear = years[0];
      yearSel.innerHTML = years.map((y) => `<option value="${y}"${y === state.selectedYear ? ' selected' : ''}>${y}</option>`).join('');

      const months = (byYear.get(state.selectedYear) || []).sort((a, b) => Number(a.month) - Number(b.month));
      const monthVals = months.map((m) => m.month);
      if (!monthVals.includes(state.selectedMonth)) state.selectedMonth = monthVals[0] || '';
      monthSel.innerHTML = months.map((p) => {
        const label = MONTHS_FR[Number(p.month) - 1] || p.month;
        return `<option value="${p.month}"${p.month === state.selectedMonth ? ' selected' : ''}>${label} (${p.invoice_count ?? 0})</option>`;
      }).join('');
    }

    // ── Bandeau import (re-parser / supprimer) ─────────────────────────────────
    function renderBatchActions() {
      const root = document.getElementById('batchActions');
      if (!state.batches.length) { root.innerHTML = ''; return; }
      root.innerHTML = `<div class="imports-list">${state.batches.map((b) => `
        <div class="import-row">
          <div class="import-meta">
            <strong title="${esc(b.nom_fichier)}">${esc(b.nom_fichier)}</strong>
            <div class="import-chips">
              <span class="chip">📄 ${b.total_factures ?? 0} factures</span>
              <span class="chip">📑 ${b.total_lignes ?? 0} lignes</span>
              ${b.total_stock_exclu ? `<span class="chip">🚫 ${b.total_stock_exclu} stock exclu</span>` : ''}
            </div>
          </div>
          <div class="import-actions">
            <button class="btn btn-secondary btn-sm btn-reparse" data-id="${esc(b.id)}" title="Re-parser le PDF avec les règles actuelles">🔄 Re-parser</button>
            <button class="btn btn-danger btn-sm btn-delete" data-id="${esc(b.id)}">Supprimer</button>
          </div>
        </div>
      `).join('')}</div>`;
    }

    // ── Affichage de la liste des factures ─────────────────────────────────────
    function renderInvoices(invoices) {
      const root = document.getElementById('invoicesList');
      if (!invoices.length) {
        root.innerHTML = '<p class="empty-state">Aucune facture pour cette période.</p>';
        return;
      }
      root.innerHTML = `
        <div class="invoice-list">
          <div class="invoice-grid head">
            <div></div>
            <div>Date</div>
            <div>Fournisseur</div>
            <div class="col-chantier">Chantier</div>
            <div>Libellé</div>
            <div class="num">Montant H.T</div>
          </div>
          ${invoices.map((inv) => `
            <div class="invoice-item" data-inv-id="${esc(inv.id)}" data-batch-id="${esc(inv.batchId)}">
              <button class="invoice-row-btn" data-inv-id="${esc(inv.id)}">
                <div class="invoice-grid">
                  <div><span class="invoice-toggle">▶</span></div>
                  <div>${esc(inv.date || '—')}</div>
                  <div class="col-fournisseur invoice-summary">${esc(inv.fournisseur || '—')}</div>
                  <div class="col-chantier invoice-summary">${esc(inv.chantier || '—')}</div>
                  <div class="invoice-summary">
                    ${esc(inv.libelle_facture || '—')}
                    ${inv.excluded ? ' <span class="excluded-badge">stock exclu</span>' : ''}
                    <span style="font-size:11px; color:#999; margin-left:4px;">${inv.line_count ?? 0} ligne${(inv.line_count??0)>1?'s':''}</span>
                  </div>
                  <div class="invoice-montant">${fmt(inv.montant_ht)}</div>
                </div>
              </button>
              <div class="invoice-detail" data-inv-id="${esc(inv.id)}" data-loaded="0">
                <div class="invoice-detail-inner">
                  <p class="empty-state" style="padding:8px;">Cliquez pour charger le détail.</p>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      bindInvoiceAccordion(root);
    }

    // ── Accordéon factures + chargement lazy des lignes ────────────────────────
    function bindInvoiceAccordion(root) {
      root.querySelectorAll('.invoice-row-btn').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const invId = btn.getAttribute('data-inv-id');
          const item = root.querySelector(`.invoice-item[data-inv-id="${invId}"]`);
          const detail = root.querySelector(`.invoice-detail[data-inv-id="${invId}"]`);
          if (!item || !detail) return;

          const willOpen = !detail.classList.contains('open');

          // Fermer les autres
          root.querySelectorAll('.invoice-detail.open').forEach((d) => {
            if (d !== detail) { d.classList.remove('open'); d.style.maxHeight = '0px'; }
          });
          root.querySelectorAll('.invoice-item.open').forEach((i) => {
            if (i !== item) i.classList.remove('open');
          });

          if (willOpen && detail.dataset.loaded !== '1') {
            detail.querySelector('.invoice-detail-inner').innerHTML = '<p class="empty-state" style="padding:8px;">Chargement...</p>';
            try {
              const batchId = item.getAttribute('data-batch-id');
              const data = await apiGet(`/achats/imports/${encodeURIComponent(batchId)}/invoices/${encodeURIComponent(invId)}/lines`);
              state.loadedLinesByInvId.set(invId, data.lines || []);
              detail.querySelector('.invoice-detail-inner').innerHTML = renderLinesTable(data.lines || [], data.invoice);
              detail.dataset.loaded = '1';
            } catch (err) {
              detail.querySelector('.invoice-detail-inner').innerHTML = `<p class="empty-state" style="padding:8px; color:var(--danger);">Erreur : ${esc(err.message)}</p>`;
            }
          }

          detail.classList.toggle('open', willOpen);
          item.classList.toggle('open', willOpen);
          detail.style.maxHeight = willOpen ? `${detail.scrollHeight + 200}px` : '0px';
        });
      });
    }

    // ── Tableau des lignes d'une facture ────────────────────────────────────────
    function renderLinesTable(lines, invoice) {
      if (!lines.length) return '<p class="empty-state" style="padding:8px;">Aucune ligne.</p>';
      return `
        <table class="lines-table">
          <thead>
            <tr>
              <th>Ressource</th>
              <th>BON N°</th>
              <th>A.R.C</th>
              <th>Chantier</th>
              <th class="col-libelle">Libellé</th>
              <th>Unité</th>
              <th class="num">Qté Fact.</th>
              <th class="num">P.U</th>
              <th class="num">Montant</th>
            </tr>
          </thead>
          <tbody>
            ${lines.map((l) => `
              <tr${l.excluded ? ' class="excluded-line"' : ''}>
                <td class="mono">${esc(l.ressource)}</td>
                <td class="mono">${esc(l.bl_numero || invoice?.numero_facture || '')}</td>
                <td class="mono">${esc(l.arc)}</td>
                <td class="mono">${esc(l.chantier_ligne || invoice?.chantier || '')}</td>
                <td class="col-libelle">${esc(l.libelle_ligne)}${l.excluded ? ' <span class="excluded-badge">stock</span>' : ''}</td>
                <td>${esc(l.unite)}</td>
                <td class="num">${l.qte_fact != null ? fmt(l.qte_fact, 3) : '—'}</td>
                <td class="num">${l.pu != null ? fmt(l.pu) : '—'}</td>
                <td class="num">${l.montant != null ? fmt(l.montant) : '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    // ── Charger les périodes (années/mois) d'une entreprise ────────────────────
    async function loadPeriods() {
      populateCompanySelect();
      const yearSel = document.getElementById('filterYear');
      const monthSel = document.getElementById('filterMonth');

      if (!state.selectedCompany) {
        state.periods = [];
        yearSel.innerHTML = '<option value="">—</option>';
        monthSel.innerHTML = '<option value="">—</option>';
        document.getElementById('batchActions').innerHTML = '';
        document.getElementById('invoicesList').innerHTML = `<p class="empty-state">Aucun import. <a href="./achat-saisie.html">Importer un fichier ONAYA →</a></p>`;
        return;
      }

      try {
        const data = await apiGet(`/achats/periods?company=${encodeURIComponent(state.selectedCompany)}`);
        state.periods = data.periods || [];
      } catch (e) {
        state.periods = [];
        showMessage(`❌ ${e.message}`, 'danger');
      }
      buildPeriodFilters();
      await loadInvoices();
    }

    // ── Charger les factures d'une période ─────────────────────────────────────
    async function loadInvoices() {
      const invRoot = document.getElementById('invoicesList');
      document.getElementById('batchActions').innerHTML = '';
      if (!state.selectedCompany || !state.selectedYear || !state.selectedMonth) {
        invRoot.innerHTML = '<p class="empty-state">Sélectionnez une période.</p>';
        return;
      }
      invRoot.innerHTML = '<p class="empty-state">Chargement...</p>';
      try {
        const data = await apiGet(`/achats/invoices?company=${encodeURIComponent(state.selectedCompany)}&year=${encodeURIComponent(state.selectedYear)}&month=${encodeURIComponent(state.selectedMonth)}`);
        state.batches = data.batches || [];
        state.loadedLinesByInvId = new Map();
        renderBatchActions();
        renderInvoices(data.invoices || []);
      } catch (e) {
        invRoot.innerHTML = `<p class="empty-state" style="color:var(--danger);">Erreur : ${esc(e.message)}</p>`;
      }
    }

    // ── Re-parser un import ────────────────────────────────────────────────────
    async function reparseBatch(batchId) {
      const btn = document.querySelector(`#batchActions .btn-reparse[data-id="${batchId}"]`);
      if (btn) { btn.disabled = true; btn.textContent = '⏳ En cours…'; }
      try {
        const result = await apiPost(`/achats/imports/${encodeURIComponent(batchId)}/reparse`);
        showMessage(`✅ Re-parsé : ${result.total_factures} factures, ${result.total_lignes} lignes.`, 'success');
        await loadPeriods();
      } catch (e) {
        showMessage(`❌ Re-parse échoué : ${e.message}`, 'danger');
        if (btn) { btn.disabled = false; btn.innerHTML = '🔄 Re-parser'; }
      }
    }

    // ── Supprimer un import ────────────────────────────────────────────────────
    async function deleteBatch(batchId) {
      const b = state.batches.find((x) => x.id === batchId);
      const name = b?.nom_fichier || batchId;
      if (!confirm(`Supprimer définitivement cet import ?\n\n${name}\n\nLe fichier PDF sera également supprimé.`)) return;
      try {
        await apiDelete(`/achats/imports/${encodeURIComponent(batchId)}`);
        showMessage('Import supprimé.', 'success');
        await refreshCompanies();
        await loadPeriods();
      } catch (e) {
        showMessage(`❌ ${e.message}`, 'danger');
      }
    }

    // ── Init ────────────────────────────────────────────────────────────────────
    async function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectAchatSecondaryBar();

      document.getElementById('filterCompany').onchange = async (e) => {
        state.selectedCompany = e.target.value;
        state.selectedYear = ''; state.selectedMonth = '';
        await loadPeriods();
      };
      document.getElementById('filterYear').onchange = async (e) => {
        state.selectedYear = e.target.value;
        state.selectedMonth = '';
        buildPeriodFilters();
        await loadInvoices();
      };
      document.getElementById('filterMonth').onchange = async (e) => {
        state.selectedMonth = e.target.value;
        await loadInvoices();
      };

      document.getElementById('batchActions').addEventListener('click', async (e) => {
        const reparseBtn = e.target.closest('.btn-reparse');
        const delBtn = e.target.closest('.btn-delete');
        if (reparseBtn) await reparseBatch(reparseBtn.getAttribute('data-id'));
        if (delBtn) await deleteBatch(delBtn.getAttribute('data-id'));
      });

      try {
        await refreshCompanies();
        await loadPeriods();
      } catch (e) {
        document.getElementById('invoicesList').innerHTML = `<p class="empty-state" style="color:var(--danger);">Erreur : ${esc(e.message)}</p>`;
      }
    }

    window.onServerReady(init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
