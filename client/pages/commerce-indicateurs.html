<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commerce - Intranet Goudalle</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .ig-page-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 20px;
    }

    .ig-page-title {
      min-width: 0;
    }

    .ig-page-title p {
      margin: 8px 0 0;
      color: var(--text-light);
      max-width: 780px;
    }

    .ig-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .commerce-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .ig-year-select {
      min-width: 150px;
      max-width: 190px;
    }

    .ig-machine-section {
      margin-bottom: 32px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid #e7ebf0;
      background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, #ffffff 100%);
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
    }

    .ig-machine-container {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .ig-kpi-col {
      display: flex;
      flex-direction: row;
      gap: 10px;
    }

    .ig-kpi-col .ig-kpi-card {
      flex: 1;
      min-width: 0;
    }

    .ig-kpi-card {
      border-radius: 12px;
      padding: 13px 15px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.07);
      border-top: 4px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .ig-kpi-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 22px rgba(0,0,0,0.12);
    }

    .ig-kpi-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--secondary);
      margin-bottom: 5px;
    }

    .ig-kpi-value {
      font-size: 20px;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      line-height: 1;
    }

    .ig-kpi-unit {
      font-size: 11px;
      color: #999;
      font-weight: 600;
      margin-top: 6px;
    }

    .ig-kpi-sub {
      font-size: 11px;
      color: #6b86a8;
      font-weight: 600;
      margin-top: 4px;
    }

    .ig-kpi-equiv {
      font-size: 10px;
      font-style: italic;
      margin-top: 8px;
      border-radius: 6px;
      padding: 3px 8px;
      display: inline-block;
      font-weight: 500;
      line-height: 1.35;
    }

    .ig-chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .ig-chart-panel .gm-chart-header h2 {
      font-size: 17px;
    }

    .ig-section-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .ig-section-header h2 {
      margin: 0;
      font-size: 19px;
      font-weight: 700;
    }

    .ig-blue {
      border-color: #c9d9ee;
      background: linear-gradient(180deg, #f5f9ff 0%, #ffffff 24%);
      box-shadow: 0 12px 30px rgba(90,126,179,0.10);
    }

    .ig-blue .ig-section-header {
      background: linear-gradient(135deg, #eef3fb 0%, #dce8f6 100%);
      border-left: 4px solid #5a7eb3;
    }

    .ig-blue .ig-section-header h2 {
      color: #2d4d78;
    }

    .ig-blue .ig-kpi-card {
      background: linear-gradient(180deg, #eef3fb 0%, #f8faff 100%);
    }

    .ig-blue .ig-kpi-value {
      color: #2d4d78;
    }

    .ig-blue .ig-kpi-equiv {
      background: #d4e6f6;
      color: #2d4d78;
    }

    .commerce-chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .commerce-empty {
      text-align: center;
      color: var(--text-light);
      padding: 28px 16px;
    }

    @media (max-width: 1100px) {
      .ig-page-header {
        grid-template-columns: 1fr;
      }

      .ig-toolbar {
        justify-content: flex-start;
      }

      .ig-chart-grid,
      .commerce-chart-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .ig-kpi-col {
        flex-wrap: wrap;
      }

      .ig-kpi-col .ig-kpi-card {
        flex: 1 1 calc(50% - 5px);
      }

    }
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>

  <script>
    Auth.requirePermission('commerce_indicateurs');
  </script>

  <div class="app-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <div class="gm-header" style="margin-bottom:20px;">
        <div class="ig-page-header">
          <div class="ig-page-title">
            <h1>Commerce</h1>
            <p>Lecture directe du dernier fichier Excel commercial pour suivre le carnet en cours, le terminé et l'évolution par exercice.</p>
            <div class="commerce-meta" id="commerceMeta"></div>
          </div>
          <div class="ig-toolbar">
            <label for="fiscalYearSelect" style="font-size:0.9em; font-weight:600; color:var(--secondary); margin:0;">Exercice :</label>
            <select id="fiscalYearSelect" class="ig-year-select gm-range-select"></select>
            <a class="btn btn-secondary" href="./commerce-liaison.html">🔗 Vérifier la liaison Excel</a>
            <button class="btn btn-primary" id="refreshButton" type="button">⟳ Actualiser</button>
          </div>
        </div>
      </div>

      <div id="commerceAlerts"></div>

      <div class="ig-machine-section ig-blue">
        <div class="ig-section-header">
          <h2>Carnet commercial (k€) — En cours + terminé</h2>
        </div>
        <div class="ig-machine-container">
          <div class="ig-kpi-col" id="commerceKpis"></div>

          <div class="ig-chart-grid commerce-chart-grid">
            <div class="gm-chart-section ig-chart-panel" style="min-height:300px;">
              <div class="gm-chart-header" style="margin-bottom:12px; padding-bottom:10px;">
                <h2>Evolution mensuelle de l'exercice (k€)</h2>
              </div>
              <div class="gm-chart-container" style="min-height:240px;">
                <canvas id="commerceMonthlyChart"></canvas>
              </div>
            </div>

            <div class="gm-chart-section ig-chart-panel" style="min-height:300px;">
              <div class="gm-chart-header" style="margin-bottom:12px; padding-bottom:10px;">
                <h2>Cumul mensuel par exercice (k€)</h2>
              </div>
              <div class="gm-chart-container" style="min-height:240px;">
                <canvas id="commerceCumulativeChart"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script>
    const COMMERCE_API_URL = window.location.origin + '/api/commerce-indicators';
    const FISCAL_MONTHS = ['Oct', 'Nov', 'Dec', 'Janv', 'Fevr', 'Mars', 'Avr', 'Mai', 'Juin', 'Juil', 'Aout', 'Sept'];
    const EXERCISE_COMPARISON_COLORS = ['#1D4E89', '#D97706', '#0F766E', '#B91C1C'];

    let commerceSnapshot = null;
    let selectedFiscalYear = null;
    const commerceCharts = {};

    function fiscalLabel(year) {
      if (typeof getFiscalYearLabel === 'function') return getFiscalYearLabel(year);
      return `${year}/${year + 1}`;
    }

    function formatKeur(value, digits = 0) {
      const num = Number(value) || 0;
      return `${num.toLocaleString('fr-FR', {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      })} k€`;
    }

    function formatPercent(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return '—';
      return `${num.toLocaleString('fr-FR', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 1
      })} %`;
    }

    function formatDateTime(value) {
      if (!value) return '—';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString('fr-FR');
    }

    function formatMonthLabel(row) {
      if (!row) return '—';
      try {
        const date = new Date(`${row.isoMonth}-01T00:00:00`);
        if (!Number.isNaN(date.getTime())) {
          return date.toLocaleDateString('fr-FR', { month: 'short', year: '2-digit' }).replace('.', '');
        }
      } catch {}
      return row.monthLabel || row.isoMonth || '—';
    }

    function chartNumber(value, digits = 0) {
      const num = Number(value) || 0;
      return num.toLocaleString('fr-FR', {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      });
    }

    function getRowsForFiscalYear(fiscalYear) {
      const rows = commerceSnapshot?.rows || [];
      return rows
        .filter((row) => row.fiscalYear === fiscalYear)
        .sort((a, b) => a.fiscalMonthIndex - b.fiscalMonthIndex);
    }

    function getComparisonFiscalYears() {
      const years = commerceSnapshot?.summary?.availableFiscalYears || [];
      const startIndex = Math.max(0, years.indexOf(selectedFiscalYear));
      return years.slice(startIndex, startIndex + 4);
    }

    function computeYearMetrics(rows) {
      const totals = rows.reduce((acc, row) => {
        acc.enCours += Number(row.enCoursKeur) || 0;
        acc.termines += Number(row.terminesKeur) || 0;
        acc.total += Number(row.totalKeur) || 0;
        return acc;
      }, { enCours: 0, termines: 0, total: 0 });

      return {
        ...totals,
        avgMonthly: rows.length ? (totals.total / rows.length) : 0,
        completedShare: totals.total > 0 ? (totals.termines / totals.total) * 100 : null,
        activeMonths: rows.filter((row) => row.hasActivity).length
      };
    }

    function getActiveRows(rows) {
      return (rows || []).filter((row) => Number(row.totalKeur) > 0 || Number(row.enCoursKeur) > 0 || Number(row.terminesKeur) > 0);
    }

    function renderAlert(type, message) {
      document.getElementById('commerceAlerts').innerHTML = `<div class="alert alert-${type}">${escapeHtml(message)}</div>`;
    }

    function renderMeta(snapshot) {
      const meta = document.getElementById('commerceMeta');
      if (!snapshot?.source || !snapshot?.summary) {
        meta.innerHTML = '';
        return;
      }

      meta.innerHTML = `
        <span class="badge badge-primary">Fichier ${escapeHtml(snapshot.source.weekLabel || snapshot.source.fileName || '—')}</span>
        <span class="badge badge-success">Dernier mois ${escapeHtml(snapshot.summary.latestMonthLabel || snapshot.summary.latestMonth || '—')}</span>
        <span class="badge badge-warning">Maj ${escapeHtml(formatDateTime(snapshot.source.lastModified))}</span>
      `;
    }

    function renderYearSelect(snapshot) {
      const select = document.getElementById('fiscalYearSelect');
      const years = snapshot?.summary?.availableFiscalYears || [];

      if (!years.length) {
        select.innerHTML = '<option value="">Aucun exercice</option>';
        select.disabled = true;
        return;
      }

      if (!selectedFiscalYear || !years.includes(selectedFiscalYear)) {
        selectedFiscalYear = snapshot.summary.defaultFiscalYears?.[0]
          || snapshot.summary.currentFiscalYear
          || years[0];
      }

      select.disabled = false;
      select.innerHTML = years.map((year) => `
        <option value="${year}" ${year === selectedFiscalYear ? 'selected' : ''}>${escapeHtml(fiscalLabel(year))}</option>
      `).join('');
    }

    function renderKpis() {
      const container = document.getElementById('commerceKpis');
      const rows = getRowsForFiscalYear(selectedFiscalYear);
      const metrics = computeYearMetrics(rows);
      const activeRows = getActiveRows(rows);
      const recordRow = activeRows.reduce((best, row) => (
        !best || Number(row.totalKeur) > Number(best.totalKeur) ? row : best
      ), null);
      const lastActiveRow = activeRows.length ? activeRows[activeRows.length - 1] : null;
      const previousRows = getRowsForFiscalYear(selectedFiscalYear - 1);
      const previousMetrics = computeYearMetrics(previousRows);
      const delta = previousMetrics.total > 0
        ? ((metrics.total - previousMetrics.total) / previousMetrics.total) * 100
        : null;
      const totalShareEnCours = metrics.total > 0 ? (metrics.enCours / metrics.total) * 100 : null;
      const sourceLabel = commerceSnapshot?.source?.weekLabel || commerceSnapshot?.source?.fileName || '—';

      container.innerHTML = `
        <div class="ig-kpi-card" style="border-top-color:#5a7eb3;">
          <div class="ig-kpi-label">Total exercice</div>
          <div class="ig-kpi-value">${escapeHtml(formatKeur(metrics.total, 0))}</div>
          <div class="ig-kpi-unit">sur l'exercice</div>
          <div class="ig-kpi-equiv">Source: ${escapeHtml(sourceLabel)}${delta == null ? '' : ` — ${escapeHtml(formatPercent(delta))} vs ${escapeHtml(fiscalLabel(selectedFiscalYear - 1))}`}</div>
        </div>
        <div class="ig-kpi-card" style="border-top-color:#d97706;">
          <div class="ig-kpi-label">Dont en cours</div>
          <div class="ig-kpi-value">${escapeHtml(formatKeur(metrics.enCours, 0))}</div>
          <div class="ig-kpi-sub">${escapeHtml(formatPercent(totalShareEnCours))} du total exercice</div>
        </div>
        <div class="ig-kpi-card" style="border-top-color:#0f766e;">
          <div class="ig-kpi-label">Dont terminé</div>
          <div class="ig-kpi-value">${escapeHtml(formatKeur(metrics.termines, 0))}</div>
          <div class="ig-kpi-sub">${escapeHtml(formatPercent(metrics.completedShare))} du total exercice</div>
        </div>
        <div class="ig-kpi-card" style="border-top-color:#3a6a9a;">
          <div class="ig-kpi-label">Record mois</div>
          <div class="ig-kpi-value">${escapeHtml(recordRow ? formatKeur(recordRow.totalKeur, 0) : '—')}</div>
          <div class="ig-kpi-unit">${escapeHtml(recordRow ? formatMonthLabel(recordRow) : '—')}</div>
          <div class="ig-kpi-equiv">${escapeHtml(recordRow ? `En cours ${formatKeur(recordRow.enCoursKeur, 0)} · Termine ${formatKeur(recordRow.terminesKeur, 0)}` : 'Aucun mois actif')}</div>
        </div>
        <div class="ig-kpi-card" style="border-top-color:#2d5080;">
          <div class="ig-kpi-label">Dernier mois actif</div>
          <div class="ig-kpi-value">${escapeHtml(lastActiveRow ? formatKeur(lastActiveRow.totalKeur, 0) : '—')}</div>
          <div class="ig-kpi-unit">${escapeHtml(lastActiveRow ? formatMonthLabel(lastActiveRow) : '—')}</div>
          <div class="ig-kpi-sub">${escapeHtml(`${metrics.activeMonths} mois avec activite`)}</div>
        </div>
      `;
    }

    function destroyCommerceChart(id) {
      if (commerceCharts[id]) {
        commerceCharts[id].destroy();
        delete commerceCharts[id];
      }
    }

    function lineDataset(label, data, color, fillAlpha = 0.1, width = 2.5) {
      const r = parseInt(color.slice(1, 3), 16);
      const g = parseInt(color.slice(3, 5), 16);
      const b = parseInt(color.slice(5, 7), 16);
      return {
        label,
        data,
        borderColor: color,
        backgroundColor: `rgba(${r},${g},${b},${fillAlpha})`,
        borderWidth: width,
        pointRadius: 3,
        pointHoverRadius: 5,
        tension: 0,
        fill: true,
        spanGaps: true
      };
    }

    function comparisonDataset(label, data, color, highlighted = false) {
      return {
        label,
        data,
        borderColor: color,
        backgroundColor: 'transparent',
        borderWidth: highlighted ? 3 : 2,
        borderDash: highlighted ? [] : [7, 5],
        pointRadius: highlighted ? 3 : 2,
        pointHoverRadius: highlighted ? 5 : 4,
        pointBackgroundColor: color,
        pointBorderColor: color,
        tension: 0.2,
        fill: false,
        spanGaps: true
      };
    }

    function buildFiscalSeries(rows, key) {
      const values = Array(12).fill(null);
      const lastMonthIndex = rows.reduce((max, row) => Math.max(max, Number(row.fiscalMonthIndex)), -1);
      for (let i = 0; i <= lastMonthIndex; i++) values[i] = 0;
      rows.forEach((row) => {
        const index = Number(row.fiscalMonthIndex);
        if (index >= 0 && index < 12) values[index] = Number(row[key]) || 0;
      });
      return values;
    }

    function buildFiscalCumulativeSeries(fiscalYear) {
      const rows = getRowsForFiscalYear(fiscalYear);
      const monthly = buildFiscalSeries(rows, 'totalKeur');
      const lastMonthIndex = rows.reduce((max, row) => Math.max(max, Number(row.fiscalMonthIndex)), -1);
      let running = 0;
      return monthly.map((value, index) => {
        if (index > lastMonthIndex) return null;
        running += value;
        return running;
      });
    }

    function makeCommerceChart(id, datasets, labels, unit) {
      destroyCommerceChart(id);
      const ctx = document.getElementById(id)?.getContext('2d');
      if (!ctx) return;
      commerceCharts[id] = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 12 } } },
            tooltip: {
              callbacks: {
                label: (ctx2) => `${ctx2.dataset.label}: ${chartNumber(ctx2.parsed.y)} ${unit}`
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: '#7a7a7a', font: { size: 10 } }
            },
            y: {
              beginAtZero: true,
              grid: { color: '#ece7e1' },
              title: { display: true, text: unit },
              ticks: {
                color: '#6b6b6b',
                callback: (value) => chartNumber(value)
              }
            }
          }
        }
      });
    }

    function makeCommerceComparisonChart(id, datasets, labels, unit) {
      destroyCommerceChart(id);
      const ctx = document.getElementById(id)?.getContext('2d');
      if (!ctx) return;
      commerceCharts[id] = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 11 } } },
            tooltip: {
              callbacks: {
                label: (ctx2) => `${ctx2.dataset.label}: ${chartNumber(ctx2.parsed.y)} ${unit}`
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: '#7a7a7a', font: { size: 10 } }
            },
            y: {
              beginAtZero: true,
              grid: { color: '#ece7e1' },
              title: { display: true, text: `Cumul ${unit}` },
              ticks: {
                color: '#6b6b6b',
                callback: (value) => chartNumber(value)
              }
            }
          }
        }
      });
    }

    function renderCharts() {
      renderMonthlyChart();
      renderCumulativeChart();
    }

    function renderMonthlyChart() {
      const rows = getRowsForFiscalYear(selectedFiscalYear);
      if (!rows.length) return;

      const enCours = buildFiscalSeries(rows, 'enCoursKeur');
      const termines = buildFiscalSeries(rows, 'terminesKeur');
      const total = buildFiscalSeries(rows, 'totalKeur');

      makeCommerceChart('commerceMonthlyChart', [
        lineDataset('Chantiers en cours', enCours, '#D97706', 0.06, 2),
        lineDataset('Chantiers terminés', termines, '#0F766E', 0.06, 2),
        lineDataset('Total mensuel', total, '#2a4a72', 0.08, 2.5)
      ], FISCAL_MONTHS, 'k€');
    }

    function renderCumulativeChart() {
      const years = getComparisonFiscalYears();
      if (!years.length) return;

      makeCommerceComparisonChart('commerceCumulativeChart',
        years.map((year, index) => comparisonDataset(
          fiscalLabel(year),
          buildFiscalCumulativeSeries(year),
          EXERCISE_COMPARISON_COLORS[Math.min(index, EXERCISE_COMPARISON_COLORS.length - 1)],
          year === selectedFiscalYear
        )),
        FISCAL_MONTHS,
        'k€'
      );
    }

    function renderSnapshot(snapshot) {
      commerceSnapshot = snapshot;
      document.getElementById('commerceAlerts').innerHTML = '';
      renderMeta(snapshot);
      renderYearSelect(snapshot);
      renderKpis();
      renderCharts();
    }

    async function loadCommerceIndicators() {
      const refreshButton = document.getElementById('refreshButton');
      refreshButton.disabled = true;
      try {
        const res = await fetch(COMMERCE_API_URL, { method: 'GET', cache: 'no-store' });
        const payload = await res.json();
        if (!res.ok || !payload.success) {
          throw new Error(payload.error || 'Lecture des indicateurs impossible');
        }
        renderSnapshot(payload);
      } catch (error) {
        renderAlert('danger', error.message || 'Lecture des indicateurs commerce impossible.');
      } finally {
        refreshButton.disabled = false;
      }
    }

    function bindEvents() {
      document.getElementById('fiscalYearSelect').addEventListener('change', (event) => {
        selectedFiscalYear = Number(event.target.value);
        renderKpis();
        renderCharts();
      });

      document.getElementById('refreshButton').addEventListener('click', loadCommerceIndicators);
    }

    let _commerceIndicatorsInitDone = false;
    async function init() {
      if (_commerceIndicatorsInitDone) return;
      _commerceIndicatorsInitDone = true;

      document.getElementById('sidebar').innerHTML = getSidebar();
      injectCommerceSecondaryBar();
      bindEvents();
      await loadCommerceIndicators();
    }

    window.onServerReady(init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
