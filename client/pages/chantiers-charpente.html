<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte des chantiers - Intranet Goudalle</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    #map { height: 560px; width: 100%; z-index: 1; }
    .kpi-stat { background:white; border-radius:8px; padding:14px 16px; border:1px solid var(--border); text-align:center; flex:1; min-width:110px; }
    .kpi-stat-value { font-size:24px; font-weight:700; line-height:1; margin-bottom:4px; color:var(--primary); }
    .kpi-stat-label { font-size:11px; color:var(--text-muted-dark); font-weight:600; text-transform:uppercase; letter-spacing:.4px; }
    .btn-sm { padding:5px 10px; border:1px solid var(--border); border-radius:6px; background:var(--lighter); cursor:pointer; font-size:12px; transition:all .2s; white-space:nowrap; }
    .btn-sm:hover { background:var(--light); border-color:var(--accent); }
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>Auth.requirePermission('chantiers');</script>

  <div class="app-container">
    <div id="sidebar"></div>
    <main class="main-content">
      <div class="d-flex justify-between items-center mb-3" style="gap:12px;flex-wrap:wrap;">
        <div>
          <h1 class="mb-0">🗺️ Carte des chantiers</h1>
          <p style="color:var(--text-muted-dark);margin:4px 0 0;font-size:14px;">
            Tous les dossiers chantier avec une adresse renseignée dans 00_ Infos général chantier.xlsx.
          </p>
        </div>
        <button onclick="loadData(true)" title="Forcer le rechargement depuis le réseau" style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--lighter);cursor:pointer;font-size:12px;color:var(--text-muted-dark);">🔄 Actualiser</button>
      </div>

      <div id="stats-row" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;"></div>

      <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px;border-radius:8px;">
        <div id="map"></div>
        <div id="map-note" style="padding:10px 14px;border-top:1px solid var(--border);background:var(--lighter);font-size:12px;color:var(--text-muted-dark);">
          Aucun filtre : tous les chantiers géocodés sont affichés.
        </div>
      </div>

    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let map;
    let markers = {};
    let allChantiers = [];
    let totalWithAddress = 0;
    const PIN_COLOR = '#5a4a3a';

    async function apiGet(path) {
      const res = await fetch(SERVER_URL + path);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    function pinIcon() {
      return L.divIcon({
        html: `<div style="background:${PIN_COLOR};width:24px;height:24px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.35);"></div>`,
        iconSize: [24, 24],
        iconAnchor: [12, 24],
        popupAnchor: [0, -28],
        className: '',
      });
    }

    function buildPopupHTML(c) {
      return `<div style="min-width:220px;font-family:Arial,sans-serif;font-size:13px;line-height:1.5;">
        <div style="font-weight:700;font-size:15px;margin-bottom:4px;">${escapeHtml(c.nom)}</div>
        <div style="color:#555;margin-bottom:4px;">📍 ${escapeHtml(c.adresse)}</div>
        ${c.conducteur ? `<div style="margin-bottom:2px;">👷 ${escapeHtml(c.conducteur)}</div>` : ''}
        ${c.dessinateur ? `<div style="margin-bottom:2px;">✏️ ${escapeHtml(c.dessinateur)}</div>` : ''}
        ${c.dateOS || c.dateFin ? `<div style="margin-bottom:2px;">📅 ${escapeHtml(c.dateOS || '—')} → ${escapeHtml(c.dateFin || '—')}</div>` : ''}
        ${c.montantHT ? `<div style="margin-bottom:2px;">💶 ${escapeHtml(c.montantHT)} € HT</div>` : ''}
        <div style="margin-top:10px;">
          <a href="chantiers-dossiers.html?rel=${encodeURIComponent(c.dossier)}" style="display:block;text-align:center;padding:6px 8px;background:#5a4a3a;color:white;border-radius:5px;font-size:12px;text-decoration:none;">📁 Ouvrir le dossier</a>
        </div>
      </div>`;
    }

    function renderMarkers() {
      Object.values(markers).forEach(marker => map.removeLayer(marker));
      markers = {};
      const bounds = [];
      allChantiers.forEach(c => {
        if (!c.lat || !c.lng) return;
        markers[c.id] = L.marker([c.lat, c.lng], { icon: pinIcon() })
          .addTo(map)
          .bindPopup(buildPopupHTML(c), { maxWidth: 290 });
        bounds.push([c.lat, c.lng]);
      });
      if (bounds.length) map.fitBounds(bounds, { padding: [35, 35], maxZoom: 12 });
    }

    function renderStats() {
      const conducteurs = new Set(allChantiers.map(c => c.conducteur).filter(Boolean)).size;
      document.getElementById('stats-row').innerHTML = `
        <div class="kpi-stat"><div class="kpi-stat-value">${allChantiers.length}</div><div class="kpi-stat-label">Sur la carte</div></div>
        <div class="kpi-stat"><div class="kpi-stat-value">${totalWithAddress}</div><div class="kpi-stat-label">Avec adresse</div></div>
        <div class="kpi-stat"><div class="kpi-stat-value">${conducteurs}</div><div class="kpi-stat-label">Conducteurs</div></div>`;
    }

    function render() {
      renderStats();
      renderMarkers();
      const waiting = Math.max(totalWithAddress - allChantiers.length, 0);
      document.getElementById('map-note').textContent = waiting
        ? `${allChantiers.length} chantier(s) affiché(s). ${waiting} adresse(s) encore en attente de géocodage. Recharge la page dans quelques secondes.`
        : `${allChantiers.length} chantier(s) affiché(s), sans filtre ni couleur d'étape.`;
    }

    function centerOn(id) {
      const c = allChantiers.find(x => x.id === id);
      if (!c || !c.lat || !c.lng) return;
      map.setView([c.lat, c.lng], 14);
      if (markers[id]) markers[id].openPopup();
      window.scrollTo({ top: document.getElementById('map').getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' });
    }

    async function loadData(force = false) {
      try {
        const data = await apiGet('/dossiers/carte' + (force ? '?refresh=1' : ''));
        allChantiers = data?.chantiers || [];
        totalWithAddress = data?.totalWithAddress || allChantiers.length;
        render();
      } catch (e) {
        document.getElementById('map-note').textContent = `Impossible de charger les dossiers chantier : ${e.message || 'Erreur inconnue'}`;
      }
    }

    async function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectChantiersSecondaryBar();

      map = L.map('map').setView([46.5, 2.5], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19,
      }).addTo(map);

      await loadData();
    }

    window.onServerReady(init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
