<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Utilisateurs - Intranet Goudalle</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .perm-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .perm-group-title { grid-column:1/-1; font-size:13px; font-weight:700; color:#555; border-bottom:2px solid #e8e8e8; padding-bottom:4px; margin-top:10px; }
    .perm-label { display:flex; align-items:center; gap:8px; cursor:pointer; padding:7px 10px; border:1px solid #e0e0e0; border-radius:6px; font-size:13px; transition:background .15s; }
    .perm-label:hover { background:#f5f5f5; }
    .perm-label input { cursor:pointer; }
    .badge-perm { display:inline-block; font-size:11px; padding:2px 7px; border-radius:10px; background:#eef2ff; color:#3730a3; font-weight:600; margin:2px; }
    .user-row td { vertical-align:middle; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; overflow:auto; }
    .modal-box { background:#fff; margin:4% auto; padding:28px; border-radius:10px; max-width:640px; position:relative; }
    .modal-box h2 { margin-top:0; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; flex-wrap:wrap; }
    .company-badge { font-size:11px; padding:2px 7px; border-radius:8px; background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; font-weight:600; }
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>Auth.requirePermission('users_admin');</script>

  <div class="app-container">
    <div id="sidebar"></div>
    <main class="main-content">
      <h1>👥 Gestion des Utilisateurs</h1>
      <div id="message" class="alert" style="display:none;"></div>

      <!-- ══ CRÉER UN UTILISATEUR ══ -->
      <div class="card" style="margin-bottom:20px;">
        <div class="card-title"><h2>➕ Créer un nouvel utilisateur</h2></div>
        <div class="card-body">
          <form onsubmit="handleCreateUser(event)">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:12px;">
              <div class="form-group">
                <label>Prénom *</label>
                <input type="text" id="c-prenom" required>
              </div>
              <div class="form-group">
                <label>Nom *</label>
                <input type="text" id="c-nom" required>
              </div>
              <div class="form-group">
                <label>Société *</label>
                <select id="c-societe" required>
                  <option value="">— Choisir —</option>
                  <option value="SYLVE">SYLVE</option>
                  <option value="CHARPENTE">CHARPENTE</option>
                  <option value="CBCO">CBCO</option>
                  <option value="SNGM">SNGM</option>
                </select>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:12px;">
              <div class="form-group">
                <label>Email *</label>
                <input type="email" id="c-email" required>
              </div>
              <div class="form-group">
                <label>Identifiant *</label>
                <input type="text" id="c-username" minlength="3" required>
              </div>
              <div class="form-group">
                <label>Mot de passe *</label>
                <input type="password" id="c-password" minlength="3" required>
              </div>
            </div>
            <div class="form-group">
              <label>Poste</label>
              <input type="text" id="c-poste" placeholder="Ex : Conducteur de Travaux">
            </div>
            <div class="form-group" style="margin-top:14px;">
              <label>Accès aux pages</label>
              <div id="createAccessCheckboxes" class="perm-grid" style="margin-top:8px;"></div>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top:16px;">➕ Créer et enregistrer dans l'Excel</button>
          </form>
        </div>
      </div>

      <!-- ══ LISTE ══ -->
      <div class="card">
        <div class="card-title">
          <h2>Liste des utilisateurs</h2>
          <small id="users-source" style="color:var(--text-muted-dark);font-size:12px;"></small>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table id="usersTable">
              <thead>
                <tr>
                  <th>Identifiant</th>
                  <th>Nom</th>
                  <th>Société</th>
                  <th>Poste</th>
                  <th>Statut</th>
                  <th>Accès</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody><tr><td colspan="7" style="text-align:center;padding:20px;">Chargement…</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- ══ MODALE ACCÈS ══ -->
  <div id="accessModal" class="modal-overlay">
    <div class="modal-box">
      <h2>🔐 Accès — <span id="accessModalUsername"></span></h2>
      <p style="color:var(--text-muted-dark);margin-bottom:16px;">Cochez les pages auxquelles cet utilisateur aura accès. La modification est sauvegardée dans l'Excel.</p>
      <div id="accessCheckboxes" class="perm-grid"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="resetAccessToEmpty()">🔄 Tout décocher</button>
        <button class="btn btn-secondary" onclick="selectAllAccess()">✅ Tout cocher</button>
        <button class="btn btn-secondary" onclick="closeAccessModal()">Annuler</button>
        <button class="btn btn-primary" onclick="saveAccessModal()">💾 Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- ══ MODALE MODIFIER ══ -->
  <div id="editModal" class="modal-overlay">
    <div class="modal-box" style="max-width:480px;">
      <h2>✏️ Modifier — <span id="editModalUsername"></span></h2>
      <div id="editModalMessage" class="alert" style="display:none;margin-bottom:16px;"></div>
      <div class="form-group">
        <label>Identifiant *</label>
        <input type="text" id="editModalNewUsername" minlength="3" required>
      </div>
      <div class="form-group">
        <label>Nom complet *</label>
        <input type="text" id="editModalDisplayName" required>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="editModalEmail" required>
      </div>
      <div class="form-group">
        <label>Poste</label>
        <input type="text" id="editModalPoste">
      </div>
      <div class="form-group">
        <label>Nouveau mot de passe <small style="color:var(--text-muted);">(laisser vide pour ne pas changer)</small></label>
        <input type="password" id="editModalPassword" minlength="3">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeEditModal()">Annuler</button>
        <button class="btn btn-primary" onclick="saveEditModal()">💾 Enregistrer</button>
      </div>
    </div>
  </div>

  <script>
    let _pageGroups = []; // chargé depuis /api/pages

    // ── Utilitaires ──
    function escapeHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function showMessage(msg, type) {
      const d = document.getElementById('message');
      d.textContent = msg; d.className = `alert alert-${type}`; d.style.display = 'block';
      window.scrollTo(0,0);
      setTimeout(() => d.style.display = 'none', 5000);
    }

    // ── Chargement de la liste des pages depuis le serveur ──
    async function loadPageGroups() {
      try {
        const res = await fetch(SERVER_URL + '/pages');
        _pageGroups = await res.json();
      } catch {
        // Fallback : liste vide, pas bloquant
        _pageGroups = [];
      }
      renderAccessCheckboxes('createAccessCheckboxes', []);
    }

    function renderAccessCheckboxes(containerId, currentPerms) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = _pageGroups.map(group => `
        <div class="perm-group-title">${group.group}</div>
        ${group.pages.map(p => `
          <label class="perm-label">
            <input type="checkbox" value="${p.perm}" ${currentPerms.includes(p.perm) ? 'checked' : ''}>
            ${p.label}
          </label>
        `).join('')}
      `).join('');
    }

    // ── Étiquette d'accès d'un utilisateur ──
    function getRoleLabel(u) {
      if (u.role === 'direction') return '<span class="badge badge-primary">🗝️ Direction</span>';
      const perms = Array.isArray(u.customPermissions) ? u.customPermissions : [];
      if (!perms.length) return '<span style="color:#aaa;font-size:12px;">Aucun accès</span>';
      // Grouper par section
      const sections = new Set();
      for (const g of _pageGroups) {
        if (g.pages.some(p => perms.includes(p.perm))) sections.add(g.group);
      }
      return [...sections].map(s => `<span class="badge-perm">${s}</span>`).join('') || '<span style="color:#aaa;font-size:12px;">Aucun accès</span>';
    }

    // ── Charger et afficher les utilisateurs ──
    async function loadUsers() {
      let users;
      try {
        const res = await fetch(SERVER_URL + '/users');
        users = await res.json();
        document.getElementById('users-source').textContent = '(source : Excel)';
      } catch {
        users = Auth.getAllUsers();
        document.getElementById('users-source').textContent = '(source : local — Excel inaccessible)';
      }

      const list = Object.values(users).sort((a,b) => (a.entreprise||'').localeCompare(b.entreprise||'') || (a.displayName||'').localeCompare(b.displayName||''));
      const tbody = document.querySelector('#usersTable tbody');
      if (!list.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;">Aucun utilisateur</td></tr>'; return; }

      tbody.innerHTML = list.map(u => {
        const id = escapeHtml(u.username);
        const isDirec = u.role === 'direction';
        return `<tr class="user-row">
          <td><strong>${id}</strong></td>
          <td>${escapeHtml(u.displayName)||'—'}</td>
          <td><span class="company-badge">${escapeHtml(u.entreprise||'—')}</span></td>
          <td style="font-size:12px;color:#666;">${escapeHtml(u.poste||'—')}</td>
          <td><span class="badge ${u.isActive!==false?'badge-success':'badge-danger'}">${u.isActive!==false?'✅ Actif':'❌ Inactif'}</span></td>
          <td>${getRoleLabel(u)}</td>
          <td style="white-space:nowrap;">
            ${!isDirec ? `<button class="btn btn-small btn-accent" onclick="openEditModal('${id}')">✏️</button>
              <button class="btn btn-small btn-secondary" onclick="openAccessModal('${id}')">🔐 Accès</button>
              <button class="btn btn-small" style="background:${u.isActive!==false?'#fee2e2':'#d1fae5'};border:none;cursor:pointer;" onclick="toggleActive('${id}',${!(u.isActive!==false)})">${u.isActive!==false?'⏸ Désactiver':'▶ Activer'}</button>` : ''}
          </td>
        </tr>`;
      }).join('');
    }

    // ── Sauvegarde directe vers le serveur (vérifie que l'Excel est bien écrit) ──
    async function saveUsersToServer(users) {
      const token = window._serverToken;
      if (!token) { showMessage('❌ Token serveur manquant, rechargez la page.', 'error'); return false; }
      try {
        const res = await fetch(`${window.location.origin}/api/users`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'x-goudalle-token': token },
          body: JSON.stringify(users),
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          if (body.error && /busy|locked|EBUSY/i.test(body.error)) {
            showMessage('❌ Le fichier Excel des comptes est ouvert par quelqu\'un. Fermez-le et réessayez.', 'error');
          } else {
            showMessage(`❌ Erreur serveur : ${body.error || res.status}`, 'error');
          }
          return false;
        }
        return true;
      } catch (e) {
        showMessage('❌ Impossible de contacter le serveur.', 'error');
        return false;
      }
    }

    // ── Activer / désactiver ──
    async function toggleActive(username, newState) {
      const users = Auth.getAllUsers();
      if (!users[username]) return;
      users[username].isActive = newState;
      const ok = await saveUsersToServer(users);
      if (!ok) return;
      localStorage.setItem(Auth.STORAGE_KEY_USERS, JSON.stringify(users));
      showMessage(`✅ Compte ${username} ${newState ? 'activé' : 'désactivé'}.`, 'success');
      loadUsers();
    }

    // ── Création ──
    async function handleCreateUser(event) {
      event.preventDefault();
      const prenom    = document.getElementById('c-prenom').value.trim();
      const nom       = document.getElementById('c-nom').value.trim();
      const societe   = document.getElementById('c-societe').value;
      const email     = document.getElementById('c-email').value.trim();
      const username  = document.getElementById('c-username').value.trim();
      const password  = document.getElementById('c-password').value;
      const poste     = document.getElementById('c-poste').value.trim();
      const displayName = `${prenom} ${nom}`;

      const customPermissions = Array.from(document.querySelectorAll('#createAccessCheckboxes input:checked')).map(cb => cb.value);

      const result = Auth.registerUser(username, password, displayName, email, 'lecture', null, customPermissions);
      if (!result.success) { showMessage(result.message, 'error'); return; }

      // Compléter avec les champs supplémentaires avant la synchro Excel
      const users = Auth.getAllUsers();
      if (users[username]) {
        users[username].prenom     = prenom;
        users[username].nom        = nom;
        users[username].poste      = poste;
        users[username].entreprise = societe;
        users[username].createdBy  = 'SITE';
        localStorage.setItem(Auth.STORAGE_KEY_USERS, JSON.stringify(users));
      }

      showMessage(`✅ ${displayName} créé et envoyé vers l'Excel (société : ${societe}).`, 'success');
      ['c-prenom','c-nom','c-email','c-username','c-password','c-poste'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('c-societe').value = '';
      renderAccessCheckboxes('createAccessCheckboxes', []);
      loadUsers();
    }

    // ── Modale Accès ──
    let _accessUsername = null;

    function openAccessModal(username) {
      _accessUsername = username;
      document.getElementById('accessModalUsername').textContent = username;
      const users = Auth.getAllUsers();
      const u = users[username];
      if (!u) return;
      const perms = Array.isArray(u.customPermissions) ? u.customPermissions : (Auth.PERMISSIONS[u.role] || []);
      renderAccessCheckboxes('accessCheckboxes', perms);
      document.getElementById('accessModal').style.display = 'block';
    }

    function closeAccessModal() { document.getElementById('accessModal').style.display = 'none'; _accessUsername = null; }
    function resetAccessToEmpty() { document.querySelectorAll('#accessCheckboxes input').forEach(cb => cb.checked = false); }
    function selectAllAccess()    { document.querySelectorAll('#accessCheckboxes input').forEach(cb => cb.checked = true); }

    async function saveAccessModal() {
      const selected = Array.from(document.querySelectorAll('#accessCheckboxes input:checked')).map(cb => cb.value);
      // Préparer les données sans toucher au cache local d'abord
      const users = Auth.getAllUsers();
      if (!users[_accessUsername]) { alert('Utilisateur introuvable.'); return; }
      const updatedUsers = { ...users, [_accessUsername]: { ...users[_accessUsername], customPermissions: selected } };
      // Vérifier que le serveur écrit bien dans l'Excel avant de mettre à jour en local
      const ok = await saveUsersToServer(updatedUsers);
      if (!ok) return;
      Auth.updateUserPermissions(_accessUsername, selected);
      closeAccessModal();
      showMessage(`✅ Accès de ${_accessUsername} mis à jour et synchronisé vers l'Excel.`, 'success');
      loadUsers();
    }

    document.getElementById('accessModal').addEventListener('click', e => { if (e.target === document.getElementById('accessModal')) closeAccessModal(); });

    // ── Modale Modifier ──
    let _editUsername = null;

    function openEditModal(username) {
      _editUsername = username;
      document.getElementById('editModalUsername').textContent = username;
      document.getElementById('editModalMessage').style.display = 'none';
      const users = Auth.getAllUsers();
      const u = users[username];
      if (!u) return;
      document.getElementById('editModalNewUsername').value = username;
      document.getElementById('editModalDisplayName').value = u.displayName || '';
      document.getElementById('editModalEmail').value = u.email || '';
      document.getElementById('editModalPoste').value = u.poste || '';
      document.getElementById('editModalPassword').value = '';
      document.getElementById('editModal').style.display = 'block';
    }

    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; _editUsername = null; }

    function saveEditModal() {
      const newUsername   = document.getElementById('editModalNewUsername').value.trim();
      const newName       = document.getElementById('editModalDisplayName').value.trim();
      const newEmail      = document.getElementById('editModalEmail').value.trim();
      const newPoste      = document.getElementById('editModalPoste').value.trim();
      const newPassword   = document.getElementById('editModalPassword').value;

      const result = Auth.updateUserProfile(_editUsername, newName, newEmail, newUsername);
      if (!result.success) {
        const msg = document.getElementById('editModalMessage');
        msg.textContent = result.message; msg.className = 'alert alert-error'; msg.style.display = 'block';
        return;
      }

      // Mise à jour du poste
      const effectiveId = (newUsername && newUsername !== _editUsername) ? newUsername : _editUsername;
      const users = Auth.getAllUsers();
      if (users[effectiveId]) {
        users[effectiveId].poste = newPoste;
        localStorage.setItem(Auth.STORAGE_KEY_USERS, JSON.stringify(users));
      }

      if (newPassword.length > 0) {
        const pwResult = Auth.changePassword(effectiveId, newPassword);
        if (!pwResult.success) {
          const msg = document.getElementById('editModalMessage');
          msg.textContent = pwResult.message; msg.className = 'alert alert-error'; msg.style.display = 'block';
          return;
        }
      }

      closeEditModal();
      showMessage(`✅ ${_editUsername} mis à jour.`, 'success');
      loadUsers();
    }

    document.getElementById('editModal').addEventListener('click', e => { if (e.target === document.getElementById('editModal')) closeEditModal(); });

    // ── Init ──
    async function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectUsersSecondaryBar();
      await loadPageGroups();
      await loadUsers();
    }

    window.addEventListener('load', async () => { await window.serverReady; init(); });
    window.addEventListener('serverDataRefreshed', () => loadUsers());
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
