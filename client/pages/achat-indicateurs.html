<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indicateurs Achat - Intranet Goudalle</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .table-wrap { overflow-x: auto; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .note-muted { margin-top: 10px; color: #666; font-size: 13px; }
    table thead th { background: linear-gradient(180deg, #f6f6ef 0%, #efefe7 100%); }
    table tbody tr:last-child td { border-bottom: none; }
    .empty-state { text-align: center; padding: 32px; color: var(--text-light); }
    .empty-state a { color: var(--primary); font-weight: 600; }
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>Auth.requirePermission('achat_indicateurs');</script>

  <div class="app-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <h1 class="mb-3">Indicateurs Achat</h1>

      <div id="pageMessage" class="alert" style="display:none;"></div>

      <div class="card">
        <div class="card-title">
          <h2>Indicateurs mensuels CLT / LC</h2>
        </div>
        <div class="card-body">
          <div class="table-wrap">
            <table id="tableIndicateurs">
              <thead>
                <tr>
                  <th>Mois</th>
                  <th class="num">V CLT (m³)</th>
                  <th class="num">V LC (m³)</th>
                  <th class="num">Prix moyen LC (€/m³)</th>
                </tr>
              </thead>
              <tbody>
                <tr><td colspan="4" class="empty-state">Chargement...</td></tr>
              </tbody>
            </table>
          </div>
          <p class="note-muted" id="indicateursNote"></p>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><h2>Accès rapides</h2></div>
        <div class="card-body">
          <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px;">
            <a class="btn btn-primary" href="./achat-saisie.html">📤 Importer un fichier ONAYA</a>
            <a class="btn btn-secondary" href="./achat-controle.html">🔍 Contrôle des imports</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API = window.location.origin + '/api';

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatMonthFr(isoMonth) {
      const m = String(isoMonth || '').match(/^(\d{4})-(\d{2})$/);
      if (!m) return isoMonth || '—';
      const d = new Date(Date.UTC(Number(m[1]), Number(m[2]) - 1, 1));
      const label = d.toLocaleString('fr-FR', { month: 'long', timeZone: 'UTC' });
      return `${label.charAt(0).toUpperCase() + label.slice(1)} ${m[1]}`;
    }

    function fmt(v, digits = 0) {
      if (v == null) return '—';
      return Number(v).toLocaleString('fr-FR', { minimumFractionDigits: digits, maximumFractionDigits: digits });
    }

    async function loadIndicators() {
      const tbody = document.querySelector('#tableIndicateurs tbody');
      const note = document.getElementById('indicateursNote');
      try {
        const res = await fetch(API + '/achats/indicators-monthly');
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'Erreur serveur');

        const rows = data.rows || [];
        if (!rows.length) {
          tbody.innerHTML = `<tr><td colspan="4" class="empty-state">
            Aucune donnée disponible.<br>
            <a href="./achat-saisie.html">Importer un premier fichier ONAYA →</a>
          </td></tr>`;
          note.textContent = '';
          return;
        }

        tbody.innerHTML = rows.map((r) => `
          <tr>
            <td>${esc(formatMonthFr(r.month))}</td>
            <td class="num">${fmt(r.v_clt_m3)}</td>
            <td class="num">${fmt(r.v_lc_m3)}</td>
            <td class="num">${r.prix_moyen_lc_eur_m3 != null ? fmt(r.prix_moyen_lc_eur_m3) : '—'}</td>
          </tr>
        `).join('');
        note.textContent = `${rows.length} mois · Calcul serveur depuis les imports enregistrés (stock exclu).`;
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="4" class="empty-state">Erreur : ${esc(e.message)}</td></tr>`;
        note.textContent = '';
      }
    }

    async function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectAchatSecondaryBar();
      await loadIndicators();
    }

    window.onServerReady(init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
