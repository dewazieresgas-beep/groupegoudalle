<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes chantiers — Intranet Goudalle</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    #map { height: 480px; width: 100%; z-index: 1; }
    .kpi-stat { background:white; border-radius:8px; padding:14px 16px; border:1px solid var(--border); text-align:center; flex:1; min-width:110px; }
    .kpi-stat-value { font-size:24px; font-weight:700; line-height:1; margin-bottom:4px; color:var(--primary); }
    .kpi-stat-label { font-size:11px; color:var(--text-muted-dark); font-weight:600; text-transform:uppercase; letter-spacing:.4px; }
    .chantier-card { background:white; border-radius:8px; border:1px solid var(--border); padding:14px 16px; margin-bottom:10px; border-left:4px solid var(--primary); }
    .chantier-card-nom { font-weight:700; font-size:15px; margin-bottom:4px; }
    .chantier-card-sub { font-size:12px; color:var(--text-muted-dark); margin-bottom:2px; }
    .conducteur-filter { background:white; border-radius:8px; border:1px solid var(--border); padding:10px 14px; margin-bottom:16px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .conducteur-filter select { padding:6px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; background:var(--lighter); cursor:pointer; }
    .conducteur-filter label { font-size:13px; font-weight:600; color:var(--dark); }
    .empty-state { text-align:center; padding:48px 24px; color:var(--text-muted-dark); }
    .empty-state-icon { font-size:48px; margin-bottom:12px; }
  </style>
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    if (!Auth.isConnected()) { window.location.href = '../connexion.html'; }
    else if (!Auth.hasAccess('chantiers_vue_conducteurs') && !Auth.isDirection()) {
      window.location.href = './erreur-acces.html';
    }
  </script>

  <div class="app-container">
    <div id="sidebar"></div>
    <main class="main-content">

      <div class="d-flex justify-between items-center mb-3" style="gap:12px;flex-wrap:wrap;">
        <div>
          <h1 class="mb-0" id="page-title">🗺️ Mes chantiers</h1>
          <p id="page-subtitle" style="color:var(--text-muted-dark);margin:4px 0 0;font-size:14px;">Chantiers charpente dont vous êtes conducteur de travaux.</p>
        </div>
      </div>

      <div id="conducteur-filter-bar" style="display:none;" class="conducteur-filter">
        <label for="conducteur-select">👷 Conducteur :</label>
        <select id="conducteur-select" onchange="onFilterChange()">
          <option value="">— Tous les conducteurs —</option>
        </select>
        <span id="filter-count" style="font-size:12px;color:var(--text-muted-dark);margin-left:auto;"></span>
      </div>

      <div id="stats-row" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;"></div>

      <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px;border-radius:8px;">
        <div id="map"></div>
        <div id="map-note" style="padding:10px 14px;border-top:1px solid var(--border);background:var(--lighter);font-size:12px;color:var(--text-muted-dark);">
          Chargement…
        </div>
      </div>

      <div id="chantiers-list"></div>

    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const session = Auth.getSession();
    const myName = session?.displayName || '';
    const isResponsable = Auth.hasAccess('chantiers_vue_conducteurs');

    let map, markers = {};
    let allChantiers = [];
    let displayed = [];
    let selectedConducteur = '';

    function normName(s) {
      return s ? s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').trim() : '';
    }

    function escapeHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function pinIcon(color) {
      return L.divIcon({
        html: `<div style="background:${color};width:22px;height:22px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.35);"></div>`,
        iconSize: [22,22], iconAnchor: [11,22], popupAnchor: [0,-26], className: '',
      });
    }

    // Palette de couleurs par conducteur (pour Arnaud)
    const PALETTE = ['#5a4a3a','#6b8e9f','#d4a574','#7bad75','#b85c5c','#8a6bbf','#4a8a7a','#bf8a4a'];
    const conducteurColors = {};
    function colorFor(name) {
      const key = normName(name);
      if (!conducteurColors[key]) {
        const keys = Object.keys(conducteurColors);
        conducteurColors[key] = PALETTE[keys.length % PALETTE.length];
      }
      return conducteurColors[key];
    }

    function buildPopupHTML(c) {
      return `<div style="min-width:210px;font-family:Arial,sans-serif;font-size:13px;line-height:1.5;">
        <div style="font-weight:700;font-size:15px;margin-bottom:4px;">${escapeHtml(c.nom)}</div>
        <div style="color:#555;margin-bottom:4px;">📍 ${escapeHtml(c.adresse)}</div>
        ${c.conducteur ? `<div style="margin-bottom:2px;">👷 ${escapeHtml(c.conducteur)}</div>` : ''}
        ${c.dateOS || c.dateFin ? `<div style="margin-bottom:2px;">📅 ${escapeHtml(c.dateOS||'—')} → ${escapeHtml(c.dateFin||'—')}</div>` : ''}
        ${c.montantHT ? `<div style="margin-bottom:2px;">💶 ${escapeHtml(c.montantHT)} € HT</div>` : ''}
        <div style="margin-top:10px;">
          <a href="chantiers-dossiers.html?rel=${encodeURIComponent(c.dossier||c.nom)}" style="display:block;text-align:center;padding:6px 8px;background:#5a4a3a;color:white;border-radius:5px;font-size:12px;text-decoration:none;">📁 Ouvrir le dossier</a>
        </div>
      </div>`;
    }

    function getFiltered() {
      if (isResponsable && selectedConducteur) {
        return allChantiers.filter(c => normName(c.conducteur) === normName(selectedConducteur));
      }
      return allChantiers;
    }

    function renderMarkers() {
      Object.values(markers).forEach(m => map.removeLayer(m));
      markers = {};
      const bounds = [];
      displayed = getFiltered();
      displayed.forEach(c => {
        if (!c.lat || !c.lng) return;
        const color = isResponsable ? colorFor(c.conducteur || '') : '#5a4a3a';
        markers[c.id] = L.marker([c.lat, c.lng], { icon: pinIcon(color) })
          .addTo(map)
          .bindPopup(buildPopupHTML(c), { maxWidth: 290 });
        bounds.push([c.lat, c.lng]);
      });
      if (bounds.length) map.fitBounds(bounds, { padding: [35,35], maxZoom: 13 });
    }

    function renderStats() {
      const withPos = displayed.filter(c => c.lat && c.lng).length;
      let html = `<div class="kpi-stat"><div class="kpi-stat-value">${displayed.length}</div><div class="kpi-stat-label">Chantiers</div></div>
        <div class="kpi-stat"><div class="kpi-stat-value">${withPos}</div><div class="kpi-stat-label">Sur la carte</div></div>`;
      if (isResponsable) {
        const cds = new Set(allChantiers.map(c => c.conducteur).filter(Boolean)).size;
        html += `<div class="kpi-stat"><div class="kpi-stat-value">${cds}</div><div class="kpi-stat-label">Conducteurs</div></div>`;
      }
      document.getElementById('stats-row').innerHTML = html;
    }

    function renderList() {
      const container = document.getElementById('chantiers-list');
      if (!displayed.length) {
        container.innerHTML = `<div class="card empty-state"><div class="empty-state-icon">🚧</div><p style="font-size:15px;font-weight:600;">Aucun chantier trouvé.</p></div>`;
        return;
      }
      container.innerHTML = displayed.map(c => {
        const color = isResponsable ? colorFor(c.conducteur || '') : '#5a4a3a';
        return `<div class="chantier-card" style="border-left-color:${color};" onclick="centerOn(${JSON.stringify(c.id)});" style="cursor:pointer;">
          <div class="chantier-card-nom">${escapeHtml(c.nom)}</div>
          ${c.adresse ? `<div class="chantier-card-sub">📍 ${escapeHtml(c.adresse)}</div>` : ''}
          ${isResponsable && c.conducteur ? `<div class="chantier-card-sub">👷 ${escapeHtml(c.conducteur)}</div>` : ''}
          ${c.montantHT ? `<div class="chantier-card-sub">💶 ${escapeHtml(c.montantHT)} € HT</div>` : ''}
          ${c.dateOS || c.dateFin ? `<div class="chantier-card-sub">📅 ${escapeHtml(c.dateOS||'—')} → ${escapeHtml(c.dateFin||'—')}</div>` : ''}
        </div>`;
      }).join('');
    }

    function render() {
      displayed = getFiltered();
      renderMarkers();
      renderStats();
      renderList();
      const note = displayed.filter(c => c.lat && c.lng).length;
      document.getElementById('map-note').textContent = `${note} chantier(s) affiché(s) sur la carte.`;
      if (isResponsable) {
        const sel = document.getElementById('conducteur-select');
        document.getElementById('filter-count').textContent = `${displayed.length} chantier(s)`;
      }
    }

    function onFilterChange() {
      selectedConducteur = document.getElementById('conducteur-select').value;
      render();
    }

    function centerOn(id) {
      const c = allChantiers.find(x => x.id === id);
      if (!c || !c.lat || !c.lng) return;
      map.setView([c.lat, c.lng], 14);
      if (markers[id]) markers[id].openPopup();
      window.scrollTo({ top: document.getElementById('map').getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' });
    }

    function toProperCase(s) {
      return s.replace(/\S+/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
    }

    function populateConducteurSelect(chantiers) {
      // Dédoublonner par nom normalisé, garder la version la mieux capitalisée
      const seen = new Map();
      chantiers.map(c => c.conducteur).filter(Boolean).forEach(n => {
        const key = normName(n);
        if (!seen.has(key)) seen.set(key, toProperCase(n));
      });
      const names = [...seen.values()].sort();
      const sel = document.getElementById('conducteur-select');
      names.forEach(n => {
        const opt = document.createElement('option');
        opt.value = n;
        opt.textContent = n;
        sel.appendChild(opt);
      });
    }

    async function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectChantiersSecondaryBar();

      map = L.map('map').setView([50.6, 2.5], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19,
      }).addTo(map);

      if (isResponsable) {
        document.getElementById('page-title').textContent = '👷 Vue conducteurs';
        document.getElementById('page-subtitle').textContent = 'Chantiers charpente par conducteur de travaux.';
        document.getElementById('conducteur-filter-bar').style.display = 'flex';
      } else {
        document.getElementById('page-title').textContent = `🗺️ Mes chantiers — ${myName}`;
      }

      try {
        const data = await fetch(SERVER_URL + '/dossiers/carte').then(r => r.json());
        const tous = data?.chantiers || [];

        if (isResponsable) {
          allChantiers = tous;
          populateConducteurSelect(tous);
        } else {
          allChantiers = tous.filter(c => normName(c.conducteur) === normName(myName));
          if (!allChantiers.length) {
            document.getElementById('map-note').textContent = 'Aucun chantier trouvé à votre nom.';
            document.getElementById('chantiers-list').innerHTML = `<div class="card empty-state"><div class="empty-state-icon">🚧</div><p style="font-size:15px;font-weight:600;">Aucun chantier n'est associé à votre nom comme conducteur de travaux.</p></div>`;
            renderStats();
            return;
          }
        }
        render();
      } catch (e) {
        document.getElementById('map-note').textContent = `Impossible de charger les chantiers : ${e.message}`;
      }
    }

    window.onServerReady(init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
