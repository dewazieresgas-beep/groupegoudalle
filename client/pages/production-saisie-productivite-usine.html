<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saisie Productivité Usine - Intranet</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    window.APP_LOGO = 'cbco';
  </script>
  <script>
    Auth.requirePermission('production_saisie_productivite');
  </script>

  <div class="app-container">
    <div id="sidebar"></div>
    <main class="main-content">
      <h1>🏭 CBCO — Productivité Usine</h1>

      <div id="pageMessage" class="alert" style="display:none;"></div>

      <!-- ═══ BLOC : CONFIG EXCEL ═══ -->
      <div id="blockConfig" class="card">
        <div class="card-title">
          <h2 id="cfgCardTitle">🔗 Connexion fichier Excel</h2>
        </div>
        <div class="card-body">
          <form onsubmit="handleConnect(event)" id="cfgForm">
            <div class="form-group">
              <label for="cfgFolder">📁 Chemin du dossier</label>
              <input type="text" id="cfgFolder" placeholder="ex: Z:\03-BE\CBCO\Productivite" required>
            </div>
            <div class="form-group">
              <label for="cfgFilename">📄 Nom du fichier</label>
              <input type="text" id="cfgFilename" placeholder="ex: Productivite CBCO.xlsx" required>
            </div>
            <p style="font-size:0.83em; color:#888; margin-bottom:12px;">
              Les feuilles <strong>SC, ULTRA, EXTRA, COLLAGE, ASSEMBLAGE, QUALITÉ</strong> sont lues en direct à chaque ouverture de la page indicateurs.
            </p>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
              <button type="submit" id="btnConnect" class="btn btn-success" style="padding:12px 24px; font-size:15px;">
                🔗 Connecter
              </button>
              <button type="button" id="btnModifier" class="btn btn-secondary" style="display:none;" onclick="unlockConfig()">
                ✏️ Modifier
              </button>
              <button type="button" id="btnTest" class="btn btn-primary" style="display:none;" onclick="handleTest()">
                🔍 Tester la lecture
              </button>
              <button type="button" id="btnDesync" class="btn btn-danger" style="display:none;" onclick="handleDesync()">
                🔌 Désynchroniser
              </button>
            </div>
          </form>
        </div>
      </div>

    </main>
  </div>

  <script>
    async function getWriteHeaders() {
      const res = await fetch(SERVER_URL + '/health', { cache: 'no-store' });
      const payload = await res.json();
      const headers = { 'Content-Type': 'application/json' };
      if (payload?.token) headers['x-goudalle-token'] = payload.token;
      return headers;
    }

    function showMessage(msg, type) {
      const d = document.getElementById('pageMessage');
      d.textContent = msg;
      d.className = `alert alert-${type}`;
      d.style.display = 'block';
      window.scrollTo(0, 0);
      if (type === 'success') setTimeout(() => { d.style.display = 'none'; }, 6000);
    }

    function lockConfig() {
      ['cfgFolder', 'cfgFilename'].forEach(id => { document.getElementById(id).disabled = true; });
      document.getElementById('btnConnect').style.display  = 'none';
      document.getElementById('btnModifier').style.display = 'inline-flex';
      document.getElementById('btnTest').style.display     = 'inline-flex';
      document.getElementById('btnDesync').style.display   = 'inline-flex';
      document.getElementById('cfgCardTitle').textContent  = '✅ Fichier Excel lié';
    }

    function unlockConfig() {
      ['cfgFolder', 'cfgFilename'].forEach(id => { document.getElementById(id).disabled = false; });
      document.getElementById('btnConnect').style.display  = 'inline-flex';
      document.getElementById('btnModifier').style.display = 'none';
      document.getElementById('btnTest').style.display     = 'none';
      document.getElementById('btnDesync').style.display   = 'none';
      document.getElementById('cfgCardTitle').textContent  = '✏️ Modifier la connexion';
    }

    async function loadConfig() {
      try {
        const res = await fetch(SERVER_URL + '/cbco-productivite-excel-config', { cache: 'no-store' });
        const cfg = await res.json();
        if (cfg && cfg.active) {
          document.getElementById('cfgFolder').value   = cfg.folder;
          document.getElementById('cfgFilename').value = cfg.filename;
          lockConfig();
        }
      } catch { /* pas de config, formulaire reste déverrouillé */ }
    }

    async function handleConnect(event) {
      event.preventDefault();
      const btn = document.getElementById('btnConnect');
      btn.textContent = '⏳ Connexion...'; btn.disabled = true;
      const body = {
        folder:   document.getElementById('cfgFolder').value.trim(),
        filename: document.getElementById('cfgFilename').value.trim()
      };
      try {
        const headers = await getWriteHeaders();
        const res = await fetch(SERVER_URL + '/cbco-productivite-excel-config', {
          method: 'PUT', headers,
          body: JSON.stringify(body)
        });
        const result = await res.json();
        if (!result.success) { showMessage(`❌ ${result.error}`, 'error'); return; }
        const s = result.stats || {};
        showMessage(`✅ Fichier lié ! SC:${s.sc||0} Ultra:${s.ultra||0} Extra:${s.extra||0} Collage:${s.collage||0} Assemblage:${s.assemblage||0} Qualité:${s.qualite||0} semaines trouvées. Les données sont lues en direct à chaque consultation.`, 'success');
        lockConfig();
      } catch(e) {
        showMessage(`❌ Erreur : ${e.message}`, 'error');
      } finally {
        btn.textContent = '🔗 Connecter'; btn.disabled = false;
      }
    }

    async function handleTest() {
      const btn = document.getElementById('btnTest');
      btn.textContent = '⏳ Lecture...'; btn.disabled = true;
      try {
        const res = await fetch(SERVER_URL + '/cbco-productivite', { cache: 'no-store' });
        const result = await res.json();
        if (result.error) {
          showMessage(`❌ ${result.error === 'no_config' ? 'Aucun fichier configuré.' : result.message || 'Erreur lecture Excel.'}`, 'error');
          return;
        }
        const n = (result.entries || []).length;
        showMessage(`✅ Lecture OK — ${n} semaine(s) lue(s) depuis l'Excel.`, 'success');
      } catch(e) {
        showMessage(`❌ Erreur : ${e.message}`, 'error');
      } finally {
        btn.textContent = '🔍 Tester la lecture'; btn.disabled = false;
      }
    }

    async function handleDesync() {
      if (!confirm('Désynchroniser le fichier Excel ?')) return;
      try {
        await fetch(SERVER_URL + '/cbco-productivite-excel-config', { method: 'DELETE' });
        showMessage('🔌 Désynchronisé.', 'success');
        unlockConfig();
        document.getElementById('cfgFolder').value   = '';
        document.getElementById('cfgFilename').value = '';
      } catch(e) {
        showMessage(`❌ Erreur : ${e.message}`, 'error');
      }
    }


    function init() {
      document.getElementById('sidebar').innerHTML = getSidebar();
      injectProductionSecondaryBar();
      loadConfig();
    }

    window.onServerReady(init);
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
