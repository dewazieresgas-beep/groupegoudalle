<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Intranet Goudalle</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #faf8f5 0%, #f5f1ed 50%, #ede8e1 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(139, 168, 138, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -15%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(90, 74, 58, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .auth-wrap {
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
      position: relative;
      z-index: 1;
    }

    .login-container {
      width: 100%;
      max-width: 460px;
      background: white;
      padding: 50px 45px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12), 0 0 40px rgba(139, 168, 138, 0.08);
      border: 1px solid rgba(139, 168, 138, 0.2);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-header h1 {
      font-size: 34px;
      margin: 0 0 6px 0;
      background: linear-gradient(135deg, #5a4a3a 0%, #6b8e6f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .login-header p {
      color: #8ba88a;
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #5a4a3a;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    .form-group select,
    .form-group input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e8e2db;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: #5a4a3a;
      background: #faf8f5;
      box-sizing: border-box;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
      appearance: none;
      -webkit-appearance: none;
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #8ba88a;
      font-size: 16px;
      pointer-events: none;
    }

    .form-group select:focus,
    .form-group input[type="password"]:focus {
      outline: none;
      border-color: #8ba88a;
      background: white;
      box-shadow: 0 0 0 4px rgba(139, 168, 138, 0.12);
    }

    .form-group select option[disabled] {
      color: #a89b90;
    }

    /* Carte utilisateur sélectionné */
    .selected-user {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #faf8f5, #f5f1ed);
      border: 2px solid #e8e2db;
      border-radius: 10px;
      margin-bottom: 22px;
    }

    .selected-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8ba88a 0%, #6b8e6f 100%);
      color: white;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }

    .selected-info {
      flex: 1;
    }

    .selected-name {
      font-size: 15px;
      font-weight: 700;
      color: #5a4a3a;
    }

    .selected-meta {
      font-size: 12px;
      color: #8ba88a;
      margin-top: 2px;
      font-weight: 500;
    }

    .btn-primary {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.4px;
      background: linear-gradient(135deg, #8ba88a 0%, #6b8e6f 100%);
      color: white;
      transition: transform 0.25s, box-shadow 0.25s;
      margin-top: 6px;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(107, 142, 111, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .message {
      padding: 14px 16px;
      margin-bottom: 20px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
      border-left: 4px solid;
    }

    .message.error {
      background: #fdf5f5;
      color: #5c3c3c;
      border-left-color: #b85c5c;
      display: block;
    }

    .message.success {
      background: #f0f9f6;
      color: #2d5f4f;
      border-left-color: #7bad75;
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/utils.js"></script>

  <header class="sidebar">
    <div class="topbar">
      <div>Tel. +33 (0)3 21 90 98 98</div>
      <div><a href="#">Contact</a></div>
    </div>
    <div class="mainbar">
      <div class="brand">
        <img src="./assets/groupe.png" alt="Logo Groupe">
        <div class="brand-text">
          <div class="brand-title">GOUDALLE</div>
          <div class="brand-subtitle">Groupe - Intranet</div>
        </div>
      </div>
    </div>
  </header>

  <div class="auth-wrap">
    <div class="login-container">
      <div class="login-header">
        <h1>Connexion</h1>
        <p>Intranet Groupe Goudalle</p>
      </div>

      <div id="message" class="message"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">

        <!-- Étape 1 : sélection du compte -->
        <div class="form-group" id="accountGroup">
          <label for="accountSelect">Qui êtes-vous ?</label>
          <div class="select-wrapper">
            <select id="accountSelect" onchange="onAccountChange()" required>
              <option value="" disabled selected>Chargement des comptes…</option>
            </select>
          </div>
        </div>

        <!-- Carte utilisateur sélectionné (masquée au départ) -->
        <div class="selected-user" id="selectedCard" style="display:none;">
          <div class="selected-avatar" id="selectedAvatar">?</div>
          <div class="selected-info">
            <div class="selected-name" id="selectedName"></div>
            <div class="selected-meta" id="selectedMeta"></div>
          </div>
        </div>

        <!-- Étape 2 : mot de passe (masqué au départ) -->
        <div class="form-group" id="passwordGroup" style="display:none;">
          <label for="password">Mot de passe</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Votre mot de passe"
            autocomplete="current-password"
          >
        </div>

        <button type="submit" id="submitBtn" class="btn-primary" disabled>
          Se connecter
        </button>
      </form>
    </div>
  </div>

  <script>
    const COMPANY_LABELS = {
      'SYLVE':     'Sylve',
      'CHARPENTE': 'Charpente',
      'CBCO':      'CBCO',
      'SNGM':      'SNGM'
    };
    const COMPANY_ORDER = ['SYLVE', 'CHARPENTE', 'CBCO', 'SNGM'];

    // Map username → user object, pour retrouver les infos rapidement
    let _userMap = {};

    function getInitials(u) {
      const p = (u.prenom || '').trim().charAt(0).toUpperCase();
      const n = (u.nom || '').trim().charAt(0).toUpperCase();
      if (p || n) return p + n;
      return (u.displayName || u.username || '?').charAt(0).toUpperCase();
    }

    function buildSelect(users) {
      const select = document.getElementById('accountSelect');
      select.innerHTML = '<option value="" disabled selected>Sélectionnez votre nom…</option>';

      // Seulement les utilisateurs actifs avec une entreprise connue, triés par nom puis prénom
      const active = users
        .filter(u => u.isActive !== false && COMPANY_ORDER.includes(u.entreprise))
        .sort((a, b) => {
          const na = ((a.nom || '') + (a.prenom || '')).toLowerCase();
          const nb = ((b.nom || '') + (b.prenom || '')).toLowerCase();
          return na.localeCompare(nb, 'fr');
        });

      _userMap = {};
      active.forEach(u => { _userMap[u.username] = u; });

      for (const company of COMPANY_ORDER) {
        const members = active.filter(u => u.entreprise === company);
        if (members.length === 0) continue;

        const group = document.createElement('optgroup');
        group.label = COMPANY_LABELS[company] || company;

        members.forEach(u => {
          const fullName = [u.prenom, u.nom].filter(Boolean).join(' ') || u.displayName || u.username;
          const opt = document.createElement('option');
          opt.value = u.username;
          opt.textContent = u.poste ? `${fullName} — ${u.poste}` : fullName;
          group.appendChild(opt);
        });

        select.appendChild(group);
      }

      if (select.options.length === 1) {
        select.options[0].textContent = 'Aucun compte disponible';
      }
    }

    function onAccountChange() {
      const select = document.getElementById('accountSelect');
      const username = select.value;
      const u = _userMap[username];

      if (!u) {
        document.getElementById('selectedCard').style.display = 'none';
        document.getElementById('passwordGroup').style.display = 'none';
        document.getElementById('submitBtn').disabled = true;
        return;
      }

      const fullName = [u.prenom, u.nom].filter(Boolean).join(' ') || u.displayName || username;
      const meta = [COMPANY_LABELS[u.entreprise] || u.entreprise, u.poste].filter(Boolean).join(' · ');

      document.getElementById('selectedAvatar').textContent = getInitials(u);
      document.getElementById('selectedName').textContent = fullName;
      document.getElementById('selectedMeta').textContent = meta;
      document.getElementById('selectedCard').style.display = 'flex';
      document.getElementById('passwordGroup').style.display = 'block';
      document.getElementById('submitBtn').disabled = false;

      setTimeout(() => document.getElementById('password').focus(), 50);
    }

    function showMessage(msg, type) {
      const el = document.getElementById('message');
      el.textContent = msg;
      el.className = `message ${type}`;
    }

    async function handleLogin(event) {
      event.preventDefault();

      const select = document.getElementById('accountSelect');
      const username = select.value;
      const password = document.getElementById('password').value;

      if (!username) { showMessage('Veuillez sélectionner votre compte.', 'error'); return; }
      if (!password) { showMessage('Veuillez entrer votre mot de passe.', 'error'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Connexion…';

      const result = await Auth.login(username, password);

      if (result.success) {
        showMessage('✅ Connexion réussie…', 'success');
        setTimeout(() => { window.location.href = './index.html'; }, 400);
      } else {
        showMessage(result.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Se connecter';
        document.getElementById('password').focus();
      }
    }

    window.onServerReady(() => {
      buildSelect(Auth.getUserList());
    });

    if (Auth.isConnected()) {
      window.location.href = './index.html';
    }
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
