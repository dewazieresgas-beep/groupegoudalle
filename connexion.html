<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Intranet Goudalle</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    body {
      background: linear-gradient(180deg, #faf8f5 0%, #f0e9df 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-wrap {
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
    }
    
    .login-container {
      width: 100%;
      max-width: 460px;
      background: white;
      padding: 40px;
      border-radius: 6px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      border: 1px solid #f0ece6;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h1 {
      font-size: 32px;
      margin: 0 0 5px 0;
      color: #5a4a3a;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .login-header p {
      color: #8ba88a;
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #5a4a3a;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #f0ece6;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.3s, background-color 0.3s;
      box-sizing: border-box;
      background: #faf8f5;
    }

    .form-group input:focus {
      outline: none;
      border-color: #8ba88a;
      background: white;
    }

    .message {
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-size: 13px;
      display: none;
      border-left: 4px solid;
    }

    .message.success {
      background: #f0f9f6;
      color: #2d5f4f;
      border-left-color: #7bad75;
      display: block;
    }

    .message.error {
      background: #fdf5f5;
      color: #5c3c3c;
      border-left-color: #b85c5c;
      display: block;
    }

    .message.info {
      background: #f5f7f8;
      color: #385a6b;
      border-left-color: #6b8e9f;
      display: block;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #8ba88a 0%, #6b8e6f 100%);
      color: white;
      border: 1px solid #6b8e6f;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(107, 142, 111, 0.3);
    }

    .btn-secondary {
      background: #f5f1ed;
      color: #5a4a3a;
      border: 1px solid #d4ccc3;
    }

    .btn-secondary:hover {
      background: #d4ccc3;
      border-color: #b8a896;
    }

    .demo-accounts {
      background: #faf8f5;
      padding: 20px;
      border-radius: 4px;
      margin-top: 25px;
      border-left: 4px solid #8ba88a;
    }

    .demo-accounts h3 {
      margin: 0 0 15px 0;
      color: #5a4a3a;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .demo-account {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 4px;
      border: 1px solid #f0ece6;
      cursor: pointer;
      transition: all 0.3s;
    }

    .demo-account:last-child {
      margin-bottom: 0;
    }

    .demo-account:hover {
      background: #faf8f5;
      border-color: #8ba88a;
      box-shadow: 0 2px 6px rgba(139, 168, 138, 0.2);
    }

    .demo-account-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .demo-account-user {
      font-weight: 700;
      color: #5a4a3a;
      font-size: 13px;
    }

    .demo-account-role {
      font-size: 10px;
      padding: 3px 8px;
      background: #8ba88a;
      color: white;
      border-radius: 3px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .demo-account-pwd {
      font-size: 12px;
      color: #7a6a5a;
      font-family: 'Courier New', monospace;
      font-weight: 500;
    }

    .demo-account-desc {
      font-size: 11px;
      color: #a89b90;
      margin-top: 5px;
    }

    .loading {
      display: none;
      text-align: center;
      color: #8ba88a;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #8ba88a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/utils.js"></script>

  <header class="sidebar">
    <div class="topbar">
      <div>Tel. +33 (0)3 21 90 98 98</div>
      <div><a href="#">Contact</a></div>
    </div>
    <div class="mainbar">
      <div class="brand">
        <img src="./assets/groupe.png" alt="Logo Groupe">
        <div class="brand-text">
          <div class="brand-title">GOUDALLE</div>
          <div class="brand-subtitle">Groupe - Intranet</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="./connexion.html" class="sidebar-item">Connexion</a>
        <a href="./inscription.html" class="sidebar-item">Créer un compte</a>
      </nav>
    </div>
  </header>

  <div class="auth-wrap">
    <div class="login-container">
      <div class="login-header">
        <h1>Connexion</h1>
        <p>Accès sécurisé - Intranet Groupe</p>
      </div>

    <div id="message" class="message"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Identifiant</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          placeholder="Ex: acgoudalle"
          autocomplete="username"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Votre mot de passe"
          autocomplete="password"
          required
        >
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          <span id="btnText">Connexion</span>
          <span id="loading" class="loading"><div class="spinner"></div></span>
        </button>
        <button type="button" class="btn btn-secondary" onclick="goRegister()">Créer un compte</button>
      </div>
    </form>

    <div class="demo-accounts">
      <h3>👤 Comptes disponibles</h3>
      <div id="accountsList">
        <p style="color:var(--text-muted); font-size:13px; margin:0;">Chargement...</p>
      </div>
    </div>
  </div>
  </div>

  <script>
    /**
     * Remplit automatiquement le formulaire avec l'identifiant d'un compte
     * @param {string} username - Nom d'utilisateur à préremplir
     */
    function autofill(username) {
      document.getElementById('username').value = username;
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }

    function getRoleLabel(u) {
      if (u.role === 'direction') return 'Direction';
      const perms = Array.isArray(u.customPermissions) ? u.customPermissions : [];
      const sections = [];
      const commercial = ['cbco', 'cbco_saisie', 'cbco_commercial'];
      const compta = ['sylve', 'sylve_saisie', 'gc_paiement', 'gm_paiement', 'cbco_paiement'];
      const production = ['production_general', 'gm', 'gm_saisie', 'cbco_usine', 'cbco_productivite_saisie'];
      if (commercial.some(k => perms.includes(k))) sections.push('Commercial');
      if (compta.some(k => perms.includes(k))) sections.push('Comptabilité');
      if (production.some(k => perms.includes(k))) sections.push('Production');
      if (perms.includes('users_admin')) sections.push('Admin');
      if (sections.length > 0) return sections.join(', ');
      return 'Accès limité';
    }

    function renderAccountsList() {
      const users = Auth.getUserList().filter(u => u.isActive);
      const container = document.getElementById('accountsList');
      if (!users || users.length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted); font-size:13px; margin:0;">Aucun compte disponible</p>';
        return;
      }
      container.innerHTML = users.map(u => `
        <div class="demo-account" onclick="autofill('${escapeHtml(u.username)}')">
          <div class="demo-account-header">
            <span class="demo-account-user">${escapeHtml(u.username)}</span>
            <span class="demo-account-role">${getRoleLabel(u)}</span>
          </div>
          <div class="demo-account-desc">${escapeHtml(u.displayName || '')}</div>
        </div>
      `).join('');
    }

    window.onServerReady(renderAccountsList);

    /**
     * Affiche un message de feedback à l'utilisateur
     * @param {string} message - Texte du message à afficher
     * @param {string} type - Type : 'success' (vert) ou 'error' (rouge)
     */
    function showMessage(message, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = message;
      msgDiv.className = `message ${type}`;
      msgDiv.style.display = 'block';
    }

    /**
     * Gestion de la soumission du formulaire de connexion
     * @param {Event} event - Événement de soumission du formulaire
     */
    function handleLogin(event) {
      event.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showMessage('❌ Veuillez remplir tous les champs', 'error');
        return;
      }

      document.getElementById('btnText').style.display = 'none';
      document.getElementById('loading').style.display = 'block';

      setTimeout(() => {
        const result = Auth.login(username, password);

        if (result.success) {
          showMessage(result.message, 'success');
          setTimeout(() => {
            window.location.href = './index.html';
          }, 500);
        } else {
          showMessage(result.message, 'error');
          document.getElementById('btnText').style.display = 'block';
          document.getElementById('loading').style.display = 'none';
        }
      }, 300);
    }

    /**
     * Redirige vers la page d'inscription
     */
    function goRegister() {
      window.location.href = './inscription.html';
    }

    // Si l'utilisateur est déjà connecté, rediriger vers l'accueil
    if (Auth.isConnected()) {
      window.location.href = './index.html';
    }
  </script>

  <footer class="site-footer"></footer>
</body>
</html>
